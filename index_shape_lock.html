<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shape Lock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
          media="print" onload="this.media='all'">
    <style>
        :root { --cy: #38e8ff; --mg: #ff4d9d; --bg: #0a0a1e; }
        html, body { height: 100%; }
        body {
            background: radial-gradient(ellipse at center, #14142e 0%, #05050f 100%);
            color: #eaf6ff; font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100dvh; min-height: 100vh; margin: 0; overflow: hidden; padding: 8px; box-sizing: border-box;
            touch-action: none; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
        }
        #game-container {
            position: relative; width: 100%; max-width: min(940px, 98vw); height: 100%; max-height: min(880px, 96vh);
            display: flex; flex-direction: column; align-items: center;
            border: 3px solid var(--mg); border-radius: 10px;
            box-shadow: 0 0 20px var(--mg), inset 0 0 18px rgba(255,77,157,0.18);
            background: #04040c; padding: 6px; box-sizing: border-box;
        }
        #hud {
            width: 100%; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
            gap: 8px; padding: 6px 10px; box-sizing: border-box; font-size: 0.55rem;
        }
        #hud-mode { color: var(--cy); text-shadow: 0 0 6px var(--cy); letter-spacing: 1px; }
        .pill-btn { background: transparent; color: #eaf6ff; border: 2px solid var(--mg); border-radius: 999px;
            padding: 5px 10px; font-family: inherit; font-size: 0.5rem; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .pill-btn:active { background: var(--mg); color: #04040c; }
        #canvas-wrap { position: relative; width: 100%; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
        #gameCanvas { display: block; background: transparent; touch-action: none; }
        #back-to-arcade { position: fixed; top: max(10px, env(safe-area-inset-top)); left: max(10px, env(safe-area-inset-left)); z-index: 500;
            padding: 6px 12px; font-family: inherit; font-size: 0.55rem; color: var(--mg); background: rgba(0,0,0,0.7);
            border: 1px solid var(--mg); border-radius: 6px; text-decoration: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        #back-to-arcade:active { background: rgba(255,77,157,0.25); }
        #hint { width: 100%; text-align: center; font-size: 0.44rem; color: #6a5a7a; padding: 6px 4px 0; box-sizing: border-box; line-height: 1.9; }

        #modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(6,4,16,0.97);
            border: 3px solid var(--mg); padding: 20px 24px; border-radius: 10px; text-align: center; box-shadow: 0 0 26px var(--mg);
            z-index: 100; display: none; max-width: 94vw; width: 400px; box-sizing: border-box; }
        #modal h1 { font-size: 1.1rem; line-height: 1.6; margin: 0 0 14px; color: var(--mg); text-shadow: 0 0 10px var(--mg); }
        #modal p { font-size: 0.55rem; line-height: 1.9; margin: 0 0 10px; color: #b8a8c8; }
        #modal .legend { font-size: 0.46rem; line-height: 2; color: #9fb0d8; text-align: left; margin: 12px 0 4px; }
        #modal .legend b { color: var(--cy); }
        .setup-row { margin: 12px 0; }
        .setup-label { display: block; font-size: 0.5rem; color: #9fb0d8; margin-bottom: 7px; }
        .opt-group { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
        .opt-btn { background: transparent; color: #9fb0d8; border: 2px solid #3a2f5a; border-radius: 4px; padding: 8px 12px;
            font-family: inherit; font-size: 0.5rem; cursor: pointer; touch-action: manipulation; }
        .opt-btn.sel { color: #eaf6ff; border-color: var(--mg); box-shadow: 0 0 6px var(--mg); }
        .nb-btn { background: var(--mg); color: #04040c; border: none; padding: 12px 22px; border-radius: 8px; margin: 10px 4px 0;
            cursor: pointer; font-family: inherit; font-size: 0.7rem; box-shadow: 0 4px #a01f5c; touch-action: manipulation; }
        .nb-btn.alt { background: transparent; color: var(--cy); border: 2px solid var(--cy); box-shadow: 0 4px #0a6a80; }
        .nb-btn:active { transform: translateY(4px); box-shadow: none; }
        @media (max-width: 520px) { #hud { font-size: 0.46rem; } }
    </style>
</head>
<body>
<a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>
<div id="game-container">
    <div id="hud">
        <span id="hud-mode">SHAPE LOCK</span>
        <button class="pill-btn" id="mute-btn">&#128266;</button>
    </div>
    <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div id="modal"><div id="modal-content"></div></div>
    </div>
    <div id="hint"><span id="hint-text"></span></div>
</div>

<script src="highscores.js"></script>
<script>
    'use strict';
    // =====================================================================
    // Shape Lock — neon block stacker. Old-school tetrominoes, new-school
    // pizazz. Settings page (1P/2P, Race-to-25k / Survival, difficulty),
    // harder pieces unlocked every 5k pts, a droppable Neuralyzer rescue orb,
    // and faint themed backgrounds that swap every 10k (a "stage") along with
    // a speed bump and a celebration.
    // =====================================================================

    const COLS = 10, ROWS = 20;
    const LOCK_DELAY = 0.5, MAX_LOCK_RESETS = 15;
    const DAS_DELAY = 0.14, ARR = 0.028;
    const UNLOCK_STEP = 5000, STAGE_STEP = 10000;
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    // Race variants — the goal you race to (1P = sprint, 2P = first there wins).
    const RACE_GOALS = {
        points: { target: 25000, metric: g => g.score,      menu: '25,000 PTS', winText: '25,000 PTS!',  center: 'TO 25,000 PTS', bar: g => 'TO 25K' },
        pieces: { target: 200,   metric: g => g.pieceCount, menu: '200 PIECES', winText: '200 PIECES!',  center: 'TO 200 PIECES', bar: g => 'PIECES ' + g.pieceCount + '/200' },
        lines:  { target: 25,    metric: g => g.lines,      menu: '25 LINES',   winText: '25 LINES!',    center: 'TO 25 LINES',   bar: g => 'LINES ' + g.lines + '/25' }
    };

    // --- Piece definitions --------------------------------------------------
    const PIECES = {
        I: { color: '#38e8ff', mat: [[1, 1, 1, 1]] },
        O: { color: '#ffd166', mat: [[1, 1], [1, 1]] },
        T: { color: '#c96bff', mat: [[0, 1, 0], [1, 1, 1]] },
        S: { color: '#4dd6a8', mat: [[0, 1, 1], [1, 1, 0]] },
        Z: { color: '#ff5470', mat: [[1, 1, 0], [0, 1, 1]] },
        J: { color: '#5aa9ff', mat: [[1, 0, 0], [1, 1, 1]] },
        L: { color: '#ff9f45', mat: [[0, 0, 1], [1, 1, 1]] },
        V:  { color: '#ff8fce', name: 'ELBOW',  mat: [[1, 0, 0], [1, 0, 0], [1, 1, 1]] },
        Tp: { color: '#ffa8ff', name: 'BIG T',  mat: [[1, 1, 1], [0, 1, 0], [0, 1, 0]] },
        Xp: { color: '#ff5a5a', name: 'CROSS',  mat: [[0, 1, 0], [1, 1, 1], [0, 1, 0]] },
        Np: { color: '#9d8bff', name: 'LONG S', mat: [[0, 1], [0, 1], [1, 1], [1, 0]] },
        Wp: { color: '#7dffb0', name: 'STEPS',  mat: [[1, 0, 0], [1, 1, 0], [0, 1, 1]] },
        Up: { color: '#ff6ad5', name: 'CUP',    mat: [[1, 0, 0, 1], [1, 0, 0, 1], [1, 1, 1, 1]] },
        NEU: { color: '#7dffb0', name: 'NEURALYZER', special: true, mat: [[1]] }
    };
    const BASE_KEYS = ['I', 'O', 'T', 'S', 'Z', 'J', 'L'];
    const EXTRA_KEYS = ['V', 'Tp', 'Xp', 'Np', 'Wp', 'Up'];   // unlock order, easy -> brutal
    const TOTAL_PIECES = BASE_KEYS.length + EXTRA_KEYS.length;
    const LINE_SCORE = [0, 100, 300, 500, 800];

    const DIFF = {
        easy:   { label: 'EASY',   base: 0.92, accel: 0.93, survBase: 0.90, survHalf: 55 },
        normal: { label: 'NORMAL', base: 0.72, accel: 0.88, survBase: 0.68, survHalf: 40 },
        hard:   { label: 'HARD',   base: 0.52, accel: 0.82, survBase: 0.48, survHalf: 28 }
    };

    // --- Faint themed backgrounds (swap each stage) -------------------------
    // Silhouettes drawn very faint behind each board; drift slowly, wrap.
    const THEMES = [
        { name: 'STARS',   color: '#bfe8ff', draw: ambStar },
        { name: 'FISH',    color: '#8fe6d6', draw: ambFish },
        { name: 'ROBOTS',  color: '#c9b6ff', draw: ambRobot },
        { name: 'DINOS',   color: '#a8e6a0', draw: ambDino },
        { name: 'ROCKETS', color: '#ffb3c1', draw: ambRocket },
        { name: 'GHOSTS',  color: '#d6dcff', draw: ambGhost }
    ];

    const LS = { muted: 'sl_muted', high: 'sl_highscore', players: 'sl_players', mode: 'sl_mode', diff: 'sl_diff', raceGoal: 'sl_racegoal' };
    let muted = localStorage.getItem(LS.muted) === '1';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvas-wrap');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const hudMode = document.getElementById('hud-mode');
    const hintText = document.getElementById('hint-text');

    const app = {
        phase: 'menu',                                       // menu | playing | paused | results
        numPlayers: +(localStorage.getItem(LS.players) || 1),
        mode: localStorage.getItem(LS.mode) || 'race',       // race | survival
        raceGoal: localStorage.getItem(LS.raceGoal) || 'points',   // points | pieces | lines
        difficulty: localStorage.getItem(LS.diff) || 'normal',
        games: [], survivalTime: 0, results: null,
        menuAmbient: []
    };

    // --- Per-player game state ---------------------------------------------
    function emptyBoard() {
        const b = [];
        for (let r = 0; r < ROWS; r++) b.push(new Array(COLS).fill(null));
        return b;
    }
    function makeGame(index) {
        const g = {
            index, board: emptyBoard(), cur: null, queue: [],
            hold: null, holdUsed: false,
            score: 0, lines: 0, pieceCount: 0, stage: 1, combo: 0, unlockedExtras: 0,
            dropTimer: 0, lockTimer: 0, lockResets: 0, grounded: false, softDrop: false,
            locksSinceNeuralyzer: 0,
            clearing: null, dead: false, won: false,
            particles: [], popups: [], banner: null, shake: 0, flash: null,
            das: { dir: 0, timer: 0, charged: false },
            ambient: [], ambientTheme: 0,
            high: index === 0 ? HS.getBoard('shape-lock', LS.high).personalBest.score : 0
        };
        return g;
    }

    // --- Matrix / collision -------------------------------------------------
    function rotate(mat, dir) {
        const rows = mat.length, cols = mat[0].length, res = [];
        for (let c = 0; c < cols; c++) res.push(new Array(rows).fill(0));
        for (let r = 0; r < rows; r++)
            for (let c = 0; c < cols; c++) {
                if (dir > 0) res[c][rows - 1 - r] = mat[r][c];
                else res[cols - 1 - c][r] = mat[r][c];
            }
        return res;
    }
    function pieceFromKey(k) {
        const def = PIECES[k];
        return { key: k, color: def.color, mat: def.mat.map(row => row.slice()),
            x: Math.floor((COLS - def.mat[0].length) / 2), y: 0 };
    }
    function valid(g, mat, px, py) {
        for (let r = 0; r < mat.length; r++)
            for (let c = 0; c < mat[r].length; c++) {
                if (!mat[r][c]) continue;
                const bx = px + c, by = py + r;
                if (bx < 0 || bx >= COLS || by >= ROWS) return false;
                if (by >= 0 && g.board[by][bx]) return false;
            }
        return true;
    }

    // --- 7-bag (+ sprinkled extras) ----------------------------------------
    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function makeBag(g) {
        const bag = shuffle(BASE_KEYS.slice());
        let inserts = 0;
        for (let i = 0; i < g.unlockedExtras && inserts < 3; i++)
            if (Math.random() < 0.45) { bag.splice(Math.floor(Math.random() * (bag.length + 1)), 0, EXTRA_KEYS[i]); inserts++; }
        return bag;
    }
    function fillQueue(g) { while (g.queue.length < 7) g.queue.push(...makeBag(g)); }

    // --- Piece lifecycle ----------------------------------------------------
    function resetTimers(g) { g.dropTimer = 0; g.lockTimer = 0; g.lockResets = 0; g.grounded = false; g.softDrop = false; }
    function spawnNext(g) {
        g.cur = pieceFromKey(g.queue.shift());
        fillQueue(g); g.holdUsed = false; resetTimers(g);
        if (!valid(g, g.cur.mat, g.cur.x, g.cur.y)) killPlayer(g);
    }
    function onMoveSuccess(g) { if (g.grounded && g.lockResets < MAX_LOCK_RESETS) { g.lockTimer = 0; g.lockResets++; } }
    function move(g, dx) { if (!g.clearing && valid(g, g.cur.mat, g.cur.x + dx, g.cur.y)) { g.cur.x += dx; onMoveSuccess(g); sfx.move(); } }
    const KICKS = [[0, 0], [-1, 0], [1, 0], [-2, 0], [2, 0], [0, -1], [-1, -1], [1, -1], [0, 1]];
    function tryRotate(g, dir) {
        if (g.clearing) return;
        const nm = rotate(g.cur.mat, dir);
        for (const [ox, oy] of KICKS)
            if (valid(g, nm, g.cur.x + ox, g.cur.y + oy)) { g.cur.mat = nm; g.cur.x += ox; g.cur.y += oy; onMoveSuccess(g); sfx.rotate(); return; }
    }
    function holdPiece(g) {
        if (g.holdUsed || g.clearing) return;
        const k = g.cur.key;
        if (g.hold === null) { g.hold = k; g.cur = pieceFromKey(g.queue.shift()); fillQueue(g); }
        else { const h = g.hold; g.hold = k; g.cur = pieceFromKey(h); }
        g.holdUsed = true; resetTimers(g); sfx.hold();
        if (!valid(g, g.cur.mat, g.cur.x, g.cur.y)) killPlayer(g);
    }
    function hardDrop(g) {
        if (g.clearing) return;
        let d = 0;
        while (valid(g, g.cur.mat, g.cur.x, g.cur.y + 1)) { g.cur.y++; d++; }
        if (d > 0) bumpScore(g, d * 2);
        g.shake = Math.max(g.shake, 0.22); sfx.harddrop(); lockPiece(g);
    }
    function lockPiece(g) {
        const p = g.cur;
        if (p.key === 'NEU') { detonateNeuralyzer(g, p); return; }
        let topOut = false;
        for (let r = 0; r < p.mat.length; r++)
            for (let c = 0; c < p.mat[r].length; c++) {
                if (!p.mat[r][c]) continue;
                const by = p.y + r, bx = p.x + c;
                if (by < 0) { topOut = true; continue; }
                g.board[by][bx] = p.color;
            }
        sfx.lock(); g.shake = Math.max(g.shake, 0.12);
        if (topOut) { killPlayer(g); return; }
        g.pieceCount++;
        maybeGrantNeuralyzer(g);
        checkRaceWin(g);
        const full = [];
        for (let r = 0; r < ROWS; r++) if (g.board[r].every(c => c)) full.push(r);
        if (full.length) { applyClearScore(g, full); g.clearing = { rows: full, t: 0.32 }; sfx.clear(full.length); }
        else { g.combo = 0; spawnNext(g); }
    }
    function applyClearScore(g, rows) {
        const n = rows.length;
        g.lines += n; g.combo++;
        let pts = LINE_SCORE[n] * g.stage;
        if (g.combo > 1) pts += 50 * (g.combo - 1) * g.stage;
        const lay = LAY.boards[g.index];
        const label = (n === 4 ? 'SHAPE LOCK!' : n + ' LINE' + (n > 1 ? 'S' : '')) + (g.combo > 1 ? ' x' + g.combo : '');
        addPopup(g, COLS / 2, rows[0], label, n === 4 ? '#ff4d9d' : '#ffd166');
        for (const r of rows) for (let c = 0; c < COLS; c++) spawnShards(g, c, r, g.board[r][c]);
        bumpScore(g, pts);
    }
    function finalizeClear(g) {
        const rows = g.clearing.rows.slice().sort((a, b) => a - b);
        for (const r of rows) { g.board.splice(r, 1); g.board.unshift(new Array(COLS).fill(null)); }
        g.clearing = null; spawnNext(g);
    }

    // Neuralyzer orb: sprinkled into the queue when the stack passes halfway.
    function maybeGrantNeuralyzer(g) {
        g.locksSinceNeuralyzer++;
        if (g.cur && g.cur.key === 'NEU') return;
        if (g.queue[0] === 'NEU' || g.queue[1] === 'NEU') return;
        let topRow = ROWS;
        for (let r = 0; r < ROWS; r++) if (g.board[r].some(x => x)) { topRow = r; break; }
        if (ROWS - topRow > ROWS / 2 && g.locksSinceNeuralyzer > 6 && Math.random() < 0.18) {
            g.queue.unshift('NEU'); g.locksSinceNeuralyzer = 0;
            showBanner(g, 'NEURALYZER! DROP TO WIPE', '#7dffb0', 2.0); sfx.grant();
        }
    }
    function detonateNeuralyzer(g, p) {
        const rows = [];
        if (p.y + 1 <= ROWS - 1) rows.push(p.y + 1);
        if (p.y + 2 <= ROWS - 1) rows.push(p.y + 2);
        if (!rows.length) rows.push(p.y);
        for (const r of rows) for (let c = 0; c < COLS; c++) {
            spawnShards(g, c, r, '#7dffb0');
            if (g.board[r][c]) spawnShards(g, c, r, g.board[r][c]);
        }
        g.flash = { t: 0.6, color: '#7dffb0' }; g.shake = Math.max(g.shake, 0.42);
        addPopup(g, COLS / 2, rows[0], 'NEURALYZED!', '#7dffb0'); sfx.neuralyzer();
        g.combo = 0; g.clearing = { rows: rows.slice(), t: 0.32 };
    }

    // --- Scoring / progression ---------------------------------------------
    function bumpScore(g, pts) { g.score += pts; onScore(g); }
    function onScore(g) {
        // piece unlocks every 5k
        const tier = Math.min(Math.floor(g.score / UNLOCK_STEP), EXTRA_KEYS.length);
        while (tier > g.unlockedExtras) {
            const k = EXTRA_KEYS[g.unlockedExtras]; g.unlockedExtras++;
            showBanner(g, 'NEW PIECE — ' + PIECES[k].name, '#7dffb0', 1.6); sfx.unlock();
        }
        // stage (background + speed bump + celebration) every 10k
        const ns = Math.floor(g.score / STAGE_STEP) + 1;
        while (ns > g.stage) { g.stage++; stageUp(g); }
        checkRaceWin(g);
    }
    function checkRaceWin(g) {
        if (app.mode !== 'race' || g.won || g.dead) return;
        const goal = RACE_GOALS[app.raceGoal];
        if (goal.metric(g) >= goal.target) { g.won = true; showBanner(g, goal.winText, '#ffd166', 2.4); sfx.win(); resolveMatch(); }
    }
    function stageUp(g) {
        const ti = (g.stage - 1) % THEMES.length, th = THEMES[ti];
        g.ambientTheme = ti;
        g.flash = { t: 0.55, color: th.color };
        showBanner(g, 'STAGE ' + g.stage + ' — ' + th.name, th.color, 2.4);
        sfx.stage();
        for (let i = 0; i < 26; i++) {
            const a = Math.random() * Math.PI * 2, sp = 80 + Math.random() * 200;
            g.particles.push({ gx: COLS / 2 + (Math.random() - 0.5) * COLS, gy: ROWS / 2, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.7, maxLife: 0.7, size: 2 + Math.random() * 3, color: th.color });
        }
    }
    function computeInterval(g) {
        const d = DIFF[app.difficulty];
        if (app.mode === 'survival') return Math.max(0.045, d.survBase * Math.pow(0.5, app.survivalTime / d.survHalf));
        return Math.max(0.05, d.base * Math.pow(d.accel, g.stage - 1));
    }

    // --- Win / lose ---------------------------------------------------------
    function killPlayer(g) { if (g.dead || g.won) return; g.dead = true; g.shake = 0.5; sfx.gameOver(); resolveMatch(); }
    function resolveMatch() {
        if (app.phase !== 'playing') return;
        const gs = app.games;
        if (app.numPlayers === 1) {
            const g = gs[0];
            if (g.won) finishMatch({ solo: true, outcome: 'win' });
            else if (g.dead) finishMatch({ solo: true, outcome: 'over' });
            return;
        }
        const a = gs[0], b = gs[1];
        if (a.won || b.won) { finishMatch({ solo: false, winner: a.won ? 0 : 1 }); return; }
        if (a.dead && b.dead) finishMatch({ solo: false, winner: a.score >= b.score ? 0 : 1, bothOut: true });
        else if (a.dead) finishMatch({ solo: false, winner: 1 });
        else if (b.dead) finishMatch({ solo: false, winner: 0 });
    }
    function finishMatch(res) {
        app.phase = 'results'; app.results = res;
        const g0 = app.games[0];
        if (res.solo) {
            const isBest = g0.score > g0.high;
            const qualifies = HS.checkQualifies('shape-lock', g0.score, LS.high);
            const show = () => { if (isBest) g0.high = g0.score; showResults(res, isBest); };
            if (qualifies) HS.showInitialsOverlay({ onSubmit: (name) => { HS.recordScore('shape-lock', name, g0.score); show(); } });
            else show();
            sfx.gameOver();
        } else { showResults(res, false); sfx.win(); }
    }

    // --- Particles / popups (grid coords, rendered per board) ---------------
    function spawnShards(g, gx, gy, color) {
        if (g.particles.length > 480) return;
        for (let i = 0; i < 5; i++) {
            const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 130;
            g.particles.push({ gx: gx + 0.5, gy: gy + 0.5, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 0.5, maxLife: 0.5, size: 2 + Math.random() * 3, color });
        }
    }
    function updateParticles(g, dt) {
        const cell = LAY.boards[g.index].cell;
        for (let i = g.particles.length - 1; i >= 0; i--) {
            const p = g.particles[i]; p.life -= dt;
            if (p.life <= 0) { g.particles.splice(i, 1); continue; }

                const pulse = 0.45 + 0.4 * Math.sin(ambT * 8);
                const grad = ctx.createLinearGradient(0, lay.by, 0, lay.by + 4 * cell);
                grad.addColorStop(0, 'rgba(255,42,42,' + (pulse * 0.5).toFixed(2) + ')'); grad.addColorStop(1, 'rgba(255,42,42,0)');
                ctx.fillStyle = grad; ctx.fillRect(lay.bx, lay.by, lay.bw, 4 * cell);
                ctx.strokeStyle = 'rgba(255,60,60,' + pulse.toFixed(2) + ')'; ctx.lineWidth = 2; ctx.strokeRect(lay.bx - 3, lay.by - 3, lay.bw + 6, lay.bh + 6);
            }
        }

        // particles
        for (const p of g.particles) { ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1); ctx.fillStyle = p.color; ctx.fillRect(lay.bx + p.gx * cell - p.size / 2, lay.by + p.gy * cell - p.size / 2, p.size, p.size); }
        ctx.globalAlpha = 1;
        // popups
        for (const p of g.popups) { ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1); ctx.fillStyle = p.color; ctx.font = 'bold ' + Math.round(cell * 0.46) + 'px monospace'; ctx.textAlign = 'center'; ctx.fillText(p.text, lay.bx + p.gx * cell, lay.by + p.gy * cell); }
        ctx.globalAlpha = 1;

        // flash overlay (stage / neuralyzer)
        if (g.flash && g.flash.t > 0) { ctx.save(); ctx.globalAlpha = Math.min(0.85, g.flash.t * 1.6); ctx.fillStyle = g.flash.color; ctx.fillRect(lay.bx - 3, lay.by - 3, lay.bw + 6, lay.bh + 6); ctx.restore(); }

        // banner
        if (g.banner) { ctx.save(); ctx.globalAlpha = clamp(g.banner.timer, 0, 1); ctx.fillStyle = 'rgba(4,4,20,0.82)'; const bw2 = lay.bw - 8; rr(lay.bx + 4, lay.by + lay.bh * 0.16, bw2, cell * 1.1, 5); ctx.fill(); ctx.strokeStyle = g.banner.color; ctx.lineWidth = 2; ctx.stroke(); ctx.fillStyle = g.banner.color; ctx.font = 'bold ' + Math.round(cell * 0.42) + 'px monospace'; ctx.textAlign = 'center'; ctx.fillText(g.banner.text, lay.bx + lay.bw / 2, lay.by + lay.bh * 0.16 + cell * 0.72); ctx.restore(); }

        ctx.restore();
    }

    function txt(s, x, y, color, size, align) { ctx.fillStyle = color; ctx.font = 'bold ' + size + 'px monospace'; ctx.textAlign = align || 'left'; ctx.fillText(s, x, y); }
    function fmtTime(s) { const m = Math.floor(s / 60), ss = Math.floor(s % 60); return String(m).padStart(2, '0') + ':' + String(ss).padStart(2, '0'); }

    function drawStats(g) {
        const lay = LAY.boards[g.index], twoP = app.numPlayers === 2;
        // score above board
        const scoreSize = twoP ? 15 : 20;
        txt('P' + (g.index + 1) + ' ' + g.score.toLocaleString(), lay.bx, lay.by - 12, '#38e8ff', scoreSize);
        // HOLD
        txt('HOLD', lay.holdX, lay.holdY - 8, '#9fb0d8', 10);
        ctx.strokeStyle = 'rgba(120,110,160,0.4)'; ctx.lineWidth = 1.5; ctx.strokeRect(lay.holdX, lay.holdY, lay.holdW, lay.holdH);
        if (g.hold) drawPreview(g.hold, lay.holdX, lay.holdY, lay.holdW, lay.holdH, twoP ? 12 : 16);
        // NEXT
        txt('NEXT', lay.nextX, lay.nextY - 8, '#9fb0d8', 10);
        for (let i = 0; i < lay.nextCount; i++) {
            const ny = lay.nextY + i * lay.nextGap;
            ctx.strokeStyle = 'rgba(120,110,160,0.4)'; ctx.lineWidth = 1.5; ctx.strokeRect(lay.nextX, ny, lay.nextW, lay.nextH);
            if (g.queue[i]) drawPreview(g.queue[i], lay.nextX, ny, lay.nextW, lay.nextH, twoP ? 12 : 16);
        }
        // stat block below hold
        const sx = lay.statX; let sy = lay.holdY + lay.holdH + 24;
        txt('STAGE ' + g.stage, sx, sy, '#ffd166', 12); txt(THEMES[g.ambientTheme].name, sx, sy + 15, '#7a8aaa', 9); sy += 34;
        txt('LINES ' + g.lines, sx, sy, '#7dffb0', 11); sy += 20;
        if (!twoP && g.high) { txt('HI ' + Math.max(g.high, g.score).toLocaleString(), sx, sy, '#ff4d9d', 11); sy += 20; }
        // pieces unlocked
        txt('SHAPES ' + (7 + g.unlockedExtras) + '/' + TOTAL_PIECES, sx, sy, '#9fb0d8', 10); sy += 8;
        const maxed = g.unlockedExtras >= EXTRA_KEYS.length, frac = maxed ? 1 : (g.score % UNLOCK_STEP) / UNLOCK_STEP;
        ctx.strokeStyle = 'rgba(120,110,160,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(sx, sy, 96, 8);
        ctx.fillStyle = maxed ? '#ffd166' : '#ff4d9d'; ctx.fillRect(sx + 1, sy + 1, 94 * frac, 6);
        sy += 24;
        // mode-specific: race goal progress, or survival timer (1P — 2P shows it in the center)
        if (app.mode === 'race') {
            const goal = RACE_GOALS[app.raceGoal];
            txt(goal.bar(g), sx, sy, '#38e8ff', 10); sy += 8;
            ctx.strokeStyle = 'rgba(56,232,255,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(sx, sy, 96, 9);
            ctx.fillStyle = '#38e8ff'; ctx.fillRect(sx + 1, sy + 1, 94 * clamp(goal.metric(g) / goal.target, 0, 1), 7);
        } else if (app.numPlayers === 1) {
            txt('TIME', sx, sy, '#ffd166', 10); txt(fmtTime(app.survivalTime), sx + 42, sy + 1, '#7dffb0', 15); sy += 20;
            txt('SPEED', sx, sy, '#ff5470', 10); sy += 8;
            const spd = clamp(1 - computeInterval(g) / DIFF[app.difficulty].survBase, 0, 1);
            ctx.strokeStyle = 'rgba(255,84,112,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(sx, sy, 96, 9);
            ctx.fillStyle = '#ff5470'; ctx.fillRect(sx + 1, sy + 1, 94 * spd, 7);
        }
    }

    function drawCenter() {
        const c = LAY.center; if (!c) return;
        ctx.textAlign = 'center';
        txt('VS', c.x + c.w / 2, c.y + 40, '#ff4d9d', 26, 'center');
        if (app.mode === 'race') { txt('RACE', c.x + c.w / 2, c.y + 72, '#38e8ff', 12, 'center'); txt(RACE_GOALS[app.raceGoal].center, c.x + c.w / 2, c.y + 90, '#7a8aaa', 10, 'center'); }
        else {
            txt('SURVIVAL', c.x + c.w / 2, c.y + 72, '#ffd166', 12, 'center');
            txt(fmtTime(app.survivalTime), c.x + c.w / 2, c.y + 100, '#7dffb0', 20, 'center');
            const g0 = app.games[0];
            const spd = g0 ? clamp(1 - computeInterval(g0) / DIFF[app.difficulty].survBase, 0, 1) : 0;
            txt('SPEED', c.x + c.w / 2, c.y + 128, '#ff5470', 10, 'center');
            ctx.strokeStyle = 'rgba(255,84,112,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(c.x + c.w / 2 - 48, c.y + 134, 96, 9);
            ctx.fillStyle = '#ff5470'; ctx.fillRect(c.x + c.w / 2 - 47, c.y + 135, 94 * spd, 7);
        }
    }

    function drawMenuAmbient() {
        ctx.save(); ctx.fillStyle = '#bfe8ff';
        for (const a of app.menuAmbient) { const tw = 0.5 + 0.5 * Math.sin(ambT * 1.5 + a.ph); ctx.globalAlpha = 0.07 * tw; ambStar(a.x * LAY.W, a.y * LAY.H, a.s * 14); }
        ctx.restore(); ctx.globalAlpha = 1;
    }

    function render() {
        ctx.clearRect(0, 0, LAY.W, LAY.H);
        if (app.phase === 'menu') { drawMenuAmbient(); return; }
        for (const g of app.games) drawWell(g);
        for (const g of app.games) drawStats(g);
        if (app.numPlayers === 2) drawCenter();
        if (app.phase === 'paused') { ctx.save(); ctx.fillStyle = 'rgba(4,4,20,0.7)'; ctx.fillRect(0, 0, LAY.W, LAY.H); txt('PAUSED', LAY.W / 2, LAY.H / 2, '#ff4d9d', 30, 'center'); txt('P TO RESUME', LAY.W / 2, LAY.H / 2 + 30, '#9fb0d8', 12, 'center'); ctx.restore(); }
    }

    let lastT = 0;
    function loop(ts) {
        const t = ts / 1000, dt = Math.min(0.05, t - lastT || 0.016); lastT = t;
        update(dt); render(); requestAnimationFrame(loop);
    }

    // --- Menu / results -----------------------------------------------------
    function togglePause() {
        if (app.phase === 'playing') app.phase = 'paused';
        else if (app.phase === 'paused') app.phase = 'playing';
    }
    function optRow(label, id, options, current) {
        let h = '<div class="setup-row"><span class="setup-label">' + label + '</span><div class="opt-group" id="' + id + '">';
        for (const o of options) h += '<button class="opt-btn' + (o.val === current ? ' sel' : '') + '" data-val="' + o.val + '">' + o.label + '</button>';
        return h + '</div></div>';
    }
    function showMenu() {
        app.phase = 'menu'; app.games = [];
        computeLayout(); resizeCanvas();
        modalContent.innerHTML =
            '<h1>SHAPE<br>LOCK</h1>' +
            optRow('PLAYERS', 'opt-players', [{ val: 1, label: '1 PLAYER' }, { val: 2, label: '2 PLAYER' }], app.numPlayers) +
            optRow('MODE', 'opt-mode', [{ val: 'race', label: 'RACE' }, { val: 'survival', label: 'SURVIVAL' }], app.mode) +
            (app.mode === 'race' ? optRow('RACE GOAL', 'opt-goal', [{ val: 'points', label: '25K PTS' }, { val: 'pieces', label: '200 PIECES' }, { val: 'lines', label: '25 LINES' }], app.raceGoal) : '') +
            optRow('DIFFICULTY', 'opt-diff', [{ val: 'easy', label: 'EASY' }, { val: 'normal', label: 'NORMAL' }, { val: 'hard', label: 'HARD' }], app.difficulty) +
            '<div class="legend" id="menu-legend"></div>' +
            '<button class="nb-btn" id="play-btn">START</button>';
        wireOpt('opt-players', (v) => { app.numPlayers = +v; localStorage.setItem(LS.players, v); refreshMenu(); });
        wireOpt('opt-mode', (v) => { app.mode = v; localStorage.setItem(LS.mode, v); refreshMenu(); });
        if (document.getElementById('opt-goal')) wireOpt('opt-goal', (v) => { app.raceGoal = v; localStorage.setItem(LS.raceGoal, v); refreshMenu(); });
        wireOpt('opt-diff', (v) => { app.difficulty = v; localStorage.setItem(LS.diff, v); refreshMenu(); });
        document.getElementById('play-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); startMatch(); });
        updateMenuText();
        modal.style.display = 'block';
        hudMode.textContent = 'SHAPE LOCK';
    }
    function refreshMenu() { showMenu(); }
    function updateMenuText() {
        const modeDesc = app.mode === 'race' ? 'First to <b>' + RACE_GOALS[app.raceGoal].menu + '</b> wins.' : 'Gravity ramps up <b>fast</b> — outlast it.';
        const controls = app.numPlayers === 1
            ? 'MOVE <b>&#9668;&#9658;</b> &middot; ROTATE <b>&#9650;/X</b> &middot; FLIP <b>Z</b> &middot; SOFT <b>&#9660;</b> &middot; DROP <b>SPACE</b> &middot; HOLD <b>C</b>'
            : 'P1 <b>WASD</b> + Q flip + <b>SPACE</b> drop + E hold<br>P2 <b>ARROWS</b> + / flip + <b>ENTER</b> drop + RSHIFT hold';
        document.getElementById('menu-legend').innerHTML =
            modeDesc + ' Every <b>5k</b> a harder piece unlocks; every <b>10k</b> a new stage (faster + new backdrop). Stuck high? A <b style="color:#7dffb0">NEURALYZER</b> orb drops in.<br><br>' + controls;
    }
    function wireOpt(id, cb) {
        document.getElementById(id).querySelectorAll('.opt-btn').forEach(b => b.addEventListener('click', () => { ensureAudio(); sfx.select(); cb(b.dataset.val); }));
    }
    function startMatch() {
        computeLayout(); resizeCanvas();
        app.games = []; for (let i = 0; i < app.numPlayers; i++) app.games.push(makeGame(i));
        for (const g of app.games) { initAmbient(g); fillQueue(g); spawnNext(g); }
        app.survivalTime = 0; app.results = null; app.phase = 'playing';
        modal.style.display = 'none';
        hudMode.textContent = (app.numPlayers === 2 ? '2P ' : '') + (app.mode === 'race' ? 'RACE · ' + RACE_GOALS[app.raceGoal].menu : 'SURVIVAL') + ' · ' + DIFF[app.difficulty].label;
        hintText.innerHTML = app.numPlayers === 1
            ? '&#9668;&#9658; MOVE &middot; &#9650;/X ROTATE &middot; Z FLIP &middot; SPACE DROP &middot; C HOLD &middot; P PAUSE'
            : 'P1: WASD / Q / SPACE / E &nbsp;&nbsp; P2: ARROWS / / / ENTER / RSHIFT &nbsp;&nbsp; P PAUSE';
    }
    function showResults(res, isBest) {
        let html;
        if (res.solo) {
            const g = app.games[0];
            const head = res.outcome === 'win' ? 'YOU WIN!' : 'GAME OVER';
            html = '<h1>' + head + '</h1><p>SCORE ' + g.score.toLocaleString() + '<br>STAGE ' + g.stage + ' &middot; ' + g.lines + ' LINES' +
                (app.mode === 'survival' ? '<br>SURVIVED ' + Math.floor(app.survivalTime) + 's' : '') + '</p>' +
                '<p style="color:#ff4d9d">' + (isBest ? 'NEW HIGH SCORE!' : 'HI ' + Math.max(g.high, g.score).toLocaleString()) + '</p>';
        } else {
            const w = res.winner, a = app.games[0], b = app.games[1];
            html = '<h1 style="color:#38e8ff">PLAYER ' + (w + 1) + ' WINS!</h1>' +
                '<p>P1 ' + a.score.toLocaleString() + ' &nbsp; vs &nbsp; P2 ' + b.score.toLocaleString() + (res.bothOut ? '<br>(both topped out)' : '') + '</p>';
        }
        html += '<button class="nb-btn" id="again-btn">PLAY AGAIN</button><button class="nb-btn alt" id="menu-btn">SETTINGS</button>';
        modalContent.innerHTML = html;
        document.getElementById('again-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); startMatch(); });
        document.getElementById('menu-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); showMenu(); });
        modal.style.display = 'block';
    }

    const muteBtn = document.getElementById('mute-btn');
    function updateMute() { muteBtn.textContent = muted ? '\u{1F507}' : '\u{1F50A}'; }
    muteBtn.addEventListener('click', () => { ensureAudio(); muted = !muted; localStorage.setItem(LS.muted, muted ? '1' : '0'); sfx.select(); updateMute(); });
    updateMute();

    // --- Boot ---------------------------------------------------------------
    for (let i = 0; i < 16; i++) app.menuAmbient.push({ x: Math.random(), y: Math.random(), vx: (Math.random() - 0.5) * 0.02, vy: (Math.random() - 0.5) * 0.02, s: 0.5 + Math.random(), ph: Math.random() * 6.28 });
    computeLayout(); resizeCanvas();
    let resizeRAF;
    window.addEventListener('resize', () => { cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(resizeCanvas); });
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
    showMenu();
    requestAnimationFrame(loop);

    // Test hooks
    window.app = app;
    window.startMatchTest = function (players, mode, diff) { app.numPlayers = players || 1; app.mode = mode || 'race'; app.difficulty = diff || 'normal'; startMatch(); };
    window.setScoreTest = function (idx, s) { const g = app.games[idx || 0]; g.score = s; onScore(g); };
    window.spawnKeyTest = function (idx, k) { app.games[idx || 0].cur = pieceFromKey(k); };
    window.giveNeuralyzerTest = function (idx) { app.games[idx || 0].queue.unshift('NEU'); };
</script>
</body>
</html>
