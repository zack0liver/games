<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Galaga Vector Game</title>
    <style>
        /* Retro Vector Aesthetic */
        html, body {
            height: 100%;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: min(700px, 96vw);
            max-height: min(900px, 96vh);
            display: flex;
        }
        #gameCanvas {
            border: 2px solid #0F0;
            background-color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            touch-action: none;
        }

        #back-to-arcade {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            z-index: 1500;
            padding: 6px 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #0F0;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #0F0;
            border-radius: 6px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #back-to-arcade:active {
            background: rgba(0, 255, 0, 0.25);
        }

        /* Basic message box styling for better UX than alert() */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #0F0;
            box-shadow: 0 0 20px #0F0;
            color: #0F0;
            padding: 20px 40px;
            font-size: 24px;
            text-align: center;
            display: none;
            border-radius: 10px;
            z-index: 1000;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            box-sizing: border-box;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            #messageBox {
                font-size: 18px;
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>

    <a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="messageBox"></div>

    <script>
        // Use requestAnimationFrame for smoother game loop
        let animationFrameId;
        let lastFrameTime = 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const messageBox = document.getElementById('messageBox');

        // Game Constants
        const COLOR = '#0F0'; // Neon Green for vector style
        const INITIAL_LIVES = 3;

        // Logical (CSS-pixel) game resolution. Kept separate from canvas.width/
        // height, which are scaled by devicePixelRatio for crisp rendering on
        // mobile/retina screens. These fill whatever space the container gives
        // them (portrait or landscape) instead of a fixed 600x800 box.
        let GAME_WIDTH = 600;
        let GAME_HEIGHT = 800;

        function resizeCanvas() {
            const rect = gameContainer.getBoundingClientRect();
            GAME_WIDTH = Math.max(240, Math.floor(rect.width));
            GAME_HEIGHT = Math.max(320, Math.floor(rect.height));

            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(GAME_WIDTH * dpr);
            canvas.height = Math.floor(GAME_HEIGHT * dpr);
            canvas.style.width = GAME_WIDTH + 'px';
            canvas.style.height = GAME_HEIGHT + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            // Keep an in-progress player within the new bounds immediately
            // rather than waiting for the next input to clamp it.
            if (typeof playerInstance !== 'undefined' && playerInstance) {
                playerInstance.MIN_Y = GAME_HEIGHT - 100;
                playerInstance.MAX_Y = GAME_HEIGHT - 50;
                playerInstance.x = Math.min(playerInstance.x, GAME_WIDTH - playerInstance.width);
                playerInstance.y = Math.min(Math.max(playerInstance.y, playerInstance.MIN_Y), playerInstance.MAX_Y);
            }
        }

        // --- Utility Functions ---
        function showMessage(text, duration = 2000) {
            messageBox.textContent = text;
            messageBox.style.display = 'block';
            if (duration > 0) {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, duration);
            }
        }

        function showModal(text, callback) {
            messageBox.textContent = text;
            messageBox.style.display = 'block';
            cancelAnimationFrame(animationFrameId);

            function dismiss() {
                window.removeEventListener('keydown', keyHandler);
                messageBox.removeEventListener('pointerdown', dismiss);
                messageBox.style.display = 'none';
                callback();
                lastFrameTime = performance.now();
                gameLoop(lastFrameTime);
            }

            function keyHandler(e) {
                // Ignore OS auto-repeat from a key that was already held down
                // when the modal appeared (e.g. still holding a movement key
                // at the moment of death), so it can't instantly dismiss this.
                if (e.repeat) return;
                dismiss();
            }
            window.addEventListener('keydown', keyHandler);
            // Tapping anywhere on the message box restarts on touch devices,
            // which have no keyboard to press.
            messageBox.addEventListener('pointerdown', dismiss);
        }

        function checkCollision(objA, objB) {
            // Check collision between two objects based on their x, y, width, and height properties
            return objA.x < objB.x + objB.width &&
                   objA.x + objA.width > objB.x &&
                   objA.y < objB.y + objB.height &&
                   objA.y + objA.height > objB.y;
        }

        // --- Player Class ---
        class Player {
            constructor() {
                this.width = 30;
                this.height = 30;
                this.x = (GAME_WIDTH / 2) - (this.width / 2);
                // Initial Y position
                this.y = GAME_HEIGHT - 50; 
                this.speed = 7;
                this.dx = 0; // horizontal movement
                this.dy = 0; // vertical movement
                this.fireCooldown = 200;
                this.lastFireTime = 0;

                // Define vertical movement bounds (100px range)
                this.MIN_Y = GAME_HEIGHT - 100;
                this.MAX_Y = GAME_HEIGHT - 50;
            }

            draw() {
                ctx.strokeStyle = COLOR;
                ctx.fillStyle = 'rgba(0, 255, 0, 0.2)'; // Faint fill to make it visible
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                // Ship shape: triangle
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.closePath();
                ctx.stroke();
                ctx.fill();
            }

            update(dt) {
                const f = dt * 60; // normalizes original 60fps-tuned speeds to real time
                // Apply horizontal movement
                this.x += this.dx * f;
                // Apply vertical movement
                this.y += this.dy * f;

                // Clamp horizontal position
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > GAME_WIDTH) this.x = GAME_WIDTH - this.width;

                // Clamp vertical position within the defined range
                if (this.y < this.MIN_Y) this.y = this.MIN_Y;
                if (this.y > this.MAX_Y) this.y = this.MAX_Y;
            }
        }

        // --- Player Bullet Class ---
        class PlayerBullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 3;
                this.height = 10;
                this.speed = 10;
                this.alive = true;
            }

            draw() {
                ctx.fillStyle = COLOR;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update(dt) {
                this.y -= this.speed * dt * 60;
            }
        }

        // --- Enemy Bullet Class ---
        class EnemyBullet {
            constructor(x, y, targetX) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 8;
                this.speed = 5;
                this.alive = true;
                // Simple targeting vector
                const angle = Math.atan2(playerInstance.y + playerInstance.height / 2 - y, targetX - x);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
            }

            draw() {
                ctx.strokeStyle = '#F00'; // Red bullet
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.stroke();
            }

            update(dt) {
                const f = dt * 60;
                this.x += this.vx * f;
                this.y += this.vy * f;
            }
        }


        // --- Enemy Class ---
        class Enemy {
            constructor(x, y, initialCol, initialRow, levelSpeed) {
                this.x = x;
                this.y = y;
                this.initialX = x;
                this.initialY = y;
                this.col = initialCol;
                this.row = initialRow;
                this.size = 25;
                this.alive = true;
                this.moveDirection = 1;
                this.formationSpeed = 0.5 + levelSpeed * 0.15;
                this.scoreValue = 100;
                
                // CRITICAL FIX: Add width and height for generic collision checking
                this.width = this.size;
                this.height = this.size; 

                // Dive variables
                this.isDiving = false;
                this.diveSpeed = 4;
                this.diveTargetX = 0;
                this.diveTargetY = GAME_HEIGHT + 50;
                this.diveCooldown = 5000 + Math.random() * 5000; // 5 to 10 seconds
                this.lastDiveTime = Date.now() + this.col * 500; // Stagger initial dives
                
                this.canFire = true;
                this.fireRate = 1500; // Fire every 1.5 seconds when diving
                this.lastFireTime = Date.now() + Math.random() * 1000;
            }

            draw() {
                if (!this.alive) return;
                ctx.strokeStyle = this.isDiving ? '#FF0' : COLOR; // Yellow border when diving
                ctx.lineWidth = 2;
                
                // Enemy shape: simple square with internal X and a central dot
                ctx.strokeRect(this.x, this.y, this.size, this.size);
                
                // Internal cross
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.size, this.y + this.size);
                ctx.moveTo(this.x + this.size, this.y);
                ctx.lineTo(this.x, this.y + this.size);
                ctx.stroke();

                // Central Core
                ctx.fillStyle = this.isDiving ? '#FF0' : COLOR;
                ctx.beginPath();
                ctx.arc(this.x + this.size / 2, this.y + this.size / 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            update(dt, maxX, minX) {
                if (!this.alive) return;
                const f = dt * 60;

                if (!this.isDiving) {
                    // --- FORMATION MOVEMENT ---
                    this.x += this.formationSpeed * this.moveDirection * f;

                    // Wall bouncing and downward shift for formation
                    if (this.x + this.size >= maxX || this.x <= minX) {
                        this.moveDirection *= -1; // Reverse direction
                        this.y += 15; // Drop down slightly
                    }

                    // Check if it's time to dive. Expressed as a chance per
                    // second (not per frame) so higher refresh-rate mobile
                    // screens don't trigger dives more often than 60Hz ones.
                    if (Date.now() - this.lastDiveTime > this.diveCooldown && Math.random() < 0.3 * dt) {
                        this.startDive();
                    }

                } else {
                    // --- DIVING MOVEMENT ---
                    // Simple straight line dive towards the bottom edge
                    this.y += this.diveSpeed * f;

                    // Fire when diving
                    if (Date.now() - this.lastFireTime > this.fireRate) {
                        enemyFire(this);
                        this.lastFireTime = Date.now();
                    }

                    // Reset dive if it goes off screen
                    if (this.y > GAME_HEIGHT + 20) {
                        this.resetToFormation();
                    }
                }
            }
            
            startDive() {
                this.isDiving = true;
                // Target the center X of the player at the moment of dive start
                this.diveTargetX = playerInstance.x + playerInstance.width / 2;
                this.diveTargetY = GAME_HEIGHT + 50; 
                this.diveSpeed = 4 + gameLevel * 0.5; // Dive speed increases with level
            }

            resetToFormation() {
                this.isDiving = false;
                // Reset to initial formation position
                this.x = this.initialX;
                this.y = this.initialY;
                this.lastDiveTime = Date.now();
                this.diveCooldown = 5000 + Math.random() * 5000;
            }
        }

        // --- Game State Variables ---
        let playerInstance;
        let playerBullets = [];
        let enemyBullets = [];
        let enemies = [];
        let score = 0;
        let lives = INITIAL_LIVES;
        let gameLevel = 1;

        // --- Setup Enemies (Initial Formation) ---
        function setupEnemies() {
            const rows = 4;
            const spacing = 55;
            const enemySize = 25;
            // Fit the formation to whatever width the screen actually has
            // (narrow phones get fewer columns) instead of a fixed 8 that can
            // overflow a narrow portrait viewport.
            const cols = Math.max(4, Math.min(8, Math.floor((GAME_WIDTH - 40) / spacing)));

            const formationWidth = cols * spacing;
            const startX = (GAME_WIDTH - formationWidth + spacing - enemySize) / 2;
            const startY = 80;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = startX + c * spacing;
                    const y = startY + r * spacing;
                    enemies.push(new Enemy(x, y, c, r, gameLevel));
                }
            }
        }

        // --- Game Initialization and Reset ---
        function resetGame() {
            playerInstance = new Player();
            playerBullets = [];
            enemyBullets = [];
            enemies = [];
            score = 0;
            lives = INITIAL_LIVES;
            gameLevel = 1;
            setupEnemies();
            // Defensive reset in case a previous session ended without a
            // clean pointerup/cancel for the steering finger.
            moveTouchId = null;
            lastTouchPos = null;
        }

        function advanceLevel() {
            gameLevel++;
            showMessage(`LEVEL ${gameLevel} START!`, 1500);
            playerBullets = [];
            enemyBullets = [];
            enemies = [];
            setupEnemies();
        }
        
        function playerHit() {
            lives--;
            if (lives <= 0) {
                showModal(`GAME OVER! Final Score: ${score}. Press any key or tap to restart.`, resetGame);
            } else {
                showMessage(`HIT! ${lives} lives remaining.`, 1500);
                // Reset player position and clear enemy bullets upon hit
                playerInstance = new Player();
                enemyBullets = [];
            }
        }


        // --- Input Handling ---
        // The ship auto-fires continuously (see update()), so every direction
        // key is free for movement instead of splitting Up/W between "fire"
        // and "move up" as before.
        const keys = {};

        function handleKeyDown(e) {
            keys[e.key] = true;

            // Prevent default action for game controls
            if ([' ', 'ArrowUp', 'w', 'ArrowDown', 's', 'ArrowLeft', 'a', 'ArrowRight', 'd'].includes(e.key)) {
                 e.preventDefault();
            }
        }

        function handleKeyUp(e) {
            keys[e.key] = false;
        }

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);

        // Escape always returns to the arcade landing page, regardless of
        // whether a game is actively running or a modal (game over, etc.) is showing.
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'index.html';
            }
        });

        // --- Touch Drag Controls ---
        // Press anywhere on the canvas and drag; the ship moves by the same
        // delta as the finger each event, rather than jumping straight to the
        // touch point. Firing is automatic (see update()), so movement is the
        // only thing touch needs to do.
        let lastTouchPos = null;
        let moveTouchId = null;

        function canvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function setupTouchDragControls() {
            canvas.addEventListener('pointerdown', (e) => {
                if (!playerInstance || lives <= 0 || moveTouchId !== null) return;
                e.preventDefault();
                moveTouchId = e.pointerId;
                lastTouchPos = canvasPos(e);
                try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
            });

            canvas.addEventListener('pointermove', (e) => {
                if (e.pointerId !== moveTouchId || !lastTouchPos || !playerInstance) return;
                e.preventDefault();
                const pos = canvasPos(e);
                const dx = pos.x - lastTouchPos.x;
                const dy = pos.y - lastTouchPos.y;
                lastTouchPos = pos;

                let x = playerInstance.x + dx;
                let y = playerInstance.y + dy;
                x = Math.min(Math.max(x, 0), GAME_WIDTH - playerInstance.width);
                y = Math.min(Math.max(y, playerInstance.MIN_Y), playerInstance.MAX_Y);
                playerInstance.x = x;
                playerInstance.y = y;
            });

            const endTouch = (e) => {
                if (e.pointerId !== moveTouchId) return;
                moveTouchId = null;
                lastTouchPos = null;
            };
            canvas.addEventListener('pointerup', endTouch);
            canvas.addEventListener('pointercancel', endTouch);
        }

        function firePlayerBullet() {
            const now = Date.now();
            if (now - playerInstance.lastFireTime > playerInstance.fireCooldown) {
                // Fire two bullets from the corners of the player ship
                playerBullets.push(new PlayerBullet(playerInstance.x + 5, playerInstance.y));
                playerBullets.push(new PlayerBullet(playerInstance.x + playerInstance.width - 8, playerInstance.y));
                playerInstance.lastFireTime = now;
            }
        }

        function enemyFire(enemy) {
            if (Math.random() < 0.8) { // 80% chance to fire straight down
                // Enemy bullets now target the player's current location to make them more challenging
                enemyBullets.push(new EnemyBullet(enemy.x + enemy.size / 2, enemy.y + enemy.size, playerInstance.x + playerInstance.width/2));
            }
        }

        // --- Update Game Objects ---
        function update(dt) {
            if (lives <= 0) return;

            // 1. Handle Player Movement
            playerInstance.dx = 0;
            playerInstance.dy = 0;

            // Horizontal movement
            if (keys['ArrowLeft'] || keys['a']) playerInstance.dx = -playerInstance.speed;
            if (keys['ArrowRight'] || keys['d']) playerInstance.dx = playerInstance.speed;

            // Vertical movement
            if (keys['ArrowDown'] || keys['s']) playerInstance.dy = playerInstance.speed;
            if (keys['ArrowUp'] || keys['w']) playerInstance.dy = -playerInstance.speed;

            // Touch dragging (see setupTouchDragControls) moves the ship
            // directly on pointermove rather than through dx/dy, so it isn't
            // affected by keyboard state here.
            playerInstance.update(dt);

            // The ship auto-fires continuously; players only worry about
            // dodging and positioning, which reads better on a touchscreen
            // than juggling a separate fire input.
            firePlayerBullet();

            // 2. Update Bullets
            playerBullets.forEach(bullet => bullet.update(dt));
            enemyBullets.forEach(bullet => bullet.update(dt));

            // Remove off-screen bullets
            playerBullets = playerBullets.filter(bullet => bullet.y > -bullet.height);
            enemyBullets = enemyBullets.filter(bullet => bullet.y < GAME_HEIGHT);

            // 3. Update Enemies
            const padding = 10;
            const minX = padding;
            const maxX = GAME_WIDTH - padding;
            enemies.forEach(enemy => enemy.update(dt, maxX, minX));

            // 4. Handle Collisions

            // 4a. Player Bullet -> Enemy Collision. Mark-and-filter (rather
            // than splicing mid-forEach) avoids skipped array indices and
            // lets a bullet only ever destroy the first enemy it touches.
            playerBullets.forEach(bullet => {
                if (!bullet.alive) return;
                enemies.forEach(enemy => {
                    if (!enemy.alive || !bullet.alive) return;
                    if (checkCollision(bullet, enemy)) {
                        enemy.alive = false;
                        bullet.alive = false;
                        score += enemy.scoreValue;
                    }
                });
            });
            playerBullets = playerBullets.filter(bullet => bullet.alive);

            // 4b. Enemy Bullet -> Player Collision
            enemyBullets.forEach(bullet => {
                if (!bullet.alive) return;
                if (checkCollision(bullet, playerInstance)) {
                    bullet.alive = false;
                    playerHit();
                }
            });
            enemyBullets = enemyBullets.filter(bullet => bullet.alive);

            // 4c. Enemy (Diving or Formation) -> Player Collision (New Loss Condition)
            enemies.forEach(enemy => {
                if (checkCollision(enemy, playerInstance)) {
                    // Direct collision with the player means immediate hit
                    playerHit();
                    enemy.alive = false;
                }
            });


            // 5. Remove dead enemies
            const initialEnemyCount = enemies.length;
            enemies = enemies.filter(enemy => enemy.alive);

            // Reset diving enemies that went off screen
            enemies.forEach(enemy => {
                if (enemy.isDiving && enemy.y > GAME_HEIGHT) {
                    enemy.resetToFormation();
                }
            });


            // 6. Check Win Condition
            if (enemies.length === 0 && initialEnemyCount > 0) {
                // Level cleared
                advanceLevel();
            }

            // Removed: Old loss condition for enemies reaching the bottom line. Now only direct collision counts.
        }

        // --- Draw Game Objects ---
        function draw() {
            // Clear canvas with a slight trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw Score and Info (font scales down a little on narrow screens)
            const fontSize = Math.max(16, Math.min(24, Math.round(GAME_WIDTH / 22)));
            ctx.fillStyle = COLOR;
            ctx.font = `${fontSize}px Courier New`;
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 10, fontSize + 6);
            ctx.fillText(`LIVES: ${lives}`, 10, (fontSize + 6) * 2);

            ctx.textAlign = 'right';
            ctx.fillText(`LEVEL: ${gameLevel}`, GAME_WIDTH - 10, fontSize + 6);
            ctx.textAlign = 'left';

            // Draw Bullets, Enemies, and Player
            enemyBullets.forEach(bullet => bullet.draw());
            playerBullets.forEach(bullet => bullet.draw());
            enemies.forEach(enemy => enemy.draw());
            playerInstance.draw();
        }

        // --- Main Game Loop ---
        function gameLoop(currentTime) {
            // Clamp dt so a backgrounded tab/phone lock screen doesn't cause a
            // huge simulation jump (a wave of enemies suddenly diving, bullets
            // teleporting past the player, etc).
            const dt = Math.min((currentTime - lastFrameTime) / 1000, 0.05) || 0;
            lastFrameTime = currentTime;

            update(dt);
            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // Auto-pause when the tab/app is backgrounded, and resync the frame
        // clock on return so the pause itself doesn't count as elapsed dt.
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cancelAnimationFrame(animationFrameId);
            } else if (lives > 0) {
                lastFrameTime = performance.now();
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        });

        // Ensure the game starts when the window is fully loaded
        window.onload = function () {
            resizeCanvas();
            let resizeRAF;
            window.addEventListener('resize', () => {
                cancelAnimationFrame(resizeRAF);
                resizeRAF = requestAnimationFrame(resizeCanvas);
            });
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

            resetGame();
            setupTouchDragControls();
            showMessage("Drag to move, auto-fire is on. (Keyboard: Arrows/WASD to move)", 3500);
            lastFrameTime = performance.now();
            gameLoop(lastFrameTime);
        }

    </script>
</body>
</html>
