<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simple Galaga Vector Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Retro Pixel-Arcade Aesthetic */
        html, body {
            height: 100%;
        }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: min(700px, 96vw);
            max-height: min(900px, 96vh);
            display: flex;
        }
        #gameCanvas {
            border: 2px solid #0F0;
            background-color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            touch-action: none;
            image-rendering: pixelated;
        }

        #back-to-arcade {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            z-index: 1500;
            padding: 6px 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #0F0;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #0F0;
            border-radius: 6px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #back-to-arcade:active {
            background: rgba(0, 255, 0, 0.25);
        }

        /* Basic message box styling for better UX than alert() */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #0F0;
            box-shadow: 0 0 20px #0F0;
            color: #0F0;
            padding: 20px 40px;
            font-size: 24px;
            text-align: center;
            display: none;
            border-radius: 10px;
            z-index: 1000;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
            box-sizing: border-box;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            #messageBox {
                font-size: 18px;
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>

    <a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="messageBox"></div>

    <script src="highscores.js"></script>
    <script>
        // Use requestAnimationFrame for smoother game loop
        let animationFrameId;
        let lastFrameTime = 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const messageBox = document.getElementById('messageBox');

        // Game Constants
        const COLOR = '#0F0'; // Neon Green for vector style
        const INITIAL_LIVES = 3;

        // Logical (CSS-pixel) game resolution. Kept separate from canvas.width/
        // height, which are scaled by devicePixelRatio for crisp rendering on
        // mobile/retina screens. These fill whatever space the container gives
        // them (portrait or landscape) instead of a fixed 600x800 box.
        let GAME_WIDTH = 600;
        let GAME_HEIGHT = 800;
        // Pixel scale for sprite art: each sprite pixel is PIX screen pixels,
        // so the art stays chunky/arcade-crisp at any screen size.
        let PIX = 3;

        function resizeCanvas() {
            const rect = gameContainer.getBoundingClientRect();
            GAME_WIDTH = Math.max(240, Math.floor(rect.width));
            GAME_HEIGHT = Math.max(320, Math.floor(rect.height));
            PIX = Math.max(2, Math.round(GAME_WIDTH / 240));

            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(GAME_WIDTH * dpr);
            canvas.height = Math.floor(GAME_HEIGHT * dpr);
            canvas.style.width = GAME_WIDTH + 'px';
            canvas.style.height = GAME_HEIGHT + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            // Nearest-neighbor scaling keeps the sprite pixels sharp. This is
            // context state, so it must be re-set after every canvas resize.
            ctx.imageSmoothingEnabled = false;
            initStars();

            // Keep an in-progress player within the new bounds immediately
            // rather than waiting for the next input to clamp it.
            if (typeof playerInstance !== 'undefined' && playerInstance) {
                playerInstance.MIN_Y = GAME_HEIGHT - 100;
                playerInstance.MAX_Y = GAME_HEIGHT - 50;
                playerInstance.x = Math.min(playerInstance.x, GAME_WIDTH - playerInstance.width);
                playerInstance.y = Math.min(Math.max(playerInstance.y, playerInstance.MIN_Y), playerInstance.MAX_Y);
            }
        }

        // --- Utility Functions ---
        function showMessage(text, duration = 2000) {
            messageBox.textContent = text;
            messageBox.style.display = 'block';
            if (duration > 0) {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, duration);
            }
        }

        function showModal(text, callback) {
            messageBox.textContent = text;
            messageBox.style.display = 'block';
            cancelAnimationFrame(animationFrameId);

            function dismiss() {
                window.removeEventListener('keydown', keyHandler);
                messageBox.removeEventListener('pointerdown', dismiss);
                messageBox.style.display = 'none';
                callback();
                lastFrameTime = performance.now();
                gameLoop(lastFrameTime);
            }

            function keyHandler(e) {
                // Ignore OS auto-repeat from a key that was already held down
                // when the modal appeared (e.g. still holding a movement key
                // at the moment of death), so it can't instantly dismiss this.
                if (e.repeat) return;
                dismiss();
            }
            window.addEventListener('keydown', keyHandler);
            // Tapping anywhere on the message box restarts on touch devices,
            // which have no keyboard to press.
            messageBox.addEventListener('pointerdown', dismiss);
        }

        function checkCollision(objA, objB) {
            // Check collision between two objects based on their x, y, width, and height properties
            return objA.x < objB.x + objB.width &&
                   objA.x + objA.width > objB.x &&
                   objA.y < objB.y + objB.height &&
                   objA.y + objA.height > objB.y;
        }

        // --- Pixel Sprite Art ---
        // Each sprite is rows of characters; '.' is transparent, letters map
        // to palette colors. Two frames per enemy = classic wing-flap at ~4Hz.
        const SPRITE_DEFS = {
            bee: [[
                '..w.....w..',
                '...w...w...',
                '..bbbbbbb..',
                '.wbbebebbw.',
                'wwbbbbbbbww',
                '.w.bbbbb.w.',
                '....b.b....',
                '...b...b...'
            ], [
                '..w.....w..',
                '...w...w...',
                '..bbbbbbb..',
                '..wbebebw..',
                '.wwbbbbbww.',
                '..w.bbb.w..',
                '....b.b....',
                '....b.b....'
            ]],
            butterfly: [[
                '..w.......w..',
                '.ww..bbb..ww.',
                '.www.bbb.www.',
                'wwwwbbebbwwww',
                '.wwwbbbbbwww.',
                '..wwbb.bbww..',
                '...w.b.b.w...',
                '....w...w....'
            ], [
                '..w.......w..',
                '..w..bbb..w..',
                '..ww.bbb.ww..',
                '.wwwbbebbwww.',
                '..wwbbbbbww..',
                '...wbb.bbw...',
                '....w.b.w....',
                '....w...w....'
            ]],
            boss: [[
                '....w.....w....',
                '....ww...ww....',
                '..wwbbbbbbbww..',
                '.wwbbebbbebbww.',
                'wwbbbbbbbbbbbww',
                'wwbbb.bbb.bbbww',
                '.wbb..bbb..bbw.',
                '..w...b.b...w..',
                '......b.b......',
                '.....b...b.....'
            ], [
                '....w.....w....',
                '....ww...ww....',
                '...wbbbbbbbw...',
                '..wbbebbbebbw..',
                '.wwbbbbbbbbbww.',
                '.wbbb.bbb.bbbw.',
                '..wb..bbb..bw..',
                '...w..b.b..w...',
                '......b.b......',
                '.....b...b.....'
            ]],
            player: [[
                '......h......',
                '.....hhh.....',
                '.....hch.....',
                '..h..hch..h..',
                '..h.hhhhh.h..',
                '..hhhhchhhh..',
                '.hhhhhchhhhh.',
                'hhh.hhhhh.hhh',
                'hh..hhhhh..hh',
                'h....h.h....h'
            ]]
        };

        // Classic-inspired palette (yellow/red bees, red/white butterflies,
        // green/blue bosses that turn purple when damaged).
        const PALETTES = {
            bee: { w: '#ff3333', b: '#ffdd33', e: '#4488ff' },
            butterfly: { w: '#ff4444', b: '#eeeeff', e: '#ffdd22' },
            boss: { w: '#33cc66', b: '#4455ff', e: '#ffdd22' },
            bossHit: { w: '#cc44ff', b: '#8833cc', e: '#ffdd22' },
            player: { h: '#e8f0ff', c: '#ff3344' }
        };
        const ENEMY_ACCENT = { bee: '#ffdd33', butterfly: '#ff4444', boss: '#33cc66' };

        function makeSprite(rows, colors) {
            const c = document.createElement('canvas');
            c.width = rows[0].length;
            c.height = rows.length;
            const g = c.getContext('2d');
            for (let y = 0; y < rows.length; y++) {
                for (let x = 0; x < rows[y].length; x++) {
                    const ch = rows[y][x];
                    if (ch === '.') continue;
                    g.fillStyle = colors[ch] || '#fff';
                    g.fillRect(x, y, 1, 1);
                }
            }
            return c;
        }

        let spriteCache = {};
        function buildSpriteCache(palettes) {
            spriteCache = {
                bee: SPRITE_DEFS.bee.map(f => makeSprite(f, palettes.bee)),
                butterfly: SPRITE_DEFS.butterfly.map(f => makeSprite(f, palettes.butterfly)),
                boss: SPRITE_DEFS.boss.map(f => makeSprite(f, palettes.boss)),
                bossHit: SPRITE_DEFS.boss.map(f => makeSprite(f, palettes.bossHit)),
                player: SPRITE_DEFS.player.map(f => makeSprite(f, palettes.player))
            };
        }

        // --- Scrolling Starfield ---
        const STAR_COLORS = ['#ffffff', '#66ccff', '#ff6688', '#ffee66', '#66ff99', '#cc88ff'];
        let stars = [];
        function initStars() {
            stars = Array.from({ length: 70 }, () => ({
                x: Math.random() * GAME_WIDTH,
                y: Math.random() * GAME_HEIGHT,
                speed: 20 + Math.random() * 60,
                size: Math.random() < 0.3 ? 2 : 1,
                color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)],
                tw: Math.random() * Math.PI * 2
            }));
        }

        // --- Explosion Particles ---
        let particles = [];
        function spawnExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const sp = 40 + Math.random() * 160;
                particles.push({
                    x, y,
                    vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
                    life: 0.35 + Math.random() * 0.3, age: 0,
                    color: Math.random() < 0.3 ? '#ffffff' : color,
                    size: PIX * (Math.random() < 0.5 ? 1 : 2)
                });
            }
        }

        // --- Player Class ---
        class Player {
            constructor() {
                this.width = 30;
                this.height = 30;
                this.x = (GAME_WIDTH / 2) - (this.width / 2);
                // Initial Y position
                this.y = GAME_HEIGHT - 50; 
                this.speed = 7;
                this.dx = 0; // horizontal movement
                this.dy = 0; // vertical movement
                this.fireCooldown = 260;
                this.lastFireTime = 0;

                // Define vertical movement bounds (100px range)
                this.MIN_Y = GAME_HEIGHT - 100;
                this.MAX_Y = GAME_HEIGHT - 50;

                // Brief spawn protection so a diver can't instantly re-kill
                // the fresh ship. Rendered as a classic blink.
                this.invuln = 0;
            }

            draw() {
                if (this.invuln > 0 && Math.floor(performance.now() / 100) % 2) return;
                const spr = spriteCache.player[0];
                const w = spr.width * PIX, h = spr.height * PIX;
                ctx.drawImage(spr, this.x + this.width / 2 - w / 2, this.y + this.height / 2 - h / 2, w, h);
            }

            update(dt) {
                if (this.invuln > 0) this.invuln -= dt;
                const f = dt * 60; // normalizes original 60fps-tuned speeds to real time
                // Apply horizontal movement
                this.x += this.dx * f;
                // Apply vertical movement
                this.y += this.dy * f;

                // Clamp horizontal position
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > GAME_WIDTH) this.x = GAME_WIDTH - this.width;

                // Clamp vertical position within the defined range
                if (this.y < this.MIN_Y) this.y = this.MIN_Y;
                if (this.y > this.MAX_Y) this.y = this.MAX_Y;
            }
        }

        // --- Player Bullet Class ---
        class PlayerBullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 3;
                this.height = 10;
                this.speed = 10;
                this.alive = true;
            }

            draw() {
                // White missile with a red tip, drawn on the pixel grid
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(this.x, this.y, PIX, PIX);
                ctx.fillStyle = '#f8f8ff';
                ctx.fillRect(this.x, this.y + PIX, PIX, PIX * 3);
            }

            update(dt) {
                this.y -= this.speed * dt * 60;
            }
        }

        // --- Enemy Bullet Class ---
        class EnemyBullet {
            constructor(x, y, targetX) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 8;
                this.speed = 5;
                this.alive = true;
                // Simple targeting vector
                const angle = Math.atan2(playerInstance.y + playerInstance.height / 2 - y, targetX - x);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
            }

            draw() {
                // Two stacked pixels, magenta-red like the arcade zigzag bolt
                ctx.fillStyle = '#ff5599';
                ctx.fillRect(this.x, this.y, PIX, PIX * 2);
                ctx.fillStyle = '#ff2222';
                ctx.fillRect(this.x, this.y + PIX * 2, PIX, PIX);
            }

            update(dt) {
                const f = dt * 60;
                this.x += this.vx * f;
                this.y += this.vy * f;
            }
        }


        // --- Enemy Class ---
        class Enemy {
            constructor(colOffset, row, type, level) {
                // colOffset is the signed distance (in columns) from the
                // formation's center line, so rows with different counts stay
                // centered and "breathe" around the same axis.
                this.colOffset = colOffset;
                this.row = row;
                this.size = 25;
                this.alive = true;

                // Classic type ladder: bosses take 2 hits and are worth the
                // most, butterflies mid-tier, bees the swarm fodder.
                this.type = type || 'bee';
                this.hp = this.type === 'boss' ? 2 : 1;
                this.damaged = false;
                this.scoreValue = { bee: 50, butterfly: 80, boss: 150 }[this.type];

                // CRITICAL FIX: Add width and height for generic collision checking
                this.width = this.size;
                this.height = this.size;

                // Flight state machine: waiting (offscreen, pre-entry) ->
                // entering (swoop-in along a bezier) -> formation <-> diving
                // (attack run) -> returning (glide back to slot).
                this.state = 'waiting';
                this.delay = 0;
                this.entryKind = 0;
                this.x = -100;
                this.y = -100;
                this.angle = 0;
                this.path = null;
                this.pathT = 0;
                this.pathDur = 1;
                this.diveDelay = 0;
                this.shootMarks = [];
                this.isDiving = false;
            }

            beginEntry() {
                this.path = entryPath(this.entryKind, slotPos(this));
                this.pathT = 0;
                this.pathDur = 1.4 + Math.random() * 0.3;
                this.state = 'entering';
            }

            startDive(delay) {
                this.state = 'diving';
                this.isDiving = true;
                this.diveDelay = delay || 0;
                this.path = null; // built when the stagger delay elapses, from live positions
            }

            beginDivePath() {
                // Pull up and to the side first, then swoop through where the
                // player is, exiting below — with jitter so no two dives match.
                const px = playerInstance.x + playerInstance.width / 2;
                const side = Math.random() < 0.5 ? -1 : 1;
                this.path = {
                    p0: { x: this.x, y: this.y },
                    p1: { x: this.x + side * (40 + Math.random() * 60), y: this.y - (40 + Math.random() * 50) },
                    p2: { x: px + (Math.random() - 0.5) * 160, y: GAME_HEIGHT * (0.5 + Math.random() * 0.2) },
                    p3: { x: px + (Math.random() - 0.5) * 240, y: GAME_HEIGHT + 60 }
                };
                this.pathT = 0;
                this.pathDur = (1.7 + Math.random() * 0.5) / (1 + (gameLevel - 1) * 0.06);
                this.shootMarks = [];
                if (Math.random() < 0.85) this.shootMarks.push(0.3 + Math.random() * 0.2);
                if (Math.random() < 0.5) this.shootMarks.push(0.6 + Math.random() * 0.25);
            }

            draw() {
                if (!this.alive || this.state === 'waiting') return;
                const key = (this.type === 'boss' && this.damaged) ? 'bossHit' : this.type;
                const frames = spriteCache[key];
                // Wing-flap animation; divers flap twice as fast for urgency
                const rate = this.isDiving ? 120 : 250;
                const spr = frames[Math.floor(performance.now() / rate) % frames.length];
                const w = spr.width * PIX, h = spr.height * PIX;
                // Bank/rotate the sprite along its flight path
                ctx.save();
                ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
                ctx.rotate(this.angle);
                ctx.drawImage(spr, -w / 2, -h / 2, w, h);
                ctx.restore();
            }

            update(dt) {
                if (!this.alive) return;
                switch (this.state) {
                    case 'waiting':
                        this.delay -= dt;
                        if (this.delay <= 0) this.beginEntry();
                        break;

                    case 'entering':
                    case 'diving': {
                        // Group divers hold formation until their stagger
                        // delay elapses, then plot a path from live positions.
                        if (this.state === 'diving' && !this.path) {
                            this.diveDelay -= dt;
                            const slot = slotPos(this);
                            this.x = slot.x;
                            this.y = slot.y;
                            if (this.diveDelay <= 0) this.beginDivePath();
                            break;
                        }
                        const prevT = this.pathT;
                        this.pathT = Math.min(1, this.pathT + dt / this.pathDur);
                        const p = bezier(this.path, this.pathT);
                        const q = bezier(this.path, Math.min(1, this.pathT + 0.02));
                        this.x = p.x;
                        this.y = p.y;
                        // Bank the ship along the flight path (sprite faces up)
                        let ang = Math.atan2(q.y - p.y, q.x - p.x) + Math.PI / 2;
                        if (this.state === 'entering' && this.pathT > 0.8) {
                            ang *= 1 - (this.pathT - 0.8) / 0.2; // level out into the slot
                        }
                        this.angle = ang;

                        if (this.state === 'diving') {
                            this.shootMarks = this.shootMarks.filter(m => {
                                if (this.pathT >= m && prevT < m) { enemyFire(this); return false; }
                                return true;
                            });
                        }

                        if (this.pathT >= 1) {
                            if (this.state === 'entering') {
                                this.state = 'formation';
                                this.angle = 0;
                            } else {
                                // Exited the bottom: wrap to the top and glide home
                                this.state = 'returning';
                                this.isDiving = false;
                                const slot = slotPos(this);
                                this.x = slot.x + (Math.random() - 0.5) * 60;
                                this.y = -40;
                            }
                        }
                        break;
                    }

                    case 'returning': {
                        // Home toward the live slot so the breathing formation
                        // never leaves a returner chasing a stale position.
                        const slot = slotPos(this);
                        const dx = slot.x - this.x, dy = slot.y - this.y;
                        const dist = Math.hypot(dx, dy);
                        const speed = 180 + gameLevel * 8;
                        if (dist < Math.max(speed * dt, 3)) {
                            this.x = slot.x;
                            this.y = slot.y;
                            this.state = 'formation';
                            this.angle = 0;
                        } else {
                            this.x += dx / dist * speed * dt;
                            this.y += dy / dist * speed * dt;
                            this.angle = Math.atan2(dy, dx) + Math.PI / 2;
                        }
                        break;
                    }

                    case 'formation': {
                        const slot = slotPos(this);
                        this.x = slot.x;
                        this.y = slot.y;
                        this.angle = 0;
                        break;
                    }
                }
            }
        }

        // --- Game State Variables ---
        let playerInstance;
        let playerBullets = [];
        let enemyBullets = [];
        let enemies = [];
        let score = 0;
        let lives = INITIAL_LIVES;
        let gameLevel = 1;
        let highScore = HS.getBoard('galaga', 'galagaHighScore').personalBest.score;

        // --- Formation & Flight Paths ---
        let formationT = 0;   // drives the formation's sway/breathe motion
        let diveTimer = 1.5;  // countdown to the next attack launch

        // Live slot position for an enemy: the whole formation sways side to
        // side and "breathes" (expands/contracts) like the arcade original.
        function slotPos(e) {
            const spacingX = PIX * 16;
            const spacingY = PIX * 14;
            const sway = Math.sin(formationT * 0.5) * GAME_WIDTH * 0.03;
            const breathe = 1 + Math.sin(formationT * 0.8) * 0.06;
            return {
                x: GAME_WIDTH / 2 + sway + e.colOffset * spacingX * breathe - e.size / 2,
                y: 70 + e.row * spacingY - e.size / 2
            };
        }

        function bezier(path, t) {
            const u = 1 - t;
            const a = u * u * u, b = 3 * u * u * t, c = 3 * u * t * t, d = t * t * t;
            return {
                x: a * path.p0.x + b * path.p1.x + c * path.p2.x + d * path.p3.x,
                y: a * path.p0.y + b * path.p1.y + c * path.p2.y + d * path.p3.y
            };
        }

        // Four entry choreographies: S-swoops from the top corners and
        // loop-unders from the sides, jittered so every wave looks different.
        function entryPath(kind, slot) {
            const W = GAME_WIDTH, H = GAME_HEIGHT;
            const j = () => (Math.random() - 0.5) * 60;
            switch (kind % 4) {
                case 0: return { p0: { x: W * 0.2 + j(), y: -40 }, p1: { x: W * 0.95, y: H * 0.3 + j() }, p2: { x: W * 0.1, y: H * 0.55 + j() }, p3: slot };
                case 1: return { p0: { x: W * 0.8 + j(), y: -40 }, p1: { x: W * 0.05, y: H * 0.3 + j() }, p2: { x: W * 0.9, y: H * 0.55 + j() }, p3: slot };
                case 2: return { p0: { x: -40, y: H * 0.5 + j() }, p1: { x: W * 0.6 + j(), y: H * 0.75 }, p2: { x: W * 0.95, y: H * 0.25 + j() }, p3: slot };
                default: return { p0: { x: W + 40, y: H * 0.5 + j() }, p1: { x: W * 0.4 + j(), y: H * 0.75 }, p2: { x: W * 0.05, y: H * 0.25 + j() }, p3: slot };
            }
        }

        // Attack launcher: usually a lone diver, but sometimes a leader takes
        // a small squadron of formation neighbors down with it (staggered so
        // they trail like the arcade escort attacks). Bosses bring escorts.
        function launchAttack() {
            const ready = enemies.filter(e => e.state === 'formation');
            if (!ready.length) return;
            const active = enemies.filter(e => e.state === 'diving' || e.state === 'returning').length;
            const maxDivers = Math.min(5, 1 + Math.ceil(gameLevel / 2));
            if (active >= maxDivers) return;

            const leader = ready[Math.floor(Math.random() * ready.length)];
            leader.startDive(0);

            const groupChance = Math.min(0.65, 0.35 + gameLevel * 0.03);
            if (Math.random() < groupChance) {
                const wingmen = ready.filter(e =>
                    e !== leader &&
                    Math.abs(e.row - leader.row) <= 1 &&
                    Math.abs(e.colOffset - leader.colOffset) <= 1.5
                ).slice(0, leader.type === 'boss' ? 2 : 1 + Math.floor(Math.random() * 2));
                wingmen.forEach((w, i) => w.startDive(0.18 * (i + 1)));
            }
        }

        // --- Setup Enemies (Initial Formation) ---
        function setupEnemies() {
            // Fit the formation to whatever width the screen actually has
            // (narrow phones get fewer columns) instead of a fixed 8 that can
            // overflow a narrow portrait viewport.
            const spacingX = PIX * 16;
            const cols = Math.max(4, Math.min(8, Math.floor((GAME_WIDTH - 40) / spacingX)));

            // Classic rank structure: a few bosses up top, butterflies as the
            // middle guard, bee swarm below. Each row flies in as its own
            // wave with a different entry choreography, enemies within a wave
            // trailing each other like a train.
            const rowDefs = [
                { type: 'boss', count: Math.max(2, cols - 4) },
                { type: 'butterfly', count: Math.max(4, cols - 1) },
                { type: 'butterfly', count: Math.max(4, cols - 1) },
                { type: 'bee', count: cols },
                { type: 'bee', count: cols }
            ];
            rowDefs.forEach((def, r) => {
                for (let c = 0; c < def.count; c++) {
                    const e = new Enemy(c - (def.count - 1) / 2, r, def.type, gameLevel);
                    e.entryKind = r;
                    e.delay = r * 1.2 + c * 0.12;
                    enemies.push(e);
                }
            });
        }

        // --- Game Initialization and Reset ---
        function resetGame() {
            playerInstance = new Player();
            playerBullets = [];
            enemyBullets = [];
            enemies = [];
            score = 0;
            lives = INITIAL_LIVES;
            gameLevel = 1;
            formationT = 0;
            diveTimer = 1.5;
            particles = [];
            setupEnemies();
            // Defensive reset in case a previous session ended without a
            // clean pointerup/cancel for the steering finger.
            moveTouchId = null;
            lastTouchPos = null;
        }

        function advanceLevel() {
            gameLevel++;
            showMessage(`STAGE ${gameLevel}!`, 1500);
            playerBullets = [];
            enemyBullets = [];
            enemies = [];
            formationT = 0;
            diveTimer = 1.5;
            setupEnemies();
        }
        
        function playerHit() {
            spawnExplosion(playerInstance.x + playerInstance.width / 2,
                           playerInstance.y + playerInstance.height / 2, '#ff4444', 24);
            lives--;
            if (score > highScore) highScore = score;
            if (lives <= 0) {
                const finalScore = score;
                const qualifies = HS.checkQualifies('galaga', finalScore, 'galagaHighScore');
                function finish() {
                    showModal(`GAME OVER! Score: ${finalScore} — Best: ${highScore}. Press any key or tap to restart.`, resetGame);
                }
                if (qualifies) {
                    HS.showInitialsOverlay({ onSubmit: (name) => { HS.recordScore('galaga', name, finalScore); finish(); } });
                } else {
                    finish();
                }
            } else {
                showMessage(`HIT! ${lives} lives remaining.`, 1500);
                // Fresh ship with brief blink protection; clear enemy fire
                playerInstance = new Player();
                playerInstance.invuln = 2.5;
                enemyBullets = [];
            }
        }


        // --- Input Handling ---
        // SPACE is the fire trigger; direction keys are movement only.
        const keys = {};

        function handleKeyDown(e) {
            keys[e.key] = true;

            // Prevent default action for game controls
            if ([' ', 'ArrowUp', 'w', 'ArrowDown', 's', 'ArrowLeft', 'a', 'ArrowRight', 'd'].includes(e.key)) {
                 e.preventDefault();
            }
        }

        function handleKeyUp(e) {
            keys[e.key] = false;
        }

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);

        // Escape always returns to the arcade landing page, regardless of
        // whether a game is actively running or a modal (game over, etc.) is showing.
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'index.html';
            }
        });

        // --- Touch Drag Controls ---
        // Press anywhere on the canvas and drag; the ship moves by the same
        // delta as the finger each event, rather than jumping straight to the
        // touch point. Firing is automatic (see update()), so movement is the
        // only thing touch needs to do.
        let lastTouchPos = null;
        let moveTouchId = null;

        function canvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function setupTouchDragControls() {
            canvas.addEventListener('pointerdown', (e) => {
                if (!playerInstance || lives <= 0 || moveTouchId !== null) return;
                e.preventDefault();
                moveTouchId = e.pointerId;
                lastTouchPos = canvasPos(e);
                try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
            });

            canvas.addEventListener('pointermove', (e) => {
                if (e.pointerId !== moveTouchId || !lastTouchPos || !playerInstance) return;
                e.preventDefault();
                const pos = canvasPos(e);
                const dx = pos.x - lastTouchPos.x;
                const dy = pos.y - lastTouchPos.y;
                lastTouchPos = pos;

                let x = playerInstance.x + dx;
                let y = playerInstance.y + dy;
                x = Math.min(Math.max(x, 0), GAME_WIDTH - playerInstance.width);
                y = Math.min(Math.max(y, playerInstance.MIN_Y), playerInstance.MAX_Y);
                playerInstance.x = x;
                playerInstance.y = y;
            });

            const endTouch = (e) => {
                if (e.pointerId !== moveTouchId) return;
                moveTouchId = null;
                lastTouchPos = null;
            };
            canvas.addEventListener('pointerup', endTouch);
            canvas.addEventListener('pointercancel', endTouch);
        }

        function firePlayerBullet() {
            // Cap shots in flight (like the arcade's two-shot limit, but a
            // little more generous) so parking under the fly-in path doesn't
            // shred entire waves before they can form up.
            if (playerBullets.length >= 6) return;
            const now = Date.now();
            if (now - playerInstance.lastFireTime > playerInstance.fireCooldown) {
                // Fire two bullets from the corners of the player ship
                playerBullets.push(new PlayerBullet(playerInstance.x + 5, playerInstance.y));
                playerBullets.push(new PlayerBullet(playerInstance.x + playerInstance.width - 8, playerInstance.y));
                playerInstance.lastFireTime = now;
            }
        }

        function enemyFire(enemy) {
            if (Math.random() < 0.8) { // 80% chance to fire straight down
                // Enemy bullets now target the player's current location to make them more challenging
                enemyBullets.push(new EnemyBullet(enemy.x + enemy.size / 2, enemy.y + enemy.size, playerInstance.x + playerInstance.width/2));
            }
        }

        // --- Update Game Objects ---
        function update(dt) {
            if (lives <= 0) return;

            // 1. Handle Player Movement
            playerInstance.dx = 0;
            playerInstance.dy = 0;

            // Horizontal movement
            if (keys['ArrowLeft'] || keys['a']) playerInstance.dx = -playerInstance.speed;
            if (keys['ArrowRight'] || keys['d']) playerInstance.dx = playerInstance.speed;

            // Vertical movement
            if (keys['ArrowDown'] || keys['s']) playerInstance.dy = playerInstance.speed;
            if (keys['ArrowUp'] || keys['w']) playerInstance.dy = -playerInstance.speed;

            // Touch dragging (see setupTouchDragControls) moves the ship
            // directly on pointermove rather than through dx/dy, so it isn't
            // affected by keyboard state here.
            playerInstance.update(dt);

            // Firing is player-controlled: hold SPACE on keyboard, or on
            // touch simply keep a finger on the screen — you steer and fire
            // with the same hold, and lifting your finger ceases fire.
            if (keys[' '] || moveTouchId !== null) {
                firePlayerBullet();
            }

            // 2. Update Bullets
            playerBullets.forEach(bullet => bullet.update(dt));
            enemyBullets.forEach(bullet => bullet.update(dt));

            // Remove off-screen bullets
            playerBullets = playerBullets.filter(bullet => bullet.y > -bullet.height);
            enemyBullets = enemyBullets.filter(bullet => bullet.y < GAME_HEIGHT);

            // 3. Update Enemies: formation sway/breathe plus the attack
            // scheduler. Dives only begin once the fly-in entries finish.
            formationT += dt;
            const entriesDone = enemies.every(e => e.state !== 'waiting' && e.state !== 'entering');
            if (entriesDone) {
                diveTimer -= dt;
                if (diveTimer <= 0) {
                    launchAttack();
                    diveTimer = (1.2 + Math.random() * 1.6) * Math.max(0.45, 1 - gameLevel * 0.05);
                }
            }
            enemies.forEach(enemy => enemy.update(dt));

            // 4. Handle Collisions

            // 4a. Player Bullet -> Enemy Collision. Mark-and-filter (rather
            // than splicing mid-forEach) avoids skipped array indices and
            // lets a bullet only ever destroy the first enemy it touches.
            playerBullets.forEach(bullet => {
                if (!bullet.alive) return;
                enemies.forEach(enemy => {
                    if (!enemy.alive || !bullet.alive || enemy.state === 'waiting') return;
                    if (checkCollision(bullet, enemy)) {
                        bullet.alive = false;
                        enemy.hp--;
                        const cx = enemy.x + enemy.size / 2, cy = enemy.y + enemy.size / 2;
                        if (enemy.hp > 0) {
                            // Boss first hit: wounded palette + spark, no score yet
                            enemy.damaged = true;
                            spawnExplosion(cx, cy, '#ffffff', 5);
                        } else {
                            enemy.alive = false;
                            // Diving kills are worth double, like the arcade
                            score += enemy.scoreValue * (enemy.isDiving ? 2 : 1);
                            spawnExplosion(cx, cy, ENEMY_ACCENT[enemy.type], 14);
                        }
                    }
                });
            });
            playerBullets = playerBullets.filter(bullet => bullet.alive);

            // 4b/4c. Player collisions, skipped during post-respawn blink
            if (playerInstance.invuln <= 0) {
                enemyBullets.forEach(bullet => {
                    if (!bullet.alive) return;
                    if (checkCollision(bullet, playerInstance)) {
                        bullet.alive = false;
                        playerHit();
                    }
                });

                enemies.forEach(enemy => {
                    if (!enemy.alive || enemy.state === 'waiting') return;
                    if (checkCollision(enemy, playerInstance)) {
                        enemy.alive = false;
                        spawnExplosion(enemy.x + enemy.size / 2, enemy.y + enemy.size / 2, ENEMY_ACCENT[enemy.type], 14);
                        playerHit();
                    }
                });
            }
            enemyBullets = enemyBullets.filter(bullet => bullet.alive);

            // Update explosion particles
            particles.forEach(p => {
                p.age += dt;
                p.x += p.vx * dt;
                p.y += p.vy * dt;
            });
            particles = particles.filter(p => p.age < p.life);

            // Scroll the starfield
            stars.forEach(s => {
                s.y += s.speed * dt;
                if (s.y > GAME_HEIGHT) { s.y = -2; s.x = Math.random() * GAME_WIDTH; }
            });


            // 5. Remove dead enemies
            const initialEnemyCount = enemies.length;
            enemies = enemies.filter(enemy => enemy.alive);

            // 6. Check Win Condition
            if (enemies.length === 0 && initialEnemyCount > 0) {
                // Level cleared
                advanceLevel();
            }

            // Removed: Old loss condition for enemies reaching the bottom line. Now only direct collision counts.
        }

        // --- Draw Game Objects ---
        function drawHUD() {
            const f = Math.max(8, Math.min(12, Math.round(GAME_WIDTH / 50)));
            ctx.font = `${f}px 'Press Start 2P', monospace`;

            ctx.textAlign = 'left';
            ctx.fillStyle = '#ff2222';
            ctx.fillText('1UP', 10, f + 8);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(String(score), 10, (f + 8) * 2);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff2222';
            ctx.fillText('HI-SCORE', GAME_WIDTH / 2, f + 8);
            ctx.fillStyle = '#ffffff';
            ctx.fillText(String(Math.max(highScore, score)), GAME_WIDTH / 2, (f + 8) * 2);

            ctx.textAlign = 'right';
            ctx.fillStyle = '#66ccff';
            ctx.fillText('STAGE ' + gameLevel, GAME_WIDTH - 10, f + 8);
            ctx.textAlign = 'left';

            // Reserve ships bottom-left, like the arcade cabinet
            const spr = spriteCache.player[0];
            const w = spr.width * PIX * 0.6, h = spr.height * PIX * 0.6;
            for (let i = 0; i < lives - 1; i++) {
                ctx.drawImage(spr, 8 + i * (w + 5), GAME_HEIGHT - h - 6, w, h);
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Twinkling, scrolling starfield
            const now = performance.now() / 400;
            stars.forEach(s => {
                ctx.globalAlpha = 0.4 + 0.6 * Math.abs(Math.sin(now + s.tw));
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1;

            enemyBullets.forEach(bullet => bullet.draw());
            playerBullets.forEach(bullet => bullet.draw());
            enemies.forEach(enemy => enemy.draw());
            particles.forEach(p => {
                ctx.globalAlpha = 1 - p.age / p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            playerInstance.draw();
            drawHUD();
        }

        // --- Main Game Loop ---
        function gameLoop(currentTime) {
            // Clamp dt so a backgrounded tab/phone lock screen doesn't cause a
            // huge simulation jump (a wave of enemies suddenly diving, bullets
            // teleporting past the player, etc).
            const dt = Math.min((currentTime - lastFrameTime) / 1000, 0.05) || 0;
            lastFrameTime = currentTime;

            update(dt);
            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // Auto-pause when the tab/app is backgrounded, and resync the frame
        // clock on return so the pause itself doesn't count as elapsed dt.
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                cancelAnimationFrame(animationFrameId);
            } else if (lives > 0) {
                lastFrameTime = performance.now();
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        });

        // Ensure the game starts when the window is fully loaded
        window.onload = function () {
            resizeCanvas();
            let resizeRAF;
            window.addEventListener('resize', () => {
                cancelAnimationFrame(resizeRAF);
                resizeRAF = requestAnimationFrame(resizeCanvas);
            });
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

            buildSpriteCache(PALETTES);
            resetGame();
            setupTouchDragControls();
            showMessage("Touch: hold & drag to move and fire. Keyboard: Arrows/WASD move, SPACE fires.", 3500);
            lastFrameTime = performance.now();
            gameLoop(lastFrameTime);
        }

    </script>
</body>
</html>
