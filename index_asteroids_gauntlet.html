<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Asteroids: Gauntlet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');

        html, body { height: 100%; }

        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 8px;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: min(1400px, 96vw);
            height: 100%;
            max-height: min(880px, 94vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #b26bff;
            border-radius: 12px;
            box-shadow: 0 0 20px #b26bff, inset 0 0 20px #b26bff;
            background: #000000;
            padding: 8px;
            box-sizing: border-box;
        }

        #canvas-wrap {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameCanvas {
            display: block;
            background-color: #000000;
            border: 1px solid #3a1f5c;
            box-shadow: 0 0 10px rgba(178, 107, 255, 0.5);
            border-radius: 6px;
            touch-action: none;
        }

        #back-to-arcade {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            z-index: 500;
            padding: 6px 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #b26bff;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #b26bff;
            border-radius: 6px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #back-to-arcade:active { background: rgba(178, 107, 255, 0.3); }

        #mute-btn {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            right: max(10px, env(safe-area-inset-right));
            z-index: 500;
            padding: 6px 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #7dd3fc;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #7dd3fc;
            border-radius: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #kb-hint {
            display: none;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: #7a6a94;
            padding: 4px 0 0;
        }

        @media (max-width: 700px) {
            #kb-hint { display: block; }
        }

        #modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.96);
            border: 3px solid #7dd3fc;
            padding: 20px 28px;
            border-radius: 10px;
            text-align: center;
            color: #7dd3fc;
            box-shadow: 0 0 30px #7dd3fc;
            z-index: 100;
            display: none;
            max-width: 92vw;
            width: 520px;
            max-height: 92vh;
            overflow-y: auto;
            box-sizing: border-box;
        }

        #modal h1 { font-size: 1.6rem; margin: 0 0 14px; color: #b26bff; }
        #modal h2 { font-size: 1rem; margin: 14px 0 8px; color: #7dd3fc; letter-spacing: 1px; }
        #modal p { font-size: 0.85rem; margin: 0 0 10px; color: #cfd6e6; }
        .controls-legend p { font-size: 0.68rem; text-align: left; margin: 0 0 4px; color: #9fb8c8; }

        .setup-label { display: block; font-size: 0.75rem; color: #9fb8c8; margin-bottom: 8px; letter-spacing: 1px; }
        .ag-btn {
            background: #b26bff; color: #000; border: none; padding: 12px 22px; border-radius: 8px;
            margin: 10px 6px 0; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 0.85rem;
            box-shadow: 0 4px #7a3fc0; touch-action: manipulation;
        }
        .ag-btn:active { transform: translateY(4px); box-shadow: none; }
        .ag-btn.secondary { background: #7dd3fc; box-shadow: 0 4px #3a8fb0; }

        .par-row { display: flex; gap: 10px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
        .par-chip {
            border: 2px solid #333; border-radius: 8px; padding: 8px 12px; font-size: 0.8rem;
            display: flex; flex-direction: column; align-items: center; min-width: 70px;
        }
        .par-chip .par-name { font-size: 0.62rem; letter-spacing: 1px; opacity: 0.85; }
        .par-chip .par-time { font-size: 0.95rem; margin-top: 3px; }
        .par-gold { border-color: #ffd23f; color: #ffd23f; }
        .par-silver { border-color: #c7d0dc; color: #c7d0dc; }
        .par-bronze { border-color: #e0955a; color: #e0955a; }

        .medal-case { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin: 10px 0; }
        .medal-cell {
            width: 26px; height: 26px; border-radius: 5px; border: 1px solid #2a2a3a;
            display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #4a4a5a;
        }
        .medal-cell.g { border-color: #ffd23f; color: #ffd23f; box-shadow: 0 0 6px #ffd23f66; }
        .medal-cell.s { border-color: #c7d0dc; color: #c7d0dc; }
        .medal-cell.b { border-color: #e0955a; color: #e0955a; }

        #modal ul { list-style: none; padding: 0; margin: 8px 0; text-align: left; }
        #modal li { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 2px 4px; color: #cfd6e6; }

        @media (max-width: 480px) {
            #modal { padding: 16px 18px; }
            #modal h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>
<button id="mute-btn" aria-label="Toggle sound">SOUND: ON</button>

<div id="game-container">
    <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div id="modal"><div id="modal-content"></div></div>
    </div>
    <div id="kb-hint">WASD / ARROWS TO FLY &middot; SPACE TO FIRE</div>
</div>

<script src="highscores.js"></script>
<script>
'use strict';
// =========================================================================
// Asteroids: Gauntlet — single-player, 22-level time-trial gauntlet.
// Ship physics, weapons, powerups, obstacle geometry and audio are ported
// from Asteroids: Duel (which itself ported them from Maze Edition). Brick
// levels borrow the pattern-mask grids from Neon Breakout. Each level is a
// countdown time-trial with gold/silver/bronze medals; 3 hull per attempt,
// 3 lives per run, straight-through to a combined finale.
// =========================================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modal-content');
const muteBtn = document.getElementById('mute-btn');
const PI = Math.PI;

const W = 1200, H = 675;
const WALL_H = 16;
const SLUG = 'asteroids-gauntlet';
const TOTAL_LEVELS = 22;

const rand = (min, max) => Math.random() * (max - min) + min;
const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const angleDiff = (a, b) => Math.atan2(Math.sin(a - b), Math.cos(a - b));

const SHIP_COLOR = '#7de8ff';
const DEV = new URLSearchParams(location.search).has('dev');

const POWERUP_INFO = {
    S: { color: '#7dd3fc', name: 'SHIELD' },
    B: { color: '#ff8a3d', name: 'BAZOOKA' },
    R: { color: '#ffe15a', name: 'RAPID FIRE' },
    '+': { color: '#7dff9d', name: 'HULL +1' },
    '>': { color: '#c084fc', name: 'SPEED BOOST' },
    G: { color: '#b8bcc4', name: 'GHOST' }
};

const CURSED_INFO = {
    REVERSE: { color: '#ff4d6d', name: 'REVERSE' },
    STALL: { color: '#ff884d', name: 'STALL' },
    DRAIN: { color: '#c04dff', name: 'DRAIN' }
};
const CURSED_TYPES = Object.keys(CURSED_INFO);

const MEDAL = {
    gold: { key: 'g', color: '#ffd23f', bonus: 1000, label: 'GOLD' },
    silver: { key: 's', color: '#c7d0dc', bonus: 500, label: 'SILVER' },
    bronze: { key: 'b', color: '#e0955a', bonus: 250, label: 'BRONZE' },
    none: { key: '', color: '#8891a3', bonus: 0, label: '—' }
};
const NO_DAMAGE_BONUS = 300;

const LS = { muted: 'ag_muted', medals: 'ag_medals' };

// medalFor / timeLimit are both derived from each level's single `gold` par so
// tuning is one number per level. silver = 1.6x gold, bronze = 2.5x gold.
function parTimes(gold) {
    return { gold, silver: +(gold * 1.6).toFixed(1), bronze: +(gold * 2.5).toFixed(1) };
}
function timeLimitFor(def) {
    if (def.time) return def.time;
    return Math.max(20, Math.ceil(def.gold * 3.2 / 5) * 5);
}
function medalFor(elapsed, gold) {
    const p = parTimes(gold);
    if (elapsed <= p.gold) return 'gold';
    if (elapsed <= p.silver) return 'silver';
    if (elapsed <= p.bronze) return 'bronze';
    return 'none';
}
function fmtTime(s) {
    s = Math.max(0, s);
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    const dec = Math.floor((s * 10) % 10);
    return `${m}:${String(sec).padStart(2, '0')}.${dec}`;
}

// =========================================================================
// Layout generators (adapted from Duel; single-player so no mirroring needed)
// =========================================================================
function mirrorBlocks(list) { return list.concat(list.map(b => ({ ...b, xFrac: 1 - b.xFrac - b.wFrac }))); }
function mirrorCircles(list) { return list.concat(list.map(c => ({ ...c, xFrac: 1 - c.xFrac }))); }

function genCorridors() {
    const xs = [0.22, 0.40, 0.58, 0.76];
    const gapH = 0.28, w = 0.02;
    const cols = [];
    let prevCenter = 0.5;
    xs.forEach((x) => {
        let gapCenter = clamp(prevCenter + rand(-0.32, 0.32), gapH / 2 + 0.04, 1 - gapH / 2 - 0.04);
        prevCenter = gapCenter;
        const gapTop = gapCenter - gapH / 2, gapBot = gapCenter + gapH / 2;
        cols.push({ xFrac: x, yFrac: 0, wFrac: w, hFrac: gapTop, type: 'solid' });
        cols.push({ xFrac: x, yFrac: gapBot, wFrac: w, hFrac: 1 - gapBot, type: 'solid' });
    });
    return { walls: [], blocks: cols, circles: [], tunnels: [] };
}

function genScrapyard() {
    const pieces = [], circles = [], placed = [];
    const count = 9;
    let tries = 0;
    const drift = () => Math.random() < 0.4
        ? { amp: 0.03, speed: rand(0.4, 0.8), phase: rand(0, PI * 2), axis: Math.random() < 0.5 ? 'x' : 'y' }
        : null;
    while (pieces.length + circles.length < count && tries < 300) {
        tries++;
        const x = rand(0.2, 0.8), y = rand(0.14, 0.86);
        if (placed.some(p => Math.hypot((p.x - x) * W, (p.y - y) * H) < 110)) continue;
        placed.push({ x, y });
        if (Math.random() < 0.25) {
            circles.push({ xFrac: x, yFrac: y, rFrac: rand(0.03, 0.05), type: 'solid', osc: drift() });
        } else {
            pieces.push({ xFrac: x, yFrac: y, wFrac: rand(0.04, 0.09), hFrac: rand(0.05, 0.13), type: 'solid', osc: drift() });
        }
    }
    return { walls: [], blocks: pieces, circles: circles, tunnels: [] };
}

// Brick pattern masks (from Neon Breakout). . empty, x 1hp, X 2hp, E explosive, S steel
const PATTERNS = {
    DIAMOND: ['....xx....', '...xXXx...', '..xxEExx..', '.xxxXXxxx.', 'xxxxEExxxx', '.xxxXXxxx.', '..xxEExx..', '...xXXx...', '....xx....'],
    SMILEY: ['..XX..XX..', '..XX..XX..', '..........', 'X........X', '.Xx....xX.', '..XXxxXX..'],
    FORTRESS: ['S...xx...S', 'Sx.xXXx.xS', 'S.xxEExx.S', 'S...XX...S', 'SSS....SSS']
};

// =========================================================================
// 22-level roster. Each level declares an objective + layout + a single gold
// par (seconds). Coordinates are fractions of the 1200x675 arena.
// =========================================================================
const LEVELS = [
    // 1 — BEACON RUN (teach flight + fire)
    {
        name: 'BEACON RUN', objective: 'beacons', gold: 7,
        intro: 'Shoot all 3 beacons.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        layout: {},
        beacons: [{ xFrac: 0.45, yFrac: 0.25 }, { xFrac: 0.72, yFrac: 0.55 }, { xFrac: 0.55, yFrac: 0.80 }]
    },
    // 2 — SCATTER SHOT (4 beacons, static pillars)
    {
        name: 'SCATTER SHOT', objective: 'beacons', gold: 10,
        intro: 'Shoot all 4 beacons. Mind the pillars.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        layout: {
            blocks: [
                { xFrac: 0.45, yFrac: 0.18, wFrac: 0.02, hFrac: 0.28, type: 'solid' },
                { xFrac: 0.45, yFrac: 0.54, wFrac: 0.02, hFrac: 0.28, type: 'solid' }
            ]
        },
        beacons: [{ xFrac: 0.35, yFrac: 0.25 }, { xFrac: 0.35, yFrac: 0.75 }, { xFrac: 0.68, yFrac: 0.30 }, { xFrac: 0.68, yFrac: 0.70 }]
    },
    // 3 — PINBALL (5 beacons, central circle + drifting pillars)
    {
        name: 'PINBALL', objective: 'beacons', gold: 12,
        intro: 'Five beacons among drifting cover — thread your shots.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        layout: {
            circles: [{ xFrac: 0.40, yFrac: 0.5, rFrac: 0.05, type: 'solid' }],
            blocks: [
                { xFrac: 0.62, yFrac: 0.10, wFrac: 0.02, hFrac: 0.30, type: 'solid', osc: { amp: 0.05, speed: 0.8, phase: 0, axis: 'y' } },
                { xFrac: 0.62, yFrac: 0.60, wFrac: 0.02, hFrac: 0.30, type: 'solid', osc: { amp: 0.05, speed: 0.8, phase: PI, axis: 'y' } }
            ]
        },
        beacons: [
            { xFrac: 0.30, yFrac: 0.22 }, { xFrac: 0.30, yFrac: 0.78 }, { xFrac: 0.55, yFrac: 0.5 },
            { xFrac: 0.80, yFrac: 0.30 }, { xFrac: 0.80, yFrac: 0.70 }
        ]
    },
    // 4 — THE GATE (oscillating bands)
    {
        name: 'OPEN THE GATE', objective: 'gate', gold: 5.5,
        intro: 'Weave the moving walls, reach the gate.',
        spawn: { xFrac: 0.08, yFrac: 0.5, angle: 0 },
        layout: {
            blocks: [
                { xFrac: 0.34, yFrac: 0.0, wFrac: 0.02, hFrac: 0.55, type: 'solid', osc: { amp: 0.06, speed: 0.9, phase: 0, axis: 'y' } },
                { xFrac: 0.58, yFrac: 0.45, wFrac: 0.02, hFrac: 0.55, type: 'solid', osc: { amp: 0.06, speed: 0.9, phase: PI, axis: 'y' } }
            ]
        },
        gate: { xFrac: 0.90, yFrac: 0.20 }
    },
    // 5 — DEMO (break all cracks)
    {
        name: 'DEMOLITION', objective: 'breakables', gold: 9.5,
        intro: 'Blast every orange block.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        layout: {
            circles: mirrorCircles([{ xFrac: 0.32, yFrac: 0.30, rFrac: 0.045 }, { xFrac: 0.32, yFrac: 0.70, rFrac: 0.045 }]),
            blocks: [
                { xFrac: 0.24, yFrac: 0.14, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 },
                { xFrac: 0.50, yFrac: 0.10, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 },
                { xFrac: 0.70, yFrac: 0.26, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 },
                { xFrac: 0.70, yFrac: 0.68, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 },
                { xFrac: 0.50, yFrac: 0.82, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 },
                { xFrac: 0.24, yFrac: 0.78, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 }
            ]
        }
    },
    // 6 — beacons behind cover
    {
        name: 'FLUSH THEM OUT', objective: 'beacons', gold: 12,
        intro: 'Angle around cover — shoot all 5 beacons.',
        spawn: { xFrac: 0.08, yFrac: 0.5, angle: 0 },
        pickups: [{ type: '>', xFrac: 0.2, yFrac: 0.5, at: 0 }],
        layout: {
            blocks: mirrorBlocks([
                { xFrac: 0.30, yFrac: 0.10, wFrac: 0.02, hFrac: 0.30, type: 'solid' },
                { xFrac: 0.30, yFrac: 0.60, wFrac: 0.02, hFrac: 0.30, type: 'solid' }
            ])
        },
        beacons: [{ xFrac: 0.40, yFrac: 0.22 }, { xFrac: 0.40, yFrac: 0.78 }, { xFrac: 0.62, yFrac: 0.35 }, { xFrac: 0.62, yFrac: 0.65 }, { xFrac: 0.80, yFrac: 0.50 }]
    },
    // 7 — BRICKS: SMILEY
    {
        name: 'CARVE THE GRIN', objective: 'bricks', gold: 11,
        intro: 'Break every brick with your guns.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        pickups: [{ type: 'R', xFrac: 0.22, yFrac: 0.5, at: 0 }, { type: 'B', xFrac: 0.5, yFrac: 0.88, at: 8 }],
        layout: {},
        bricks: { pattern: 'SMILEY', origin: { xFrac: 0.30, yFrac: 0.22 }, cell: 0.058, steelLevel: false }
    },
    // 8 — TURRETS: sweep, destroy all
    {
        name: 'PEEK AND POP', objective: 'turrets', gold: 7.5,
        intro: 'Destroy both turrets. Use cover.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        pickups: [{ type: 'S', xFrac: 0.24, yFrac: 0.5, at: 0 }],
        layout: {
            blocks: mirrorBlocks([{ xFrac: 0.42, yFrac: 0.32, wFrac: 0.03, hFrac: 0.36, type: 'solid' }])
        },
        turrets: [
            { xFrac: 0.75, yFrac: 0.25, hp: 4, mode: 'sweep', fireInterval: 1.6, projSpeed: 300 },
            { xFrac: 0.75, yFrac: 0.75, hp: 4, mode: 'sweep', fireInterval: 1.6, projSpeed: 300 }
        ]
    },
    // 9 — GATE: corridors
    {
        name: 'THE SERPENT', objective: 'gate', gold: 5,
        intro: 'Thread the corridors to the far gate.',
        spawn: { xFrac: 0.06, yFrac: 0.5, angle: 0 },
        pickups: [{ type: 'G', xFrac: 0.14, yFrac: 0.5, at: 0 }],
        layout: { generate: genCorridors },
        gate: { xFrac: 0.93, yFrac: 0.5 }
    },
    // 10 — STORM: 4 cores, slow
    {
        name: 'CURSE STORM', objective: 'storm', gold: 13,
        intro: 'Grab all 4 cyan cores. Dodge the cursed rain.',
        spawn: { xFrac: 0.5, yFrac: 0.5, angle: 0 },
        pickups: [{ type: 'S', xFrac: 0.5, yFrac: 0.5, at: 0 }],
        layout: {},
        storm: {
            cores: [{ xFrac: 0.15, yFrac: 0.2 }, { xFrac: 0.85, yFrac: 0.2 }, { xFrac: 0.15, yFrac: 0.8 }, { xFrac: 0.85, yFrac: 0.8 }],
            rate: 1.3, speed: 150
        }
    },
    // 11 — BREAKABLES in spinning ring
    {
        name: 'CORE BREACH', objective: 'breakables', gold: 9,
        intro: 'Shoot the cracks — some hide inside the ring.',
        spawn: { xFrac: 0.10, yFrac: 0.5, angle: 0 },
        pickups: [{ type: 'B', xFrac: 0.2, yFrac: 0.5, at: 0 }],
        layout: {
            tunnels: [{ xFrac: 0.5, yFrac: 0.5, outerRFrac: 0.11, innerRFrac: 0.055, spinRate: 0.4, segCount: 4, segHalf: 0.5, hp: 3 }],
            blocks: [
                { xFrac: 0.5, yFrac: 0.47, wFrac: 0.04, hFrac: 0.04, type: 'crack', hp: 2 },
                { xFrac: 0.20, yFrac: 0.20, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 },
                { xFrac: 0.74, yFrac: 0.72, wFrac: 0.06, hFrac: 0.05, type: 'crack', hp: 2 }
            ]
        }
    },
    // 12 — BEACONS + harassing tracking turret
    {
        name: 'UNDER FIRE', objective: 'beacons', gold: 18,
        intro: 'Shoot all 6 beacons while the turret hunts you.',
        spawn: { xFrac: 0.08, yFrac: 0.5, angle: 0 },
        pickups: [{ type: 'S', xFrac: 0.16, yFrac: 0.5, at: 0 }, { type: 'R', xFrac: 0.5, yFrac: 0.5, at: 6 }],
        layout: { circles: mirrorCircles([{ xFrac: 0.35, yFrac: 0.5, rFrac: 0.05 }]) },
        beacons: [
            { xFrac: 0.30, yFrac: 0.20 }, { xFrac: 0.30, yFrac: 0.80 }, { xFrac: 0.55, yFrac: 0.30 },
            { xFrac: 0.55, yFrac: 0.70 }, { xFrac: 0.82, yFrac: 0.35 }, { xFrac: 0.82, yFrac: 0.65 }
        ],
        turrets: [{ xFrac: 0.5, yFrac: 0.5, hp: 999, mode: 'track', fireInterval: 1.9, projSpeed: 300, invincible: true }]
    },
    // 13 — BRICKS: FORTRESS
    {
        name: 'FORTRESS', objective: 'bricks', gold: 10,
