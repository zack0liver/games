<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grandpappy is Unhappy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
          media="print" onload="this.media='all'">
    <style>
        :root { --amber: #ffb454; --amber-dim: #7a5a2f; --bg: #100c08; }
        html, body { height: 100%; }
        body {
            background: radial-gradient(ellipse at center, #241a10 0%, #0a0704 100%);
            color: #f5e6c8; font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100dvh; min-height: 100vh; margin: 0; overflow: hidden; padding: 8px; box-sizing: border-box;
            touch-action: none; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
        }
        #game-container {
            position: relative; width: 100%; max-width: min(560px, 96vw); height: 100%; max-height: min(920px, 96vh);
            display: flex; flex-direction: column; align-items: center;
            border: 3px solid var(--amber); border-radius: 10px;
            box-shadow: 0 0 20px var(--amber), inset 0 0 18px rgba(255,180,84,0.2);
            background: #04040c; padding: 6px; box-sizing: border-box;
        }
        #hud {
            width: 100%; flex-shrink: 0; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            gap: 6px; padding: 6px 8px; box-sizing: border-box; font-size: 0.5rem;
        }
        #hud .grp { display: flex; gap: 8px; align-items: center; }
        #hud-score { color: var(--amber); text-shadow: 0 0 6px var(--amber); }
        #hud-high { color: #ff8fbf; }
        #hud-level { color: #7de8ff; }
        #hud-lives { color: #ff6b6b; letter-spacing: 2px; }
        .pill-btn { background: transparent; color: #f5e6c8; border: 2px solid var(--amber); border-radius: 999px;
            padding: 5px 10px; font-family: inherit; font-size: 0.5rem; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .pill-btn:active { background: var(--amber); color: #04040c; }
        #timer-wrap { width: 100%; height: 6px; background: #2a2015; border-radius: 3px; overflow: hidden; margin: 0 8px 4px; box-sizing: border-box; }
        #timer-bar { height: 100%; width: 100%; background: #6fd67a; transition: background 0.2s; }
        #canvas-wrap { position: relative; width: 100%; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
        #gameCanvas { display: block; background: transparent; touch-action: none; }
        #banner { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); padding: 8px 16px;
            border: 2px solid var(--amber); border-radius: 6px; background: rgba(16,12,8,0.9); color: #f5e6c8; font-size: 0.62rem;
            text-align: center; box-shadow: 0 0 14px var(--amber); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40; line-height: 1.7; }
        #banner.show { opacity: 1; }
        #back-to-arcade { position: fixed; top: max(10px, env(safe-area-inset-top)); left: max(10px, env(safe-area-inset-left)); z-index: 500;
            padding: 6px 12px; font-family: inherit; font-size: 0.55rem; color: var(--amber); background: rgba(0,0,0,0.7);
            border: 1px solid var(--amber); border-radius: 6px; text-decoration: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        #back-to-arcade:active { background: rgba(255,180,84,0.25); }

        #modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(16,12,8,0.97);
            border: 3px solid var(--amber); padding: 18px 22px; border-radius: 10px; text-align: center; box-shadow: 0 0 26px var(--amber);
            z-index: 100; display: none; max-width: 92vw; width: 360px; box-sizing: border-box; max-height: 92%; overflow-y: auto; }
        #modal h1 { font-size: 0.85rem; line-height: 1.7; margin: 0 0 10px; color: var(--amber); text-shadow: 0 0 10px var(--amber); }
        #modal p { font-size: 0.52rem; line-height: 1.9; margin: 0 0 8px; color: #d8c8a8; }
        #modal .legend { font-size: 0.44rem; line-height: 2.1; color: #b8a888; text-align: left; margin: 10px 0; }
        .gp-btn { background: var(--amber); color: #100c08; border: none; padding: 12px 20px; border-radius: 8px; margin: 8px 4px 0;
            cursor: pointer; font-family: inherit; font-size: 0.65rem; box-shadow: 0 4px #7a5a2f; touch-action: manipulation; }
        .gp-btn:active { transform: translateY(4px); box-shadow: none; }

        #dpad { display: grid; grid-template-columns: 46px 46px 46px; grid-template-rows: 46px 46px 46px; gap: 4px; flex-shrink: 0; }
        .dp-btn { background: linear-gradient(180deg,#3a2f20,#221a10); border: 2px solid var(--amber); border-radius: 6px;
            color: var(--amber); font-size: 16px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
        .dp-btn:active, .dp-btn.pressed { background: var(--amber); color: #100c08; }
        #dp-up { grid-column: 2; grid-row: 1; }
        #dp-left { grid-column: 1; grid-row: 2; }
        #dp-center { grid-column: 2; grid-row: 2; border-color: transparent; cursor: default; }
        #dp-right { grid-column: 3; grid-row: 2; }
        #dp-down { grid-column: 2; grid-row: 3; }
        #controls-row { width: 100%; display: flex; justify-content: center; align-items: center; padding: 8px 0 4px; flex-shrink: 0; }
        #hint { text-align: center; font-size: 0.4rem; color: #7a6a50; margin-top: 4px; }
    </style>
</head>
<body>
<a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>
<div id="game-container">
    <div id="hud">
        <div class="grp"><span id="hud-score">0</span><span id="hud-high">HI 0</span></div>
        <div class="grp"><span id="hud-level">LV 1</span><span id="hud-lives">●●●</span>
            <button class="pill-btn" id="mute-btn">&#128266;</button></div>
    </div>
    <div id="timer-wrap"><div id="timer-bar"></div></div>
    <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div id="banner"></div>
        <div id="modal"><div id="modal-content"></div></div>
    </div>
    <div id="controls-row">
        <div id="dpad">
            <div class="dp-btn" id="dp-up">&#9650;</div>
            <div class="dp-btn" id="dp-left">&#9664;</div>
            <div class="dp-btn" id="dp-center">&#128064;</div>
            <div class="dp-btn" id="dp-right">&#9654;</div>
            <div class="dp-btn" id="dp-down">&#9660;</div>
        </div>
    </div>
    <div id="hint">ARROWS / WASD &middot; OR THE PAD &middot; HOP TO THE TOP</div>
</div>

<script src="highscores.js"></script>
<script>
    'use strict';
    // =====================================================================
    // Grandpappy is Unhappy — a Frogger/Crossy-Road-style hopper. Grandpappy
    // is grumpy because he's lost his glasses, his cane, and his molasses.
    // Four grid levels, each ending in a prize; beat all four and he's happy.
    // =====================================================================

    const COLS = 9, ROWS = 9, TILE = 60;
    const W = COLS * TILE, H = ROWS * TILE;
    const START_ROW = 8, GOAL_ROW = 0, MEDIAN_ROW = 4;
    const PW = TILE * 0.62, PH = TILE * 0.78;

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const mod = (a, b) => ((a % b) + b) % b;

    // --- Obstacle definitions ------------------------------------------------
    const OBST = {
        cart:     { w: 44, h: 34, family: 'vehicle', color: '#9fd3ff' },
        melon:    { w: 32, h: 32, family: 'round',   color: '#3fae4a' },
        forklift: { w: 80, h: 38, family: 'vehicle', color: '#ffb454' },
        cart2:    { w: 40, h: 32, family: 'vehicle', color: '#cfd6dc' },
        mop:      { w: 64, h: 34, family: 'vehicle', color: '#7fdca0' },
        can:      { w: 22, h: 22, family: 'round',   color: '#e8534f' },

        car:        { w: 48, h: 30, family: 'vehicle', color: '#ff5470' },
        truck:      { w: 86, h: 36, family: 'vehicle', color: '#5aa9ff' },
        motorcycle: { w: 26, h: 22, family: 'vehicle', color: '#ffd166' },
        bus:        { w: 96, h: 40, family: 'vehicle', color: '#ffe15a' },
        car2:       { w: 48, h: 30, family: 'vehicle', color: '#c084fc' },
        sportscar:  { w: 50, h: 26, family: 'vehicle', color: '#ff3b6b' },

        boulder: { w: 36, h: 32, family: 'round', color: '#9a9a9a' },
        bear:    { w: 46, h: 36, family: 'blob',  color: '#7a4a2f' },
        pebble:  { w: 18, h: 18, family: 'round', color: '#b5b5b5' },

        log:   { w: 84, h: 30, family: 'platform', color: '#8a5a2f' },
        canoe: { w: 94, h: 32, family: 'platform', color: '#c9822f' },
        log2:  { w: 60, h: 28, family: 'platform', color: '#8a5a2f' },

        denture: { w: 34, h: 22, family: 'special', color: '#f4f4f4' },
        clock:   { w: 34, h: 34, family: 'round',   color: '#ff5470' },
        ufoBeam: { w: 54, h: 40, family: 'special', color: '#9dfcff' },

        pillow:  { w: 70, h: 32, family: 'platform', color: '#c9a6ff' },
        sheep:   { w: 48, h: 34, family: 'platform', color: '#f4f4f4' },
        pillow2: { w: 54, h: 28, family: 'platform', color: '#a6d8ff' }
    };

    // --- Level data ------------------------------------------------------------
    const LEVELS = [
        {
            key: 'grocery', name: 'GROCERY STORE', item: 'GLASSES', itemKey: 'glasses',
            intro: 'GET GRANDPAPPY\'S GLASSES!',
            bg: { safe: '#241a10', a: '#d9c08a', median: '#f0e2b0', b: '#c9a86a' },
            timeLimit: 34,
            rows: {
                7: { type: 'hazard', dir: 1, speed: 90, obstType: 'cart', count: 4 },
                6: { type: 'hazard', dir: -1, speed: 130, obstType: 'melon', count: 5 },
                5: { type: 'hazard', dir: 1, speed: 70, obstType: 'forklift', count: 3 },
                3: { type: 'hazard', dir: -1, speed: 110, obstType: 'cart2', count: 4 },
                2: { type: 'hazard', dir: 1, speed: 60, obstType: 'mop', count: 3 },
                1: { type: 'hazard', dir: -1, speed: 150, obstType: 'can', count: 6 }
            },
            pickup: { key: 'coupon', label: 'C', color: '#ffd166', name: 'COUPON' }
        },
        {
            key: 'roads', name: 'MAIN STREET', item: 'CANE', itemKey: 'cane',
            intro: 'GET GRANDPAPPY\'S CANE!',
            bg: { safe: '#2a2a2a', a: '#4a4a4a', median: '#3f6b3f', b: '#4a4a4a' },
            timeLimit: 32,
            rows: {
                7: { type: 'hazard', dir: 1, speed: 120, obstType: 'car', count: 4 },
                6: { type: 'hazard', dir: -1, speed: 80, obstType: 'truck', count: 3 },
                5: { type: 'hazard', dir: 1, speed: 170, obstType: 'motorcycle', count: 5 },
                3: { type: 'hazard', dir: -1, speed: 65, obstType: 'bus', count: 2 },
                2: { type: 'hazard', dir: 1, speed: 100, obstType: 'car2', count: 4 },
                1: { type: 'hazard', dir: -1, speed: 190, obstType: 'sportscar', count: 5 }
            },
            pickup: { key: 'newspaper', label: 'N', color: '#e8e8e8', name: 'NEWSPAPER' }
        },
        {
            key: 'mountains', name: 'MOUNTAIN TRAIL', item: 'MOLASSES', itemKey: 'molasses',
            intro: 'GET GRANDPAPPY\'S MOLASSES!',
            bg: { safe: '#2f3a2a', a: '#5a7a4a', median: '#7a6a4a', b: '#2f6ba0' },
            timeLimit: 30,
            rows: {
                7: { type: 'hazard', dir: 1, speed: 75, obstType: 'boulder', count: 4 },
                6: { type: 'hazard', dir: -1, speed: 55, obstType: 'bear', count: 3 },
                5: { type: 'hazard', dir: 1, speed: 140, obstType: 'pebble', count: 6 },
                3: { type: 'river', dir: 1, speed: 80, obstType: 'log', count: 4 },
                2: { type: 'river', dir: -1, speed: 60, obstType: 'canoe', count: 3 },
                1: { type: 'river', dir: 1, speed: 100, obstType: 'log2', count: 5 }
            },
            pickup: { key: 'berries', label: 'B', color: '#c9366f', name: 'BERRIES' }
        },
        {
            key: 'dream', name: 'GRANDPAPPY\'S DREAM', item: 'BED', itemKey: 'bed',
            intro: 'FIND YOUR WAY BACK TO BED!',
            bg: { safe: '#161233', a: '#241a4a', median: '#3a2a6a', b: '#141033' },
            timeLimit: 30,
            rows: {
                7: { type: 'hazard', dir: -1, speed: 130, obstType: 'denture', count: 5 },
                6: { type: 'hazard', dir: 1, speed: 90, obstType: 'clock', count: 4 },
                5: { type: 'hazard', dir: -1, speed: 150, obstType: 'ufoBeam', count: 4 },
                3: { type: 'river', dir: -1, speed: 70, obstType: 'pillow', count: 4 },
                2: { type: 'river', dir: 1, speed: 55, obstType: 'sheep', count: 4 },
                1: { type: 'river', dir: -1, speed: 90, obstType: 'pillow2', count: 5 }
            },
            pickup: { key: 'star', label: '*', color: '#ffe15a', name: 'STAR' }
        }
    ];

    // --- DOM refs --------------------------------------------------------------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvas-wrap');
    const bannerEl = document.getElementById('banner');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const hudScore = document.getElementById('hud-score');
    const hudHigh = document.getElementById('hud-high');
    const hudLevel = document.getElementById('hud-level');
    const hudLives = document.getElementById('hud-lives');
    const timerBar = document.getElementById('timer-bar');

    const LS = { muted: 'gp_muted', high: 'gp_high' };
    let muted = localStorage.getItem(LS.muted) === '1';

    // --- State -------------------------------------------------------------
    const state = {
        phase: 'start',        // start | levelIntro | playing | hit | levelClear | gameOver | win
        levelIndex: 0,
        lives: 3,
        score: 0,
        high: HS.getBoard('grandpappy', LS.high).personalBest.score,
        timer: 0,
        timeLimit: 30,
        bestRow: START_ROW,
        rowStates: {},          // rowIndex -> { cfg, def, offset }
        pickup: null,           // { x, y, w, h, collected, def }
        items: { glasses: false, cane: false, molasses: false, bed: false },
        player: { col: 4, row: START_ROW, x: 4 * TILE + TILE / 2, y: 0, bounce: 0, onPlatform: false, mood: 'unhappy' },
        particles: [],
        stars: [],
        banner: { timer: 0 },
        phaseTimer: 0,
        hitReason: '',
        winT: 0,
        shake: 0
    };

    function playerX() { return state.player.col * TILE + TILE / 2; }
    function rowY(r) { return r * TILE; }

    // --- Level / row setup ---------------------------------------------------
    function buildRowStates(levelIdx) {
        const lvl = LEVELS[levelIdx];
        state.rowStates = {};
        for (const rowIndex of Object.keys(lvl.rows)) {
            const cfg = lvl.rows[rowIndex];
            state.rowStates[rowIndex] = { cfg, def: OBST[cfg.obstType], offset: Math.random() * TILE };
        }
        // fixed decorative starfield for the dream level's safe rows
        state.stars = [];
        if (lvl.key === 'dream') {
            for (let i = 0; i < 40; i++) {
                state.stars.push({ x: Math.random() * W, y: Math.random() * H, s: 1 + Math.random() * 2 });
            }
        }
    }

    function obstacleRect(rowIndex, rowState, slot) {
        const cfg = rowState.cfg, def = rowState.def;
        const period = W / cfg.count;
        const x = mod(slot * period + rowState.offset, W) - def.w / 2;
        return { x, y: rowY(rowIndex) + (TILE - def.h) / 2, w: def.w, h: def.h, key: cfg.obstType };
    }

    function resetPlayerToStart() {
        state.player.col = 4;
        state.player.row = START_ROW;
        state.player.x = 4 * TILE + TILE / 2;
        state.player.bounce = 0;
        state.player.onPlatform = false;
        state.bestRow = START_ROW;
    }

    function placePickup() {
        const lvl = LEVELS[state.levelIndex];
        const col = 1 + Math.floor(Math.random() * (COLS - 2));
        state.pickup = {
            x: col * TILE + TILE / 2, y: rowY(MEDIAN_ROW) + TILE / 2,
            w: TILE * 0.4, h: TILE * 0.4, collected: false, def: lvl.pickup
        };
    }

    function startLevel(idx) {
        state.levelIndex = idx;
        const lvl = LEVELS[idx];
        state.timeLimit = lvl.timeLimit;
        state.timer = lvl.timeLimit;
        buildRowStates(idx);
        placePickup();
        resetPlayerToStart();
        state.phase = 'levelIntro';
        state.phaseTimer = 1.8;
        showBanner(lvl.name.toUpperCase() + '\n' + lvl.intro, 1.7);
        updateHUD();
    }

    function startGame() {
        state.score = 0;
        state.lives = 3;
        state.items = { glasses: false, cane: false, molasses: false, bed: false };
        modal.style.display = 'none';
        startLevel(0);
    }

    // --- Life / level flow -----------------------------------------------------
    function loseLife(reason) {
        if (state.phase !== 'playing') return;
        state.lives--;
        state.player.mood = 'unhappy';
        state.shake = 0.4;
        spawnHitDust(state.player.x, rowY(state.player.row) + TILE / 2);
        sfx.hit();
        if (state.lives <= 0) { gameOver(); return; }
        state.hitReason = reason;
        state.phase = 'hit';
        state.phaseTimer = 1.0;
        showBanner(reason, 0.9);
        updateHUD();
    }

    function reachGoal() {
        const lvl = LEVELS[state.levelIndex];
        state.items[lvl.itemKey] = true;
        state.score += 200 + Math.round(state.timer * 4);
        sfx.levelClear();
        state.phase = 'levelClear';
        state.phaseTimer = 1.9;
        showBanner('GOT THE ' + lvl.item + '!', 1.8);
        updateHUD();
        if (state.levelIndex >= LEVELS.length - 1) {
            state.phaseTimer = 1.4;
        }
    }

    function advanceAfterClear() {
        if (state.levelIndex >= LEVELS.length - 1) {
            winSequence();
        } else {
            startLevel(state.levelIndex + 1);
        }
    }

    function gameOver() {
        state.phase = 'gameOver';
        hideBanner();
        const isBest = state.score > state.high;
        const qualifies = HS.checkQualifies('grandpappy', state.score, LS.high);

        function finish() {
            if (isBest) state.high = state.score;
            modalContent.innerHTML = '<h1>GRANDPAPPY<br>GIVES UP</h1><p>SCORE ' + state.score + '<br>MADE IT TO ' + LEVELS[state.levelIndex].name + '</p><p style="color:#ff8fbf">' +
                (isBest ? 'NEW HIGH SCORE!' : 'HI ' + state.high) + '</p><button class="gp-btn" id="again-btn">TRY AGAIN</button>';
            modal.style.display = 'block';
            document.getElementById('again-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); startGame(); });
            updateHUD();
        }

        if (qualifies) {
            HS.showInitialsOverlay({ onSubmit: (name) => { HS.recordScore('grandpappy', name, state.score); finish(); } });
        } else {
            finish();
        }
        sfx.gameOver();
    }

    function winSequence() {
        state.phase = 'win';
        state.winT = 0;
        hideBanner();
        state.player.mood = 'happy';
        sfx.fanfare();
        for (let i = 0; i < 60; i++) spawnConfetti();
        const isBest = state.score > state.high;
        const qualifies = HS.checkQualifies('grandpappy', state.score, LS.high);
        function finish() {
            if (isBest) state.high = state.score;
            modalContent.innerHTML = '<h1 style="color:#6fd67a;text-shadow:0 0 10px #6fd67a">GRANDPAPPY<br>IS HAPPY!</h1><p>FINAL SCORE ' + state.score + '</p><p style="color:#ff8fbf">' +
                (isBest ? 'NEW HIGH SCORE!' : 'HI ' + state.high) + '</p><button class="gp-btn" id="again-btn">PLAY AGAIN</button>';
            modal.style.display = 'block';
            document.getElementById('again-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); startGame(); });
            updateHUD();
        }
        if (qualifies) {
            HS.showInitialsOverlay({ onSubmit: (name) => { HS.recordScore('grandpappy', name, state.score); finish(); } });
        } else {
            finish();
        }
    }

    // --- Input ----------------------------------------------------------------
    function attemptMove(dCol, dRow) {
        if (state.phase !== 'playing') return;
        const p = state.player;
        if (dRow !== 0) {
            const newRow = clamp(p.row + dRow, GOAL_ROW, START_ROW);
            if (newRow === p.row) return;
            p.row = newRow;
            p.bounce = 1;
            sfx.hop();
            if (newRow < state.bestRow) {
                state.score += 10;
                state.bestRow = newRow;
            }
            if (p.row === GOAL_ROW) { reachGoal(); return; }
            checkPickup();
        } else if (dCol !== 0) {
            const curCol = Math.round((p.x - TILE / 2) / TILE);
            const newCol = clamp(curCol + dCol, 0, COLS - 1);
            p.col = newCol;
            p.x = newCol * TILE + TILE / 2;
            p.bounce = 1;
            sfx.hop();
            checkPickup();
        }
    }

    function checkPickup() {
        if (state.player.row !== MEDIAN_ROW || !state.pickup || state.pickup.collected) return;
        const p = state.player;
        if (Math.abs(p.x - state.pickup.x) < TILE * 0.6) {
            state.pickup.collected = true;
            state.score += 25;
            sfx.pickup();
            showBanner('+25 ' + state.pickup.def.name, 0.8);
            updateHUD();
        }
    }

    const KEY_DIRS = {
        ArrowUp: [0, -1], w: [0, -1], W: [0, -1],
        ArrowDown: [0, 1], s: [0, 1], S: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0], A: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0], D: [1, 0]
    };

    document.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        const d = KEY_DIRS[e.key];
        if (d) { e.preventDefault(); ensureAudio(); attemptMove(d[0], d[1]); }
        else if (e.key === 'Escape') { window.location.href = 'index.html'; }
    });

    function wireDpad(id, dCol, dRow) {
        const el = document.getElementById(id);
        let repeatTimer = null, delayTimer = null;
        function fire() { ensureAudio(); attemptMove(dCol, dRow); }
        function start(e) {
            e.preventDefault(); el.classList.add('pressed'); fire();
            delayTimer = setTimeout(() => { repeatTimer = setInterval(fire, 150); }, 320);
        }
        function stop() { el.classList.remove('pressed'); clearTimeout(delayTimer); clearInterval(repeatTimer); }
        el.addEventListener('pointerdown', start);
        el.addEventListener('pointerup', stop);
        el.addEventListener('pointerleave', stop);
        el.addEventListener('pointercancel', stop);
    }
    wireDpad('dp-up', 0, -1);
    wireDpad('dp-down', 0, 1);
    wireDpad('dp-left', -1, 0);
    wireDpad('dp-right', 1, 0);

    // --- Update -----------------------------------------------------------
    function updateRows(dt) {
        for (const key in state.rowStates) {
            const rs = state.rowStates[key];
            rs.offset = mod(rs.offset + rs.cfg.dir * rs.cfg.speed * dt, W);
        }
    }

    function playerAABB() {
        const p = state.player;
        return { x: p.x - PW / 2, y: rowY(p.row) + (TILE - PH) / 2, w: PW, h: PH };
    }

    function overlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function checkCollisions(dt) {
        const p = state.player;
        const rs = state.rowStates[p.row];
        if (!rs) { p.onPlatform = false; return; }
        const pRect = playerAABB();
        if (rs.cfg.type === 'hazard') {
            for (let i = 0; i < rs.cfg.count; i++) {
                if (overlap(pRect, obstacleRect(p.row, rs, i))) { loseLife(hazardMessage(rs.cfg.obstType)); return; }
            }
            p.onPlatform = false;
        } else if (rs.cfg.type === 'river') {
            let carried = false;
            for (let i = 0; i < rs.cfg.count; i++) {
                if (overlap(pRect, obstacleRect(p.row, rs, i))) {
                    p.x += rs.cfg.dir * rs.cfg.speed * dt;
                    carried = true;
                    break;
                }
            }
            p.onPlatform = carried;
            if (!carried) { loseLife(riverMessage(rs.cfg.obstType)); return; }
            if (p.x < -PW / 2 || p.x > W + PW / 2) { loseLife(riverMessage(rs.cfg.obstType)); return; }
        } else {
            p.onPlatform = false;
        }
    }

    function hazardMessage(key) {
        const M = {
            cart: 'BONK! RUNAWAY CART!', melon: 'SPLAT! ROLLING MELON!', forklift: 'CRUNCH! FORKLIFT!',
            cart2: 'BONK! LOOSE CART!', mop: 'SLIP! WET FLOOR!', can: 'CLATTER! CANNED GOODS!',
            car: 'HONK! HIT BY A CAR!', truck: 'CRASH! BIG TRUCK!', motorcycle: 'VROOM! MOTORCYCLE!',
            bus: 'SCHOOL BUS! WATCH OUT!', car2: 'HONK! ANOTHER CAR!', sportscar: 'ZOOM! TOO FAST!',
            boulder: 'ROCKSLIDE! BOULDER!', bear: 'GRRR! A BEAR!', pebble: 'OW! FLYING PEBBLES!',
            denture: 'CHOMP! FLYING DENTURES!', clock: 'BONG! ALARM CLOCK!', ufoBeam: 'ZAP! UFO BEAM!'
        };
        return M[key] || 'OUCH!';
    }
    function riverMessage(key) {
        const M = { log: 'SPLASH! MISSED THE LOG!', canoe: 'SPLASH! TIPPED THE CANOE!', log2: 'SPLASH! INTO THE RIVER!',
            pillow: 'FLOP! FELL THROUGH THE CLOUDS!', sheep: 'BAA! LOST YOUR FOOTING!', pillow2: 'FLOP! MISSED THE PILLOW!' };
        return M[key] || 'GRANDPAPPY DOZED OFF!';
    }

    function update(dt) {
        updateBanner(dt);
        if (state.shake > 0) state.shake = Math.max(0, state.shake - dt);
        updateParticles(dt);

        if (state.phase === 'levelIntro') {
            updateRows(dt);
            state.phaseTimer -= dt;
            if (state.phaseTimer <= 0) state.phase = 'playing';
            return;
        }
        if (state.phase === 'hit') {
            state.phaseTimer -= dt;
            if (state.phaseTimer <= 0) { resetPlayerToStart(); state.timer = state.timeLimit; state.phase = 'playing'; }
            return;
        }
        if (state.phase === 'levelClear') {
            updateRows(dt);
            state.phaseTimer -= dt;
            if (state.phaseTimer <= 0) advanceAfterClear();
            return;
        }
        if (state.phase === 'win') {
            state.winT += dt;
            return;
        }
        if (state.phase !== 'playing') return;

        updateRows(dt);
        if (state.player.bounce > 0) state.player.bounce = Math.max(0, state.player.bounce - dt * 5);
        checkCollisions(dt);
        if (state.phase !== 'playing') return;

        state.timer -= dt;
        if (state.timer <= 0) { loseLife('GRANDPAPPY DOZED OFF!'); return; }
        updateHUD();
    }

    // --- Particles / confetti --------------------------------------------------
    function spawnConfetti() {
        const cols = ['#ffd166', '#6fd67a', '#7de8ff', '#ff8fbf', '#ffb454'];
        state.particles.push({
            x: Math.random() * W, y: -20 - Math.random() * 100,
            vx: (Math.random() - 0.5) * 60, vy: 80 + Math.random() * 100,
            life: 4 + Math.random() * 2, maxLife: 6, size: 4 + Math.random() * 4,
            color: cols[Math.floor(Math.random() * cols.length)], confetti: true
        });
    }
    function spawnHitDust(x, y) {
        for (let i = 0; i < 10; i++) {
            const a = Math.random() * Math.PI * 2, sp = 50 + Math.random() * 120;
            state.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 0.5, maxLife: 0.5, size: 3, color: '#f5e6c8' });
        }
    }
    function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            p.life -= dt;
            if (p.life <= 0 || (!p.confetti && p.y > H + 40)) { state.particles.splice(i, 1); continue; }
            p.vy += (p.confetti ? 20 : 260) * dt;
            p.x += p.vx * dt; p.y += p.vy * dt;
            if (p.confetti && p.y > H + 20) { p.y = -20; p.x = Math.random() * W; }
        }
    }

    // --- Audio --------------------------------------------------------------
    let audioCtx = null;
    function ensureAudio() { if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return; audioCtx = new AC(); } if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function tone(freq, dur, type, vol, slideTo, when) {
        if (muted || !audioCtx) return;
        const t0 = audioCtx.currentTime + (when || 0);
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = type || 'square'; osc.frequency.setValueAtTime(freq, t0);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
        gain.gain.setValueAtTime(vol || 0.06, t0); gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(gain).connect(audioCtx.destination); osc.start(t0); osc.stop(t0 + dur + 0.02);
    }
    const sfx = {
        hop: () => tone(440, 0.04, 'square', 0.04, 560),
        hit: () => tone(180, 0.3, 'sawtooth', 0.09, 40),
        pickup: () => [660, 880].forEach((f, i) => tone(f, 0.07, 'square', 0.05, undefined, i * 0.06)),
        levelClear: () => [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.1, 'square', 0.06, undefined, i * 0.08)),
        gameOver: () => [400, 320, 240, 160].forEach((f, i) => tone(f, 0.22, 'sawtooth', 0.07, undefined, i * 0.13)),
        fanfare: () => [523, 523, 659, 784, 1047, 784, 1047, 1319].forEach((f, i) => tone(f, 0.14, 'square', 0.06, undefined, i * 0.1)),
        select: () => tone(660, 0.05, 'square', 0.04)
    };

    // --- Player sprite (10x12 pixel grid) --------------------------------------
    const PLAYER_GRID = [
        '.HHHHHHHH.',
        'H.SSSSSS.H',
        'H.SSSSSS.H',
        '..SSSSSS..',
        '..SeSSeS..',
        '..SSSSSS..',
        '..SMMMMS..',
        '..SSSSSS..',
        '.CCCCCCCC.',
        'CCCCCCCCCC',
        '..PPPPPP..',
        '..OO..OO..'
    ];
    const PLAYER_COLORS = { H: '#e8e8e8', S: '#e8b98a', e: '#e8b98a', M: '#f5f5f5', C: '#b23b3b', P: '#3a5a8a', O: '#1a1a1a' };

    function drawPlayerBitmap(cx, topY, cell, mood) {
        const gw = PLAYER_GRID[0].length, gh = PLAYER_GRID.length;
        const startX = cx - (gw * cell) / 2;
        for (let r = 0; r < gh; r++) {
            const row = PLAYER_GRID[r];
            for (let c = 0; c < gw; c++) {
                const ch = row[c];
                if (ch === '.') continue;
                ctx.fillStyle = PLAYER_COLORS[ch];
                ctx.fillRect(Math.round(startX + c * cell), Math.round(topY + r * cell), Math.ceil(cell) + 1, Math.ceil(cell) + 1);
            }
        }
        // eyes (pupils)
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(Math.round(startX + 3 * cell), Math.round(topY + 4 * cell), Math.ceil(cell), Math.ceil(cell));
        ctx.fillRect(Math.round(startX + 6 * cell), Math.round(topY + 4 * cell), Math.ceil(cell), Math.ceil(cell));
        // eyebrows
        ctx.fillStyle = '#d8d8d8';
        if (mood === 'happy') {
            ctx.fillRect(Math.round(startX + 2 * cell), Math.round(topY + 2.6 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.6));
            ctx.fillRect(Math.round(startX + 5.4 * cell), Math.round(topY + 2.6 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.6));
        } else {
            ctx.fillRect(Math.round(startX + 2 * cell), Math.round(topY + 3.2 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.6));
            ctx.fillRect(Math.round(startX + 5.4 * cell), Math.round(topY + 3.2 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.6));
        }
        // mouth
        ctx.fillStyle = '#3a1a12';
        const mouthY = topY + 7.2 * cell;
        if (mood === 'happy') {
            ctx.fillRect(Math.round(startX + 3 * cell), Math.round(mouthY), Math.ceil(cell), Math.ceil(cell * 0.5));
            ctx.fillRect(Math.round(startX + 4 * cell), Math.round(mouthY + cell * 0.4), Math.ceil(cell * 2), Math.ceil(cell * 0.5));
            ctx.fillRect(Math.round(startX + 6 * cell), Math.round(mouthY), Math.ceil(cell), Math.ceil(cell * 0.5));
        } else {
            ctx.fillRect(Math.round(startX + 3 * cell), Math.round(mouthY + cell * 0.4), Math.ceil(cell), Math.ceil(cell * 0.5));
            ctx.fillRect(Math.round(startX + 4 * cell), Math.round(mouthY), Math.ceil(cell * 2), Math.ceil(cell * 0.5));
            ctx.fillRect(Math.round(startX + 6 * cell), Math.round(mouthY + cell * 0.4), Math.ceil(cell), Math.ceil(cell * 0.5));
        }
        // collected items worn on his person
        if (state.items.glasses) {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(Math.round(startX + 2.6 * cell), Math.round(topY + 4.1 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.35));
            ctx.fillRect(Math.round(startX + 5.8 * cell), Math.round(topY + 4.1 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.35));
            ctx.fillRect(Math.round(startX + 4.6 * cell), Math.round(topY + 4.1 * cell), Math.ceil(cell * 0.8), Math.ceil(cell * 0.25));
        }
        if (state.items.cane) {
            ctx.fillStyle = '#8a5a2f';
            ctx.fillRect(Math.round(startX + 10 * cell), Math.round(topY + 5 * cell), Math.ceil(cell * 0.6), Math.ceil(cell * 6));
            ctx.fillRect(Math.round(startX + 9.6 * cell), Math.round(topY + 4.6 * cell), Math.ceil(cell * 1.4), Math.ceil(cell * 0.6));
        }
        if (state.items.molasses) {
            ctx.fillStyle = '#5a3410';
            ctx.fillRect(Math.round(startX - 2.6 * cell), Math.round(topY + 7.5 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 2.2));
            ctx.fillStyle = '#3a230a';
            ctx.fillRect(Math.round(startX - 2.6 * cell), Math.round(topY + 7.1 * cell), Math.ceil(cell * 1.6), Math.ceil(cell * 0.5));
        }
    }

    function drawPlayer() {
        const p = state.player;
        const cx = p.x;
        const bounceOffset = Math.sin(p.bounce * Math.PI) * 10;
        const squash = 1 - Math.sin(p.bounce * Math.PI) * 0.18;
        const cell = (PH / 12) * squash;
        const topY = rowY(p.row) + TILE - PH * squash - 6 - bounceOffset;
        // shadow
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.beginPath();
        ctx.ellipse(cx, rowY(p.row) + TILE - 8, PW * 0.34, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        drawPlayerBitmap(cx, topY, cell, p.mood);
    }

    // --- Obstacle drawing --------------------------------------------------
    const PIXCIRCLE = ['.XXX.', 'XXXXX', 'XXXXX', 'XXXXX', '.XXX.'];
    function drawMask(mask, x, y, w, h, color) {
        const cw = w / mask[0].length, ch = h / mask.length;
        ctx.fillStyle = color;
        for (let r = 0; r < mask.length; r++) {
            for (let c = 0; c < mask[r].length; c++) {
                if (mask[r][c] !== '.') ctx.fillRect(Math.round(x + c * cw), Math.round(y + r * ch), Math.ceil(cw) + 1, Math.ceil(ch) + 1);
            }
        }
    }

    function drawVehicle(o, def) {
        ctx.fillStyle = def.color;
        ctx.fillRect(o.x, o.y + o.h * 0.14, o.w, o.h * 0.6);
        ctx.fillStyle = '#1a1a1a';
        const ww = Math.max(6, o.w * 0.1), wh = Math.max(6, o.h * 0.26);
        ctx.fillRect(o.x + o.w * 0.1, o.y + o.h * 0.66, ww, wh);
        ctx.fillRect(o.x + o.w * 0.78, o.y + o.h * 0.66, ww, wh);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(o.x + o.w * 0.14, o.y + o.h * 0.2, o.w * 0.72, o.h * 0.2);
        ctx.fillStyle = '#ffe98a';
        ctx.fillRect(o.x + o.w - 5, o.y + o.h * 0.35, 4, 4);
        ctx.fillRect(o.x + 1, o.y + o.h * 0.35, 4, 4);
    }

    function drawRound(o, def) {
        drawMask(PIXCIRCLE, o.x, o.y, o.w, o.h, def.color);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(o.x + o.w * 0.55, o.y + o.h * 0.55, o.w * 0.3, o.h * 0.3);
        if (o.key === 'clock') {
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(o.x + o.w * 0.05, o.y - o.h * 0.12, o.w * 0.22, o.h * 0.2);
            ctx.fillRect(o.x + o.w * 0.73, o.y - o.h * 0.12, o.w * 0.22, o.h * 0.2);
            ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
            const cx = o.x + o.w / 2, cy = o.y + o.h / 2;
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - o.h * 0.28); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + o.w * 0.2, cy); ctx.stroke();
        }
    }

    function drawBlob(o, def) {
        drawMask(PIXCIRCLE, o.x, o.y, o.w, o.h, def.color);
        ctx.fillStyle = def.color;
        ctx.fillRect(o.x + o.w * 0.05, o.y - o.h * 0.1, o.w * 0.2, o.h * 0.22);
        ctx.fillRect(o.x + o.w * 0.75, o.y - o.h * 0.1, o.w * 0.2, o.h * 0.22);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(o.x + o.w * 0.3, o.y + o.h * 0.4, o.w * 0.1, o.h * 0.1);
        ctx.fillRect(o.x + o.w * 0.6, o.y + o.h * 0.4, o.w * 0.1, o.h * 0.1);
        if (o.key === 'bear') {
            ctx.fillStyle = '#c9a06a';
            ctx.fillRect(o.x + o.w * 0.35, o.y + o.h * 0.55, o.w * 0.3, o.h * 0.25);
        }
    }

    function drawPlatform(o, def) {
        ctx.fillStyle = def.color;
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        for (let i = 1; i < 3; i++) ctx.fillRect(o.x + 4, o.y + (o.h / 3) * i - 1, o.w - 8, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(o.x, o.y, o.w, 3);
        if (o.key === 'canoe') {
            ctx.fillStyle = '#5a3410';
            ctx.fillRect(o.x + o.w * 0.42, o.y - o.h * 0.3, o.w * 0.16, o.h * 0.4);
        }
        if (o.key === 'sheep') {
            ctx.fillStyle = '#3a3a3a';
            ctx.fillRect(o.x + o.w * 0.05, o.y - o.h * 0.12, o.w * 0.18, o.h * 0.22);
            ctx.fillStyle = '#f4f4f4';
            ctx.fillRect(o.x + o.w * 0.7, o.y - o.h * 0.15, o.w * 0.22, o.h * 0.25);
            ctx.fillRect(o.x - o.w * 0.06, o.y + o.h * 0.15, o.w * 0.14, o.h * 0.5);
        }
    }

    function drawSpecial(o, def) {
        if (o.key === 'denture') {
            ctx.fillStyle = def.color;
            ctx.fillRect(o.x, o.y + o.h * 0.15, o.w, o.h * 0.55);
            ctx.fillStyle = '#e88a9a';
            ctx.fillRect(o.x, o.y + o.h * 0.62, o.w, o.h * 0.14);
            ctx.fillStyle = '#c9c9c9';
            for (let i = 0; i < 6; i++) ctx.fillRect(o.x + (o.w / 6) * i, o.y + o.h * 0.15, 2, o.h * 0.5);
        } else if (o.key === 'ufoBeam') {
            ctx.save();
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = def.color;
            ctx.beginPath();
            ctx.moveTo(o.x + o.w * 0.3, o.y);
            ctx.lineTo(o.x + o.w * 0.7, o.y);
            ctx.lineTo(o.x + o.w, o.y + o.h);
            ctx.lineTo(o.x, o.y + o.h);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            ctx.fillStyle = '#8a94a8';
            ctx.fillRect(o.x + o.w * 0.2, o.y - o.h * 0.12, o.w * 0.6, o.h * 0.16);
            ctx.fillStyle = '#bcc6d8';
            ctx.fillRect(o.x + o.w * 0.35, o.y - o.h * 0.24, o.w * 0.3, o.h * 0.16);
        }
    }

    function drawObstacle(o) {
        const def = OBST[o.key];
        switch (def.family) {
            case 'vehicle': drawVehicle(o, def); break;
            case 'round': drawRound(o, def); break;
            case 'blob': drawBlob(o, def); break;
            case 'platform': drawPlatform(o, def); break;
            case 'special': drawSpecial(o, def); break;
        }
    }

    // --- Goal item icons -------------------------------------------------------
    function drawGoalItem(itemKey, cx, cy) {
        ctx.save();
        ctx.translate(cx, cy);
        if (itemKey === 'glasses') {
            ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
            ctx.strokeRect(-20, -8, 16, 16);
            ctx.strokeRect(4, -8, 16, 16);
            ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(4, 0); ctx.stroke();
        } else if (itemKey === 'cane') {
            ctx.fillStyle = '#8a5a2f';
            ctx.fillRect(-3, -18, 6, 34);
            ctx.fillRect(-3, -18, 16, 6);
        } else if (itemKey === 'molasses') {
            ctx.fillStyle = '#5a3410'; ctx.fillRect(-12, -6, 24, 24);
            ctx.fillStyle = '#3a230a'; ctx.fillRect(-12, -12, 24, 8);
            ctx.fillStyle = '#e8d9a0'; ctx.fillRect(-8, 0, 16, 8);
        } else if (itemKey === 'bed') {
            ctx.fillStyle = '#c9a6ff'; ctx.fillRect(-24, -6, 48, 16);
            ctx.fillStyle = '#f4f4f4'; ctx.fillRect(-24, -16, 18, 12);
            ctx.fillStyle = '#e8e8e8'; ctx.font = '10px monospace'; ctx.fillText('Z z Z', 2, -14);
        }
        ctx.restore();
    }

    // --- Background --------------------------------------------------------
    function rowBgColor(lvl, rowIndex) {
        if (rowIndex === START_ROW || rowIndex === GOAL_ROW) return lvl.bg.safe;
        if (rowIndex === MEDIAN_ROW) return lvl.bg.median;
        if (rowIndex > MEDIAN_ROW) return lvl.bg.a;
        return lvl.bg.b;
    }

    function drawRowTexture(lvl, rowIndex, y) {
        ctx.save();
        if (lvl.key === 'grocery') {
            ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 20) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + TILE); ctx.stroke(); }
        } else if (lvl.key === 'roads' && rowIndex !== MEDIAN_ROW && rowIndex !== START_ROW && rowIndex !== GOAL_ROW) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            for (let x = -10; x < W; x += 34) ctx.fillRect(x, y + TILE / 2 - 2, 16, 4);
        } else if (lvl.key === 'mountains') {
            const rs = state.rowStates[rowIndex];
            if (rs && rs.cfg.type === 'river') {
                ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2;
                for (let x = 0; x < W; x += 26) { ctx.beginPath(); ctx.moveTo(x, y + TILE * 0.3); ctx.quadraticCurveTo(x + 13, y + TILE * 0.2, x + 26, y + TILE * 0.3); ctx.stroke(); }
            } else if (rowIndex !== MEDIAN_ROW && rowIndex !== START_ROW && rowIndex !== GOAL_ROW) {
                ctx.fillStyle = 'rgba(0,0,0,0.12)';
                for (let i = 0; i < 6; i++) ctx.fillRect((i * 97) % W, y + TILE * 0.5, 4, 4);
            }
        } else if (lvl.key === 'dream' && (rowIndex === START_ROW || rowIndex === GOAL_ROW || rowIndex === MEDIAN_ROW)) {
            ctx.fillStyle = '#f4f4f4';
            for (const st of state.stars) {
                if (st.y >= y && st.y < y + TILE) ctx.fillRect(st.x, st.y, st.s, st.s);
            }
        }
        ctx.restore();
    }

    function drawBackground() {
        const lvl = LEVELS[state.levelIndex];
        for (let r = 0; r < ROWS; r++) {
            ctx.fillStyle = rowBgColor(lvl, r);
            ctx.fillRect(0, rowY(r), W, TILE);
            drawRowTexture(lvl, r, rowY(r));
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        for (let r = 1; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, rowY(r)); ctx.lineTo(W, rowY(r)); ctx.stroke(); }
        // goal item
        drawGoalItem(lvl.itemKey, W / 2, rowY(GOAL_ROW) + TILE / 2);
        // median pickup
        if (state.pickup && !state.pickup.collected) {
            const pu = state.pickup;
            ctx.fillStyle = pu.def.color;
            ctx.save();
            ctx.translate(pu.x, pu.y);
            const bob = Math.sin(performance.now() / 300) * 3;
            ctx.translate(0, bob);
            ctx.fillRect(-pu.w / 2, -pu.h / 2, pu.w, pu.h);
            ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(pu.def.label, 0, 1);
            ctx.restore();
        }
    }

    // --- Render -------------------------------------------------------------
    function render() {
        ctx.save();
        if (state.shake > 0) ctx.translate((Math.random() - 0.5) * state.shake * 10, (Math.random() - 0.5) * state.shake * 10);
        ctx.clearRect(-20, -20, W + 40, H + 40);

        if (state.phase === 'win') {
            renderWinScene();
            ctx.restore();
            return;
        }

        drawBackground();
        for (const key in state.rowStates) {
            const rs = state.rowStates[key];
            for (let i = 0; i < rs.cfg.count; i++) drawObstacle(obstacleRect(Number(key), rs, i));
        }
        drawPlayer();
        for (const p of state.particles) {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            if (p.confetti) ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            else ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    function renderWinScene() {
        ctx.fillStyle = '#0a0620';
        ctx.fillRect(0, 0, W, H);
        for (const st of state.stars) ctx.fillStyle = '#fff', ctx.fillRect(st.x, st.y, st.s, st.s);
        for (const p of state.particles) {
            ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        const cell = 9;
        drawPlayerBitmap(W / 2, H * 0.32, cell, 'happy');
        const alpha = 0.55 + Math.sin(state.winT * 6) * 0.45;
        ctx.save();
        ctx.globalAlpha = clamp(alpha, 0.1, 1);
        ctx.fillStyle = '#6fd67a';
        ctx.font = "bold 22px 'Press Start 2P', monospace";
        ctx.textAlign = 'center';
        ctx.shadowColor = '#6fd67a'; ctx.shadowBlur = 16;
        ctx.fillText('GRANDPAPPY', W / 2, H * 0.72);
        ctx.fillText('IS HAPPY!', W / 2, H * 0.72 + 30);
        ctx.restore();
    }

    // --- HUD / banner -----------------------------------------------------
    function updateHUD() {
        hudScore.textContent = state.score;
        hudHigh.textContent = 'HI ' + Math.max(state.high, state.score);
        hudLevel.textContent = 'LV ' + (state.levelIndex + 1);
        hudLives.textContent = state.lives > 0 ? '●'.repeat(state.lives) : '—';
        const pct = state.timeLimit > 0 ? clamp(state.timer / state.timeLimit, 0, 1) : 1;
        timerBar.style.width = (pct * 100) + '%';
        timerBar.style.background = pct < 0.25 ? '#ff5470' : (pct < 0.5 ? '#ffd166' : '#6fd67a');
    }

    function showBanner(text, dur) {
        state.banner = { timer: dur };
        bannerEl.innerHTML = text.replace(/\n/g, '<br>');
        bannerEl.classList.add('show');
    }
    function hideBanner() { bannerEl.classList.remove('show'); state.banner = null; }
    function updateBanner(dt) { if (!state.banner || state.banner.timer <= 0) return; state.banner.timer -= dt; if (state.banner.timer <= 0) hideBanner(); }

    // --- Layout / resize -----------------------------------------------------
    let scale = 1;
    function resizeCanvas() {
        const rect = canvasWrap.getBoundingClientRect();
        const availW = Math.max(200, Math.floor(rect.width));
        const availH = Math.max(200, Math.floor(rect.height));
        scale = Math.min(availW / W, availH / H);
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(W * scale * dpr);
        canvas.height = Math.floor(H * scale * dpr);
        canvas.style.width = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';
        ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
    }

    // --- Start screen --------------------------------------------------------
    function showStart() {
        state.phase = 'start';
        modalContent.innerHTML =
            '<h1>GRANDPAPPY<br>IS UNHAPPY</h1>' +
            '<p>He\'s lost his glasses, his cane, and his molasses.<br>Hop him across danger to fetch them all!</p>' +
            '<div class="legend">&uarr;&darr;&larr;&rarr; or WASD or the D-PAD to hop<br>' +
            'Dodge carts, cars, boulders &amp; worse<br>' +
            'On river rows, ride the logs / canoes / pillows<br>' +
            'Beat all 4 levels &mdash; Grandpappy is happy!</div>' +
            '<button class="gp-btn" id="play-btn">START</button>';
        document.getElementById('play-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); startGame(); });
        modal.style.display = 'block';
        updateHUD();
    }

    const muteBtn = document.getElementById('mute-btn');
    function updateMute() { muteBtn.textContent = muted ? '\u{1F507}' : '\u{1F50A}'; }
    muteBtn.addEventListener('click', () => { ensureAudio(); muted = !muted; localStorage.setItem(LS.muted, muted ? '1' : '0'); sfx.select(); updateMute(); });
    updateMute();

    // --- Boot ---------------------------------------------------------------
    resizeCanvas();
    let resizeRAF;
    window.addEventListener('resize', () => { cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(resizeCanvas); });
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

    let lastT = 0;
    function loop(ts) {
        const t = ts / 1000; const dt = Math.min(0.05, t - lastT || 0.016); lastT = t;
        update(dt);
        render();
        requestAnimationFrame(loop);
    }

    showStart();
    requestAnimationFrame(loop);

    // Test hooks
    window.state = state;
    window.startGameTest = startGame;
    window.attemptMoveTest = attemptMove;
    window.winTest = winSequence;
</script>
</body>
</html>
