<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zack's Arcade — Insert Cartridge to Play</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            height: 100dvh;
            min-height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
            padding: 12px;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(10px, 2.2vh, 22px);
            width: 100%;
            max-width: 720px;
        }

        #site-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(1rem, 4vw, 1.6rem);
            color: #eee;
            text-shadow: 2px 2px 0 #c0392b, 4px 4px 0 rgba(0, 0, 0, 0.4);
            margin: 0;
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* ---- NES-style console ---- */
        #console {
            position: relative;
            width: min(360px, 82vw);
            height: clamp(140px, 24vh, 190px);
            background: linear-gradient(180deg, #f2f2f2 0%, #d8d8d8 45%, #c9c9c9 55%, #e6e6e6 100%);
            border-radius: 10px 10px 4px 4px;
            border: 1px solid #b5b5b5;
            box-shadow:
                0 14px 30px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.9),
                inset 0 -4px 8px rgba(0, 0, 0, 0.15);
        }

        #console-seam {
            position: absolute;
            left: 6%;
            right: 6%;
            top: 58%;
            height: 2px;
            background: #aaa;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        #vents {
            position: absolute;
            left: 8%;
            top: 12%;
            width: 16%;
            height: 8%;
            background: repeating-linear-gradient(90deg, #bbb 0 2px, transparent 2px 6px);
            opacity: 0.7;
        }

        /* Front-loading slot: an angled trapezoid (not a plain rectangle) with
           a raised lighter lip around it, so it reads as a beveled opening. */
        #slot-assembly {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 62%;
            height: 20%;
        }

        #slot-lip {
            position: absolute;
            inset: -7px -12px;
            background: linear-gradient(180deg, #ececec, #c0c0c0);
            clip-path: polygon(4% 0, 96% 0, 100% 100%, 0 100%);
            border-radius: 4px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 2px 3px rgba(0, 0, 0, 0.25);
        }

        #slot {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #1a1a1a, #000);
            clip-path: polygon(6% 0, 94% 0, 100% 100%, 0 100%);
            border-radius: 3px;
            box-shadow: inset 0 6px 10px rgba(0, 0, 0, 0.9), inset 0 0 10px #000;
            transition: box-shadow 0.15s ease;
        }

        #slot.slot-hot {
            box-shadow: inset 0 6px 10px rgba(0, 0, 0, 0.9), inset 0 0 10px #000,
                0 0 14px 3px rgba(255, 70, 70, 0.7);
        }

        #red-accent {
            position: absolute;
            right: 9%;
            bottom: 15%;
            width: 20%;
            height: 11%;
            background: linear-gradient(180deg, #e0453f, #b5211d);
            border-radius: 3px;
            border: 1px solid #8f1a17;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), inset 0 -2px 3px rgba(0, 0, 0, 0.3);
        }

        #power-led {
            position: absolute;
            left: 9%;
            bottom: 18%;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff8a80, #d0242a 60%, #7a0e0e 100%);
            box-shadow: 0 0 7px 2px rgba(255, 40, 40, 0.7);
        }

        #hint {
            font-size: clamp(0.7rem, 2.2vw, 0.9rem);
            color: #aaa;
            margin: 0;
            text-align: center;
        }

        /* ---- Cartridge tray ---- */
        #tray {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(12px, 3vw, 24px);
            justify-content: center;
            max-width: min(600px, 92vw);
        }

        .cartridge {
            position: relative;
            width: clamp(96px, 26vw, 140px);
            height: clamp(72px, 18vw, 96px);
            box-sizing: border-box;
            padding: 6px;
            background: linear-gradient(180deg, #222 0%, #0d0d0d 100%);
            border: 2px solid var(--cart-color, #0f0);
            border-radius: 8px 8px 3px 3px;
            /* Diagonal cut on the bottom-left corner mimics the notch that
               enforces correct cartridge orientation on real hardware. */
            clip-path: polygon(0 0, 100% 0, 100% 100%, 22% 100%, 0 78%);
            box-shadow:
                0 0 10px var(--cart-color, #0f0),
                inset 0 0 8px rgba(0, 0, 0, 0.6),
                0 6px 10px rgba(0, 0, 0, 0.5);
            cursor: grab;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.15s ease;
        }

        .cartridge:active {
            cursor: grabbing;
        }

        .cartridge.dragging {
            transition: none;
            z-index: 200;
            box-shadow: 0 0 18px var(--cart-color, #0f0), 0 10px 20px rgba(0, 0, 0, 0.6);
        }

        .cartridge:focus-visible {
            outline: 2px dashed var(--cart-color, #0f0);
            outline-offset: 3px;
        }

        /* Fully interactive like any other cartridge, just visually marked
           as "not fully installed yet" via a dashed border. */
        .cartridge.coming-soon {
            border-style: dashed;
        }

        .cart-connector {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 46%;
            height: 8px;
            border-radius: 2px;
            background: repeating-linear-gradient(90deg, var(--cart-color, #0f0) 0 3px, #000 3px 5px);
            opacity: 0.9;
        }

        .cart-title {
            color: var(--cart-color, #0f0);
            text-shadow: 0 0 6px var(--cart-color, #0f0);
            font-size: clamp(0.55rem, 2.2vw, 0.75rem);
            text-align: center;
            line-height: 1.25;
        }

        .cart-subtitle {
            color: var(--cart-accent, #0f0);
            font-size: clamp(0.45rem, 1.7vw, 0.6rem);
            margin-top: 4px;
            opacity: 0.85;
        }

        /* ---- Power-on transition overlay ---- */
        #poweron-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.15s ease;
        }

        #poweron-overlay.active {
            opacity: 1;
            pointer-events: all;
            animation: crtFlicker 0.5s steps(2, end) 2;
        }

        #poweron-text {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(0.75rem, 3vw, 1.2rem);
            letter-spacing: 0.1em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            text-align: center;
            padding: 0 20px;
            max-width: 420px;
        }

        /* The joke punchline reads better in a plain monospace font than the
           pixel font, which is better suited to the short "LOADING..." line. */
        .joke-line {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: normal;
            font-size: 0.8em;
            line-height: 1.5;
            display: inline-block;
        }

        .soon-tag {
            display: inline-block;
            margin-top: 10px;
            color: #ffaa00;
            text-shadow: 0 0 8px #ffaa00;
            font-size: 0.65em;
            letter-spacing: 0.1em;
        }

        /* Loading bar: only shown while a real game is loading (6s), not
           during the coming-soon joke flow. */
        #loading-bar-track {
            width: min(260px, 70vw);
            height: 16px;
            border: 2px solid #0f0;
            border-radius: 3px;
            background: #001a00;
            overflow: hidden;
        }

        #loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #0f0;
            box-shadow: 0 0 10px currentColor;
        }

        #loading-bar-pct {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7rem;
            color: #0f0;
            text-shadow: 0 0 6px #0f0;
        }

        @keyframes crtFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @media (max-width: 420px) {
            #site-title { letter-spacing: 0.02em; }
            .cart-title { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

    <div id="hub">
        <h1 id="site-title">ZACK'S ARCADE</h1>

        <div id="console">
            <div id="console-seam"></div>
            <div id="vents"></div>
            <div id="slot-assembly">
                <div id="slot-lip"></div>
                <div id="slot"></div>
            </div>
            <div id="red-accent"></div>
            <div id="power-led"></div>
        </div>

        <p id="hint">Drag a cartridge into the slot — or just tap one — to play.</p>

        <div id="tray"></div>
    </div>

    <div id="poweron-overlay">
        <div id="poweron-text"></div>
        <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
        <div id="loading-bar-pct"></div>
    </div>

    <script>
        // --- Game Catalog (data-driven: add a game by adding one entry here) ---
        const GAMES = [
            {
                id: 'asteroids',
                title: 'ASTEROIDS: JUNGLE ACES',
                subtitle: 'SPACE SHOOTER',
                file: 'index_asteroids_monkeys.html',
                color: '#23a0ff',
                accent: '#ff55aa'
            },
            {
                id: 'galaga',
                title: 'GALAGA VECTOR',
                subtitle: 'ARCADE SHOOTER',
                file: 'index_galaga_v1.html',
                color: '#0F0',
                accent: '#FF0'
            },
            {
                id: 'asteroids-maze',
                title: 'ASTEROIDS: MAZE EDITION',
                subtitle: 'COMING SOON',
                comingSoon: true,
                color: '#b26bff',
                accent: '#7dd3fc',
                joke: 'The asteroids wandered into the maze and got hopelessly lost.'
            },
            {
                id: 'candy-checkers',
                title: 'CANDY CHECKERS',
                subtitle: 'COMING SOON',
                comingSoon: true,
                color: '#ff4d6d',
                accent: '#ffd166',
                joke: 'You just ate your own king piece. Rookie mistake.'
            },
            {
                id: 'tank-wars',
                title: 'TANK WARS',
                subtitle: 'COMING SOON',
                comingSoon: true,
                color: '#8a9a5b',
                accent: '#ffa500',
                joke: 'Tank got stuck backing out of the garage.'
            }
        ];

        const tray = document.getElementById('tray');
        const slot = document.getElementById('slot');
        const overlay = document.getElementById('poweron-overlay');
        const overlayText = document.getElementById('poweron-text');
        const loadingBarTrack = document.getElementById('loading-bar-track');
        const loadingBarFill = document.getElementById('loading-bar-fill');
        const loadingBarPct = document.getElementById('loading-bar-pct');

        // Animates the loading bar from 0-100% over `durationMs`, themed to
        // the game's own color, then calls onComplete. Only used for real
        // games (see launchGame) — the coming-soon joke flow stays quick.
        function startLoadingBar(color, durationMs, onComplete) {
            loadingBarTrack.style.display = '';
            loadingBarPct.style.display = '';
            loadingBarTrack.style.borderColor = color;
            loadingBarFill.style.background = color;
            loadingBarFill.style.color = color; // for box-shadow: 0 0 10px currentColor
            loadingBarFill.style.width = '0%';
            loadingBarPct.textContent = '0%';

            const start = performance.now();
            let rafId;
            function tick(now) {
                const frac = Math.min(1, (now - start) / durationMs);
                loadingBarFill.style.width = (frac * 100) + '%';
                loadingBarPct.textContent = Math.floor(frac * 100) + '%';
                if (frac < 1) {
                    rafId = requestAnimationFrame(tick);
                }
            }
            rafId = requestAnimationFrame(tick);

            // Completion is driven by a real timer, not the rAF loop above:
            // rAF can be throttled when a tab is backgrounded/inactive, which
            // would otherwise delay the load past durationMs. The timer
            // guarantees it always finishes on schedule; the bar is snapped
            // to 100% here in case rAF fell behind while backgrounded.
            setTimeout(() => {
                cancelAnimationFrame(rafId);
                loadingBarFill.style.width = '100%';
                loadingBarPct.textContent = '100%';
                onComplete();
            }, durationMs);
        }

        function renderCartridges() {
            tray.innerHTML = '';
            GAMES.forEach(game => {
                const cart = document.createElement('div');
                cart.className = 'cartridge';
                cart.classList.toggle('coming-soon', !!game.comingSoon);
                cart.dataset.gameId = game.id;
                cart.tabIndex = 0;
                cart.setAttribute('role', 'button');
                cart.setAttribute('aria-label', `Insert ${game.title} cartridge to play`);
                cart.style.setProperty('--cart-color', game.color);
                cart.style.setProperty('--cart-accent', game.accent);
                cart.innerHTML = `
                    <div class="cart-connector"></div>
                    <div class="cart-title">${game.title}</div>
                    <div class="cart-subtitle">${game.subtitle}</div>
                `;
                attachCartridgeHandlers(cart, game);
                tray.appendChild(cart);
            });
        }

        // --- Drag state (one drag at a time, mirroring the pointer-tracking
        // convention used in both games this session) ---
        let dragEl = null;
        let dragGame = null;
        let dragPointerId = null;
        let dragOffset = { x: 0, y: 0 };
        let dragStart = { x: 0, y: 0 };
        let dragMoved = 0;
        let homeRect = null;

        function isOverSlot(el) {
            const cartRect = el.getBoundingClientRect();
            const slotRect = slot.getBoundingClientRect();
            const cx = cartRect.left + cartRect.width / 2;
            const cy = cartRect.top + cartRect.height / 2;
            const sx = slotRect.left + slotRect.width / 2;
            const sy = slotRect.top + slotRect.height / 2;
            const dist = Math.hypot(cx - sx, cy - sy);
            const threshold = Math.max(slotRect.width, slotRect.height) * 0.9;
            return dist < threshold;
        }

        function attachCartridgeHandlers(cart, game) {
            cart.addEventListener('pointerdown', (e) => {
                if (dragPointerId !== null) return;
                e.preventDefault();
                dragPointerId = e.pointerId;
                dragEl = cart;
                dragGame = game;
                dragMoved = 0;
                dragStart = { x: e.clientX, y: e.clientY };

                const r = cart.getBoundingClientRect();
                homeRect = r;
                dragOffset = { x: e.clientX - r.left, y: e.clientY - r.top };

                cart.classList.add('dragging');
                cart.style.position = 'fixed';
                cart.style.left = r.left + 'px';
                cart.style.top = r.top + 'px';
                cart.style.width = r.width + 'px';
                cart.style.height = r.height + 'px';
                document.body.appendChild(cart);
                try { cart.setPointerCapture(e.pointerId); } catch (err) {}
            });

            // No separate click listener: pointerdown/pointerup already fire
            // for mouse clicks too, and endDrag()'s movement threshold below
            // treats a near-stationary press-release as a tap.
            cart.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    launchGame(game, cart);
                }
            });
        }

        window.addEventListener('pointermove', (e) => {
            if (e.pointerId !== dragPointerId || !dragEl) return;
            e.preventDefault();
            dragEl.style.left = (e.clientX - dragOffset.x) + 'px';
            dragEl.style.top = (e.clientY - dragOffset.y) + 'px';
            dragMoved = Math.hypot(e.clientX - dragStart.x, e.clientY - dragStart.y);
            slot.classList.toggle('slot-hot', isOverSlot(dragEl));
        });

        function endDrag(e) {
            if (e.pointerId !== dragPointerId || !dragEl) return;
            const el = dragEl;
            const game = dragGame;
            const moved = dragMoved;
            const home = homeRect;
            dragPointerId = null;
            dragEl = null;
            dragGame = null;
            slot.classList.remove('slot-hot');

            if (moved < 6) {
                // Barely moved: treat as a tap-to-insert rather than a drag.
                restoreToTray(el);
                launchGame(game, el);
            } else if (isOverSlot(el)) {
                launchGame(game, el);
            } else {
                springBack(el, home);
            }
        }
        window.addEventListener('pointerup', endDrag);
        window.addEventListener('pointercancel', endDrag);

        function restoreToTray(el) {
            el.style.position = '';
            el.style.left = '';
            el.style.top = '';
            el.style.width = '';
            el.style.height = '';
            el.classList.remove('dragging');
            tray.appendChild(el);
        }

        function springBack(el, home) {
            el.style.transition = 'left 0.25s ease, top 0.25s ease';
            el.style.left = home.left + 'px';
            el.style.top = home.top + 'px';
            el.addEventListener('transitionend', function done() {
                el.removeEventListener('transitionend', done);
                el.style.transition = '';
                restoreToTray(el);
            }, { once: true });
        }

        function launchGame(game, el) {
            const rect = el.getBoundingClientRect();
            const slotRect = slot.getBoundingClientRect();

            el.style.transition = '';
            el.style.position = 'fixed';
            el.style.left = rect.left + 'px';
            el.style.top = rect.top + 'px';
            el.style.width = rect.width + 'px';
            el.style.height = rect.height + 'px';
            document.body.appendChild(el);
            void el.offsetWidth; // force layout so the transition below animates from this rect

            el.style.transition = 'left 0.22s ease, top 0.22s ease, transform 0.22s ease, opacity 0.22s ease 0.12s';
            el.style.left = (slotRect.left + slotRect.width / 2 - rect.width / 2) + 'px';
            el.style.top = (slotRect.top - rect.height * 0.3) + 'px';
            el.style.transform = 'scale(0.8)';
            el.style.opacity = '0.15';

            setTimeout(() => {
                overlayText.textContent = `LOADING ${game.title}…`;
                overlay.classList.add('active');

                if (game.comingSoon) {
                    // Punch line instead of a real load: no loading bar here,
                    // just swap the text after a beat, hold it, then reset
                    // the tray so the cartridge can be tried again.
                    loadingBarTrack.style.display = 'none';
                    loadingBarPct.style.display = 'none';
                    setTimeout(() => {
                        overlayText.innerHTML =
                            `<span class="joke-line">${game.joke}</span><br>` +
                            `<span class="soon-tag">COMING SOON</span>`;
                    }, 700);
                    setTimeout(() => {
                        overlay.classList.remove('active');
                        // el was reparented to <body> for the slide-in
                        // animation, so it's outside #tray and wouldn't be
                        // cleared by renderCartridges()'s tray.innerHTML reset.
                        el.remove();
                        renderCartridges();
                    }, 3000);
                } else {
                    // Real game: a proper 6-second loading bar before it opens.
                    startLoadingBar(game.color, 3000, () => {
                        window.location.href = game.file;
                    });
                }
            }, 240);
        }

        renderCartridges();
    </script>
</body>
</html>
