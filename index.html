<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hayes and Will's Arcade Party — Select Your Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            box-sizing: border-box;
            background: radial-gradient(ellipse 120% 100% at 50% 0%, #1a1626 0%, #0a0a12 55%, #050508 100%);
            color: #eee;
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(28px, 6vh, 56px) 24px 40px;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #site-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(20px, 5vw, 34px);
            color: #fff;
            text-shadow: 0 0 6px #ff3b6b, 0 0 18px #ff3b6b88, 3px 3px 0 #ff3b6b;
            letter-spacing: 2px;
            margin: 0 0 clamp(24px, 5vh, 44px);
            text-align: center;
            line-height: 1.6;
        }

        /* ---- Cabinet ---- */
        #cabinet {
            position: relative;
            width: 900px;
            max-width: 100%;
        }

        #marquee {
            background: linear-gradient(180deg, #2a2140, #1c1730);
            border: 3px solid #4a3f6b;
            border-bottom: none;
            border-radius: 18px 18px 0 0;
            padding: 14px 20px;
            text-align: center;
            box-shadow: 0 0 30px #ff3b6b33 inset;
            box-sizing: border-box;
        }

        #marquee span {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(10px, 2.5vw, 15px);
            color: #7de8ff;
            text-shadow: 0 0 8px #7de8ff;
            letter-spacing: 3px;
        }

        #cabinet-body {
            background: linear-gradient(180deg, #4a4650 0%, #38343e 6%, #2a2731 100%);
            border: 3px solid #4a3f6b;
            border-top: none;
            padding: clamp(18px, 3.5vw, 34px) clamp(16px, 4vw, 40px) clamp(22px, 4vw, 40px);
            box-sizing: border-box;
            box-shadow: 0 30px 60px #000000aa;
        }

        #bezel {
            background: #17141f;
            border-radius: 14px;
            padding: clamp(12px, 2.5vw, 22px);
            box-shadow: inset 0 0 0 3px #060508, 0 6px 0 #6a627f;
            box-sizing: border-box;
        }

        #screen {
            position: relative;
            background: #030a06;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: inset 0 0 60px #000, inset 0 0 20px #00ff8833;
        }

        #screen::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: repeating-linear-gradient(0deg, #00000055 0px, #00000055 1px, transparent 1px, transparent 3px);
            animation: scanline 6s linear infinite;
        }

        #screen::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            box-shadow: inset 0 0 90px #000c;
            border-radius: 4px;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 400px; }
        }

        #screen-content {
            position: relative;
            z-index: 2;
            padding: 26px clamp(16px, 3vw, 30px) 30px;
        }

        #screen-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #0f4a2c;
        }

        #screen-header .label {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(9px, 2vw, 12px);
            color: #00ff88;
            text-shadow: 0 0 8px #00ff88;
        }

        #screen-header .counter {
            font-size: 20px;
            color: #00ff88aa;
        }

        #game-list {
            max-height: 340px;
            overflow-y: auto;
        }

        .game-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            margin: 0 -10px 2px;
            border-radius: 3px;
            cursor: pointer;
            background: transparent;
            border-left: 3px solid transparent;
        }

        .game-row.selected {
            background: #00ff8822;
            border-left-color: #00ff88;
        }

        .game-row .cursor,
        .game-row .arrow {
            color: #00ff88;
            font-size: 18px;
            flex-shrink: 0;
        }

        .game-row .cursor {
            width: 16px;
        }

        .game-row .arrow {
            width: 14px;
            text-align: right;
        }

        .game-row .name {
            font-size: 19px;
            color: #00cc6e;
            flex: 1;
            letter-spacing: 0.5px;
        }

        .game-row.selected .name {
            color: #e8fff2;
            text-shadow: 0 0 8px #00ff88;
        }

        .game-row .tag {
            font-size: 15px;
            color: #00994d88;
        }

        .game-row.selected .tag {
            color: #00ff88cc;
        }

        #screen-footer {
            margin-top: 20px;
            padding-top: 14px;
            border-top: 2px solid #0f4a2c;
            display: flex;
            justify-content: space-between;
            font-size: 17px;
            color: #00ff8899;
        }

        /* ---- High Scores screen ---- */
        #hs-link {
            display: block;
            text-align: right;
            font-size: 14px;
            color: #7de8ff;
            text-shadow: 0 0 6px #7de8ff88;
            cursor: pointer;
            margin: -6px 0 12px;
        }

        #hs-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 74px;
            overflow-y: auto;
            margin-bottom: 14px;
        }

        .hs-tab {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid #0f4a2c;
            color: #00cc6e;
            cursor: pointer;
            background: transparent;
        }

        .hs-tab.active {
            border-color: #00ff88;
            background: #00ff8822;
            color: #e8fff2;
            text-shadow: 0 0 6px #00ff88;
        }

        #hs-columns {
            display: grid;
            grid-template-columns: 46px 1fr 90px 76px;
            font-size: 15px;
            color: #00994d88;
            padding-bottom: 6px;
            border-bottom: 1px solid #0f4a2c;
            margin-bottom: 4px;
        }

        .hs-row {
            display: grid;
            grid-template-columns: 46px 1fr 90px 76px;
            padding: 4px 6px;
            font-size: 18px;
            color: #00cc6e;
            border-radius: 3px;
        }

        .hs-row.top3 {
            background: #00ff8811;
        }

        .hs-row.top3 .rank {
            color: #ffb454;
        }

        .hs-row.top3 .name,
        .hs-row.top3 .score {
            color: #e8fff2;
            text-shadow: 0 0 6px #00ff88;
        }

        .hs-row .score {
            text-align: right;
        }

        .hs-row .date {
            text-align: right;
            color: #00994d88;
            font-size: 15px;
        }

        #hs-best-bar {
            margin-top: 14px;
            padding: 8px 12px;
            background: #00ff8811;
            border-left: 3px solid #00ff88;
            display: flex;
            justify-content: space-between;
            font-size: 17px;
        }

        #hs-best-bar .best-label {
            color: #7de8ff;
            text-shadow: 0 0 6px #7de8ff;
        }

        /* ---- Controls ---- */
        #controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: clamp(20px, 4vh, 40px);
            padding: 0 clamp(4px, 2vw, 20px);
        }

        #joystick {
            position: relative;
            width: clamp(80px, 14vw, 130px);
            height: clamp(80px, 14vw, 130px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #joystick-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #333, #111 75%);
            box-shadow: 0 6px 14px #0008, inset 0 2px 4px #ffffff22;
        }

        #joystick-stick {
            position: absolute;
            width: 14%;
            height: 43%;
            background: linear-gradient(180deg, #999, #555);
            border-radius: 9px;
            bottom: 52%;
            box-shadow: 0 4px 8px #0006;
        }

        #joystick-ball {
            position: absolute;
            width: 35%;
            height: 35%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #ff5577, #b8123f 75%);
            box-shadow: 0 4px 10px #0009, inset 0 2px 4px #ffffff55;
            top: 4%;
        }

        #buttons {
            display: flex;
            gap: 26px;
        }

        .btn {
            width: clamp(40px, 8vw, 56px);
            height: clamp(40px, 8vw, 56px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(10px, 2vw, 14px);
            color: #ffffffcc;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 6px 0 #0006, inset 0 2px 4px #ffffff55;
        }

        .btn.pressed {
            box-shadow: inset 0 2px 6px #0009;
            transform: translateY(4px);
        }

        #btn-a {
            background: radial-gradient(circle at 35% 30%, #ff3b6b, #ff3b6bcc 70%);
        }

        #btn-b {
            background: radial-gradient(circle at 35% 30%, #ffb454, #ffb454cc 70%);
        }

        #base-shadow {
            height: 26px;
            background: linear-gradient(180deg, #6a627f, #4a3f6b);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 20px 40px #000a;
        }

        #caption {
            color: #ffffff66;
            font-size: 19px;
            margin-top: 28px;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 id="site-title">HAYES AND WILL'S<br>ARCADE PARTY</h1>

    <div id="cabinet">
        <div id="marquee"><span>SELECT YOUR GAME</span></div>

        <div id="cabinet-body">
            <div id="bezel">
                <div id="screen">
                    <div id="screen-content">
                        <div id="screen-header">
                            <span class="label" id="header-label">GAME SELECT</span>
                            <span class="counter" id="counter">01 / 07</span>
                        </div>

                        <span id="hs-link">HIGH SCORES &rarr;</span>

                        <div id="game-list"></div>

                        <div id="scores-view" style="display: none;">
                            <div id="hs-tabs"></div>
                            <div id="hs-columns">
                                <span>RANK</span><span>NAME</span><span>SCORE</span><span>DATE</span>
                            </div>
                            <div id="hs-rows"></div>
                            <div id="hs-best-bar"></div>
                        </div>

                        <div id="screen-footer">
                            <span id="footer-left">&uarr;&darr; MOVE</span>
                            <span id="footer-right">ENTER SELECT</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="controls">
                <div id="joystick">
                    <div id="joystick-base"></div>
                    <div id="joystick-stick"></div>
                    <div id="joystick-ball"></div>
                </div>
                <div id="buttons">
                    <div class="btn" id="btn-a">A</div>
                    <div class="btn" id="btn-b">B</div>
                </div>
            </div>
        </div>

        <div id="base-shadow"></div>
    </div>

    <p id="caption">Click a game, or use &uarr;&darr; and ENTER</p>

    <script src="highscores.js"></script>
    <script>
        const GAMES = [
            { name: 'ASTEROIDS: JUNGLE ACES', tag: 'SPACE SHOOTER', file: 'index_asteroids_monkeys.html', slug: 'asteroids-monkeys' },
            { name: 'GALAGA VECTOR', tag: 'ARCADE SHOOTER', file: 'index_galaga_v1.html', slug: 'galaga' },
            { name: 'ASTEROIDS: MAZE EDITION', tag: 'MAZE RUNNER', file: 'index_asteroids_maze.html', slug: 'asteroids-maze' },
            { name: 'CANDY CHECKERS', tag: '2P SUGAR STRATEGY', file: 'index_candy_checkers.html' },
            { name: 'TANK WARS', tag: 'ARTILLERY DUEL 2-4P', file: 'index_tank_wars.html' },
            { name: 'SNAKE DUEL', tag: '2P GROW & TRAP', file: 'index_snake_duel.html', slug: 'snake-duel' },
            { name: 'NEON BREAKOUT', tag: 'BRICK BREAKER', file: 'index_neon_breakout.html', slug: 'neon-breakout' }
        ];

        const SCORE_GAMES = GAMES.filter(g => g.slug);

        const listEl = document.getElementById('game-list');
        const scoresViewEl = document.getElementById('scores-view');
        const counterEl = document.getElementById('counter');
        const headerLabelEl = document.getElementById('header-label');
        const footerLeftEl = document.getElementById('footer-left');
        const footerRightEl = document.getElementById('footer-right');
        const hsLinkEl = document.getElementById('hs-link');
        const hsTabsEl = document.getElementById('hs-tabs');
        const hsRowsEl = document.getElementById('hs-rows');
        const hsBestBarEl = document.getElementById('hs-best-bar');
        const btnA = document.getElementById('btn-a');

        let selected = 0;
        let screen = 'select'; // 'select' | 'scores'
        let scoresTabIndex = 0;

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function tabLabel(game) {
            const prefix = game.name.split(':')[0].trim();
            const sharesPrefix = SCORE_GAMES.filter(g => g.name.split(':')[0].trim() === prefix).length > 1;
            if (!sharesPrefix) return prefix;
            const firstWordAfterColon = (game.name.split(':')[1] || '').trim().split(' ')[0];
            return `${prefix} ${firstWordAfterColon}`.trim();
        }

        function renderSelect() {
            listEl.innerHTML = '';
            GAMES.forEach((game, i) => {
                const active = i === selected;
                const row = document.createElement('div');
                row.className = 'game-row' + (active ? ' selected' : '');
                row.innerHTML = `
                    <span class="cursor">${active ? '&#9656;' : ''}</span>
                    <span class="name">${game.name}</span>
                    <span class="tag">${game.tag}</span>
                    <span class="arrow">${active ? '&rarr;' : ''}</span>
                `;
                row.addEventListener('click', () => launch(i));
                listEl.appendChild(row);
                if (active) row.scrollIntoView({ block: 'nearest' });
            });
            headerLabelEl.textContent = 'GAME SELECT';
            counterEl.textContent = `${pad(selected + 1)} / ${pad(GAMES.length)}`;
            footerLeftEl.innerHTML = '&uarr;&darr; MOVE';
            footerRightEl.textContent = 'ENTER SELECT';
        }

        function renderScores() {
            const game = SCORE_GAMES[scoresTabIndex];
            const board = HS.getBoard(game.slug);

            hsTabsEl.innerHTML = '';
            SCORE_GAMES.forEach((g, i) => {
                const tab = document.createElement('span');
                tab.className = 'hs-tab' + (i === scoresTabIndex ? ' active' : '');
                tab.textContent = tabLabel(g);
                tab.addEventListener('click', () => { scoresTabIndex = i; renderScreen(); });
                hsTabsEl.appendChild(tab);
            });

            hsRowsEl.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const entry = board.top10[i];
                const row = document.createElement('div');
                row.className = 'hs-row' + (i < 3 ? ' top3' : '');
                row.innerHTML = `
                    <span class="rank">${pad(i + 1)}</span>
                    <span class="name">${entry ? entry.name : '&mdash;'}</span>
                    <span class="score">${entry ? entry.score.toLocaleString() : '&mdash;'}</span>
                    <span class="date">${entry && entry.date ? entry.date : ''}</span>
                `;
                hsRowsEl.appendChild(row);
            }

            hsBestBarEl.innerHTML = `
                <span class="best-label">YOUR BEST: ${board.personalBest.score.toLocaleString()}</span>
                <span>${board.personalBest.date || ''}</span>
            `;

            headerLabelEl.textContent = 'HIGH SCORES';
            counterEl.textContent = 'TOP 10';
            footerLeftEl.innerHTML = '&larr; BACK TO GAMES';
            footerRightEl.innerHTML = '&uarr;&darr;&rarr; SWITCH GAME';
        }

        function renderScreen() {
            if (screen === 'select') {
                listEl.style.display = '';
                scoresViewEl.style.display = 'none';
                hsLinkEl.style.display = '';
                renderSelect();
            } else {
                listEl.style.display = 'none';
                scoresViewEl.style.display = '';
                hsLinkEl.style.display = 'none';
                renderScores();
            }
        }

        function move(delta) {
            selected = (selected + delta + GAMES.length) % GAMES.length;
            renderScreen();
        }

        function launch(i) {
            selected = i;
            renderScreen();
            btnA.classList.add('pressed');
            setTimeout(() => btnA.classList.remove('pressed'), 180);
            setTimeout(() => {
                window.location.href = GAMES[i].file;
            }, 180);
        }

        function openScores() {
            const i = SCORE_GAMES.findIndex(g => g.file === GAMES[selected].file);
            scoresTabIndex = i >= 0 ? i : 0;
            screen = 'scores';
            renderScreen();
        }

        function closeScores() {
            screen = 'select';
            renderScreen();
        }

        hsLinkEl.addEventListener('click', openScores);

        window.addEventListener('keydown', (e) => {
            if (screen === 'select') {
                if (e.key === 'ArrowDown') { e.preventDefault(); move(1); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); openScores(); }
                else if (e.key === 'Enter') { launch(selected); }
            } else {
                if (e.key === 'ArrowLeft') { e.preventDefault(); closeScores(); }
                else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    scoresTabIndex = (scoresTabIndex + 1) % SCORE_GAMES.length;
                    renderScreen();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    scoresTabIndex = (scoresTabIndex - 1 + SCORE_GAMES.length) % SCORE_GAMES.length;
                    renderScreen();
                }
            }
        });

        renderScreen();
    </script>
</body>
</html>
