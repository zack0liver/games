<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arcade Asteroids: Monkey Mania</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');

        html, body {
            height: 100%;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 8px;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: min(900px, 96vw);
            height: 100%;
            max-height: min(900px, 94vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #23a0ff; /* Neon blue border */
            border-radius: 12px;
            box-shadow: 0 0 20px #23a0ff, inset 0 0 20px #23a0ff;
            background: #000000;
            padding: 8px;
            box-sizing: border-box;
        }

        #canvas-wrap {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameCanvas {
            display: block;
            background-color: #000000;
            border: 1px solid #113355;
            box-shadow: 0 0 10px rgba(35, 160, 255, 0.5);
            border-radius: 6px;
            touch-action: none;
        }

        #ui-panel {
            width: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            font-size: 1.2rem;
            color: #00ffaa; /* Neon green */
        }

        #highscore-display {
            color: #ffaa00;
        }

        #back-to-arcade {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            z-index: 500;
            padding: 6px 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #23a0ff;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid #23a0ff;
            border-radius: 6px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #back-to-arcade:active {
            background: rgba(35, 160, 255, 0.3);
        }

        @media (max-width: 480px) {
            #ui-panel {
                font-size: 0.8rem;
                padding: 3px 6px;
            }
        }
        
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            border: 3px solid #ff55aa;
            padding: 25px 50px;
            border-radius: 10px;
            text-align: center;
            color: #ff55aa;
            box-shadow: 0 0 30px #ff55aa;
            z-index: 100;
            display: none; /* Initially hidden */
            max-width: 90vw;
            width: 400px;
        }

        #modal-content-container h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        #modal-content-container p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        /* Form Styling */
        #name-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            padding: 10px 0;
        }

        #player-name-input {
            width: 80%;
            padding: 10px;
            background: #1a1a1a;
            border: 2px solid #00ffaa;
            border-radius: 4px;
            color: #00ffaa;
            font-family: 'Space Mono', monospace;
            text-align: center;
            font-size: 1rem;
        }

        #submit-score-button {
            background-color: #00ffaa;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px #00b377;
        }

        #submit-score-button:hover {
            background-color: #33ffcc;
        }

        #submit-score-button:active {
            box-shadow: 0 0 #00b377;
            transform: translateY(4px);
        }

        /* General Button Styling (for Restart) */
        #restart-button {
            background-color: #ff55aa;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            margin-top: 15px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px #c93d86;
        }

        #restart-button:hover {
            background-color: #ff77bb;
        }
        
        #restart-button:active {
            box-shadow: 0 0 #c93d86;
            transform: translateY(4px);
        }

        /* Styling for the score list inside the message box */
        #game-over-scores-container {
            margin-top: 25px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 6px;
        }

        #game-over-scores-container h2 {
            font-size: 1.1rem;
            color: #ffaa00; /* Neon yellow/orange */
            margin-bottom: 5px;
        }

        #game-over-scores-list {
            list-style: none;
            padding: 0;
            font-size: 0.9rem;
        }

        #game-over-scores-list li {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            color: #00ffaa;
        }

        #game-over-scores-list li .score-value {
            font-weight: 700;
        }
        
        /* Touch play is gesture-based (drag to steer, second-finger tap to
           fire) and rendered directly on the canvas — see Game.draw() and
           setupTouchGestureControls(). No DOM control buttons are needed,
           which also avoids them ever being obscured by mobile browser
           chrome (e.g. Safari's bottom bar). */
    </style>
</head>
<body>

<a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>

<div id="game-container">
    <div id="ui-panel">
        <div id="score-display">SCORE: 0</div>
        <div id="highscore-display">BEST: 0</div>
        <div id="lives-display">LIVES: 3</div>
    </div>
    <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<div id="message-box">
    <div id="modal-content-container">
        <!-- Dynamic content will be injected here -->
    </div>
    <button id="restart-button">RESTART</button>
</div>


<script type="module">
    // --- Firebase Setup ---
    // Loaded lazily via dynamic import() (see initFirebase) rather than static
    // top-level imports. A static import of an unreachable CDN (ad blockers,
    // corporate firewalls, flaky mobile networks) is a fatal module error that
    // would take the ENTIRE game down with it. Dynamic import keeps the core
    // 2D arcade game playable offline/without Firebase; only the online
    // leaderboard degrades gracefully.
    let initializeApp, getAuth, signInAnonymously, signInWithCustomToken,
        getFirestore, collection, addDoc, query, orderBy, limit, getDocs, Timestamp;

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');

    let app;
    let db;
    let auth;
    let userId;
    let isFirebaseAvailable = false; // Flag to track successful Firebase initialization

    // --- Configuration and Utilities ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvas-wrap');
    const scoreDisplay = document.getElementById('score-display');
    const highscoreDisplay = document.getElementById('highscore-display');
    const livesDisplay = document.getElementById('lives-display');
    const messageBox = document.getElementById('message-box');
    const modalContentContainer = document.getElementById('modal-content-container');
    const PI = Math.PI;

    // Logical (CSS-pixel) game resolution. Kept separate from canvas.width/height,
    // which are scaled by devicePixelRatio for crisp rendering on mobile/retina screens.
    let VIEW_W = 800;
    let VIEW_H = 450;

    let game;
    window.getGame = () => game;   // exposed for console/Playwright testing
    let highScore = parseInt(localStorage.getItem('asteroidsHighScore') || '0', 10);

    // A small function for utility
    const rand = (min, max) => Math.random() * (max - min) + min;
    const formatUserId = (uid) => uid.substring(0, 4) + '...' + uid.substring(uid.length - 4);

    // Fixed starfield (generated once) instead of re-randomizing every frame,
    // so the background reads as actual stars rather than flickering noise.
    let stars = [];
    function generateStars(count = 90) {
        stars = Array.from({ length: count }, () => ({
            xf: Math.random(),
            yf: Math.random(),
            size: rand(0.5, 1.8),
            baseAlpha: rand(0.25, 0.85),
            twinkleSpeed: rand(0.4, 1.8),
            phase: rand(0, PI * 2)
        }));
    }

    // --- Canvas Drawing Helpers (for Retro Vector Look) ---

    // Helper function to draw a simple 2D monkey outline (vector style)
    function drawMonkeyOutline(ctx, x, y, radius, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        
        // Head (Main circle)
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, PI * 2);
        ctx.stroke();

        // Ears (Simple V-shape/Triangle outlines)
        const earR = radius * 0.25;
        const earOffset = radius * 0.8;
        ctx.beginPath();
        ctx.arc(-earOffset, -earOffset, earR, 0, PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(earOffset, -earOffset, earR, 0, PI * 2);
        ctx.stroke();

        // Eyes (Small circles/dots)
        const eyeOffset = radius * 0.4;
        const eyeR = 1.5;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(-eyeOffset, 0, eyeR, 0, PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(eyeOffset, 0, eyeR, 0, PI * 2);
        ctx.fill();
        
        // Smile (Curved line)
        ctx.beginPath();
        ctx.arc(0, radius * 0.2, radius * 0.3, PI * 0.2, PI * 0.8, false);
        ctx.stroke();

        ctx.restore();
    }

    // Helper function to draw a simple 2D banana outline (vector style)
    function drawBananaOutline(ctx, x, y, size, color, alpha = 1) {
        ctx.save();
        ctx.translate(x, y);
        
        // Convert hex to RGBA for alpha control
        const r = parseInt(color.slice(1, 3), 16);
        const g = parseInt(color.slice(3, 5), 16);
        const b = parseInt(color.slice(5, 7), 16);
        
        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
        ctx.lineWidth = 2;

        const r_banana = size;
        ctx.beginPath();
        // Simplified crescent shape
        ctx.arc(0, 0, r_banana, PI * 0.8, PI * 0.2, true);
        ctx.stroke();

        ctx.restore();
    }


    // --- Firebase Score Logic ---

    async function ensureAuth() {
        if (!isFirebaseAvailable) {
            return false;
        }

        if (auth && auth.currentUser) {
            userId = auth.currentUser.uid;
            return true;
        }
        
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                const userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                userId = userCredential.user.uid;
            } else {
                const userCredential = await signInAnonymously(auth);
                userId = userCredential.user.uid;
            }
            console.log("Firebase Auth successful. User ID:", userId);
            return true;
        } catch (error) {
            console.error("Firebase Auth failed:", error);
            return false;
        }
    }

    async function saveScore(score, userName) {
        if (!isFirebaseAvailable || !userId) {
            console.error("Cannot save score: Firebase unavailable or user not authenticated.");
            return;
        }

        try {
            const scoresRef = collection(db, `artifacts/${appId}/public/data/highscores`);
            await addDoc(scoresRef, {
                score: score,
                userId: userId,
                userName: userName || formatUserId(userId),
                timestamp: Timestamp.now()
            });
            console.log("Score saved successfully.");
        } catch (e) {
            console.error("Error adding document: ", e);
        }
    }

    /**
     * Fetches high scores and returns them as an HTML string list.
     * @returns {Promise<string>} HTML string containing list items.
     */
    async function loadHighScores() {
        if (!isFirebaseAvailable || !userId) {
            return '<li style="color: #ffaa00;">High scores unavailable.</li>';
        }

        try {
            const scoresRef = collection(db, `artifacts/${appId}/public/data/highscores`);
            const q = query(scoresRef, orderBy("score", "desc"), limit(10));
            const querySnapshot = await getDocs(q);

            let scoreHtml = '';
            
            if (querySnapshot.empty) {
                return '<li style="color: #ffaa00;">No scores recorded yet.</li>';
            }

            querySnapshot.forEach((doc, index) => {
                const data = doc.data();
                const isCurrentPlayer = data.userId === userId && data.score === game.finalScore;
                
                const displayName = data.userName || formatUserId(data.userId); 
                
                const nameStyle = isCurrentPlayer ? 'style="color: #ffaa00; font-weight: 700;"' : 'style="font-style: italic;"';
                const scoreStyle = isCurrentPlayer ? 'style="color: #ff55aa;"' : 'style="color: #00ffaa;"';
                
                const userText = `<span ${nameStyle}>${displayName}</span>`;
                const scoreText = `<span class="score-value" ${scoreStyle}>${data.score}</span>`;
                
                scoreHtml += `<li><span>#${index + 1}: ${userText}</span> ${scoreText}</li>`;
            });
            return scoreHtml;
        } catch (e) {
            console.error("Error loading scores: ", e);
            return '<li style="color: #ffaa00;">Error loading scores. Check console for details.</li>';
        }
    }

    // --- Game Classes ---

    class GameObject {
        constructor(x, y, radius, color, isAlive = true) {
            this.x = x; this.y = y; this.vx = 0; this.vy = 0;
            this.radius = radius; this.color = color; this.isAlive = isAlive;
        }
        update(dt) {
            this.x += this.vx * dt; this.y += this.vy * dt; this.wrapAround();
        }
        wrapAround() {
            if (this.x < -this.radius) this.x = VIEW_W + this.radius;
            if (this.x > VIEW_W + this.radius) this.x = -this.radius;
            if (this.y < -this.radius) this.y = VIEW_H + this.radius;
            if (this.y > VIEW_H + this.radius) this.y = -this.radius;
        }
        isColliding(other) {
            const dx = this.x - other.x;
            const dy = this.y - other.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < this.radius + other.radius;
        }
    }

    class Player extends GameObject {
        constructor() {
            super(VIEW_W / 2, VIEW_H / 2, 12, '#00ffaa');
            this.angle = -PI / 2; this.rotationSpeed = 3; this.thrustPower = 300;
            this.maxSpeed = 400; this.lives = 3; this.isAccelerating = false;
            this.isTurningLeft = false; this.isTurningRight = false;
            this.isShooting = false; this.bulletCooldown = 0; this.maxCooldown = 0.2;
            this.invulnerabilityTimer = 0; this.invulnerabilityDuration = 2;
            this.thrustScale = 1; // 0-1, set by the touch drag distance; always 1 for keyboard
            this.shieldTimer = 0; // >0 while a shield power-up is active (ported from Maze Edition)
        }
        get shielded() { return this.shieldTimer > 0; }
        update(dt) {
            if (this.isTurningLeft) this.angle -= this.rotationSpeed * dt;
            if (this.isTurningRight) this.angle += this.rotationSpeed * dt;
            if (this.isAccelerating) {
                const thrustX = Math.cos(this.angle) * this.thrustPower * this.thrustScale * dt;
                const thrustY = Math.sin(this.angle) * this.thrustPower * this.thrustScale * dt;
                this.vx += thrustX; this.vy += thrustY;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }
            } else {
                this.vx *= (1 - 0.05 * dt); this.vy *= (1 - 0.05 * dt);
            }
            super.update(dt);
            if (this.bulletCooldown > 0) this.bulletCooldown -= dt;
            if (this.invulnerabilityTimer > 0) this.invulnerabilityTimer -= dt;
            if (this.shieldTimer > 0) this.shieldTimer -= dt;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            // Shield bubble (un-rotated around the ship); flashes in the final 2s.
            if (this.shielded) {
                const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 90);
                const fading = this.shieldTimer < 2 && Math.floor(this.shieldTimer * 6) % 2 === 0;
                if (!fading) {
                    ctx.strokeStyle = `rgba(125, 211, 252, ${(0.5 + 0.4 * pulse).toFixed(2)})`;
                    ctx.lineWidth = 2; ctx.shadowColor = '#7dd3fc'; ctx.shadowBlur = 12;
                    ctx.beginPath(); ctx.arc(0, 0, this.radius + 9, 0, PI * 2); ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }
            ctx.rotate(this.angle);
            
            // Player Ship Outline (Neon Green)
            ctx.strokeStyle = this.color; ctx.lineWidth = 2.5; // Slightly thicker line
            
            if (this.invulnerabilityTimer > 0 && Math.floor(this.invulnerabilityTimer * 8) % 2 === 0) {
                ctx.strokeStyle = 'transparent';
            } else {
                ctx.strokeStyle = this.color;
            }
            
            ctx.beginPath();
            ctx.moveTo(15, 0); ctx.lineTo(-10, 10); ctx.lineTo(-5, 0); ctx.lineTo(-10, -10);
            ctx.closePath(); ctx.stroke();
            
            // Thrust flame (Neon Pink/Red)
            if (this.isAccelerating && ctx.strokeStyle !== 'transparent') {
                ctx.strokeStyle = '#ff55aa';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-10, 5); 
                ctx.lineTo(-15 - rand(0, 5), 0); 
                ctx.lineTo(-10, -5);
                ctx.stroke();
            }
            ctx.restore();
        }
        resetPosition() {
            this.x = VIEW_W / 2; this.y = VIEW_H / 2;
            this.vx = 0; this.vy = 0; this.angle = -PI / 2;
            this.isAccelerating = false; this.thrustScale = 1;
            this.invulnerabilityTimer = this.invulnerabilityDuration;
            this.shieldTimer = 0;   // losing a life drops any active shield
        }
        canShoot() { return this.bulletCooldown <= 0; }
        shoot(game) {
            if (this.canShoot()) {
                const bulletX = this.x + Math.cos(this.angle) * this.radius * 1.5;
                const bulletY = this.y + Math.sin(this.angle) * this.radius * 1.5;
                game.bullets.push(new Bullet(bulletX, bulletY, this.angle));
                this.bulletCooldown = this.maxCooldown;
            }
        }
    }

    class Bullet extends GameObject {
        constructor(x, y, angle) {
            super(x, y, 3, '#ffaa00');
            this.speed = 800;
            this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
            this.lifetime = 1; this.age = 0;
        }
        update(dt) {
            super.update(dt); this.age += dt;
            if (this.age > this.lifetime) this.isAlive = false;
        }
        draw() {
            // Draw a bright square (more retro feel than a circle)
            ctx.fillStyle = this.color;
            const size = this.radius * 2;
            ctx.fillRect(this.x - size/2, this.y - size/2, size, size);
        }
    }
    
    // New class for the exploding banana particles
    class Particle extends GameObject {
        constructor(x, y, vx, vy, color, size, lifetime) {
            super(x, y, size, color);
            this.vx = vx;
            this.vy = vy;
            this.lifetime = lifetime;
            this.age = 0;
            this.rotation = rand(0, PI * 2);
            this.rotationRate = rand(-2, 2);
        }

        update(dt) {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.rotation += this.rotationRate * dt;
            this.age += dt;
            if (this.age >= this.lifetime) {
                this.isAlive = false;
            }
            // Simple friction to slow down particles
            this.vx *= 0.98;
            this.vy *= 0.98;
        }

        draw() {
            const alpha = 1 - (this.age / this.lifetime);
            
            // Draw simplified banana shape using the helper function
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            drawBananaOutline(ctx, 0, 0, this.radius, this.color, alpha);
            ctx.restore();
        }
    }

    class Asteroid extends GameObject {
        constructor(x, y, size) {
            const radiusMap = { 3: 40, 2: 25, 1: 15 };
            const speedMap = { 3: 50, 2: 80, 1: 120 };
            super(x, y, radiusMap[size], '#ffffff');
            this.size = size; this.speed = speedMap[size];
            const angle = rand(0, PI * 2);
            this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;
            this.rotation = 0; this.rotationRate = rand(-0.5, 0.5);
            
            // Set type: Large is Monkey, Small is Banana, Medium is Mixed
            if (this.size === 3) {
                 this.type = 'monkey';
            } else if (this.size === 1) {
                 this.type = 'banana';
            } else { // size === 2
                 this.type = Math.random() < 0.5 ? 'monkey' : 'banana';
            }
            
            // Adjust collision radius slightly based on type
            this.collisionRadiusFactor = (this.type === 'monkey' ? 1.0 : 0.8);
            this.radius = radiusMap[this.size] * this.collisionRadiusFactor;
        }
        update(dt) {
            super.update(dt); this.rotation += this.rotationRate * dt;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y); 
            ctx.rotate(this.rotation);
            
            // Draw the simplified vector graphic based on type
            if (this.type === 'monkey') {
                drawMonkeyOutline(ctx, 0, 0, this.radius * 0.8, '#ffffff'); // White outline for monkey
            } else if (this.type === 'banana') { 
                drawBananaOutline(ctx, 0, 0, this.radius * 0.7, '#ffaa00', 1); // Neon Yellow/Orange outline for banana
            } else {
                 // Fallback (shouldn't happen with the current type logic)
                 ctx.strokeStyle = '#ffffff';
                 ctx.lineWidth = 2;
                 ctx.beginPath();
                 ctx.arc(0, 0, this.radius * 0.8, 0, PI * 2);
                 ctx.stroke();
            }
            
            ctx.restore();
        }
    }

    // Floating shield power-up, ported from Asteroids: Maze Edition. Collect it
    // for a few seconds of invulnerability that also smashes rocks/monkeys.
    class ShieldPickup {
        constructor(x, y) {
            this.x = x; this.y = y; this.radius = 14; this.isAlive = true;
            this.pulse = rand(0, PI * 2);
        }
        update(dt) { this.pulse += dt * 3.5; }
        draw() {
            const p = 0.6 + 0.4 * Math.sin(this.pulse);
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.strokeStyle = `rgba(125, 211, 252, ${(0.55 + 0.35 * p).toFixed(2)})`;
            ctx.lineWidth = 2.5; ctx.shadowColor = '#7dd3fc'; ctx.shadowBlur = 14;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * PI * 2 - PI / 2;
                const px = Math.cos(a) * this.radius, py = Math.sin(a) * this.radius;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.stroke();
            ctx.shadowBlur = 6;
            ctx.beginPath(); ctx.arc(0, 0, this.radius * 0.42, 0, PI * 2); ctx.stroke();
            ctx.restore(); ctx.shadowBlur = 0;
        }
    }

    // --- Game Logic ---

    class Game {
        constructor() {
            this.player = null; 
            this.asteroids = []; 
            this.bullets = [];
            this.particles = [];
            this.score = 0; 
            this.lastTime = 0; 
            this.isRunning = false;
            this.spawnTimer = 0;
            this.spawnInterval = 1.0;
            this.minAsteroidCount = 6;
            this.finalScore = 0;
            this.wave = 1;
            this.waveBanner = { text: '', timer: 0 };
            this.isPaused = false;
            this.touchIndicator = null;
            this.shieldPickups = [];
            this.shieldSpawnTimer = 0;
            this.nextShieldIn = rand(8, 14);
        }

        init() {
            this.score = 0;
            this.player = new Player();
            this.asteroids = [];
            this.bullets = [];
            this.particles = [];
            this.isRunning = true;
            this.isPaused = false;
            this.spawnTimer = 0;
            this.wave = 1;
            this.waveBanner = { text: '', timer: 0 };
            this.touchIndicator = null;
            this.shieldPickups = [];
            this.shieldSpawnTimer = 0;
            this.nextShieldIn = rand(8, 14);
            this.setupAsteroids(8);
            this.updateUI();
            messageBox.style.display = 'none';
        }

        setupAsteroids(count) {
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = rand(0, VIEW_W);
                    y = rand(0, VIEW_H);
                } while (Math.abs(x - VIEW_W / 2) < 150 && Math.abs(y - VIEW_H / 2) < 150);
                this.asteroids.push(new Asteroid(x, y, 3));
            }
        }

        update(dt) {
            if (this.player.isShooting) this.player.shoot(this);
            this.spawnTimer += dt;
            if (this.asteroids.length < this.minAsteroidCount && this.spawnTimer >= this.spawnInterval) {
                this.spawnRandomSmallAsteroid();
                this.spawnTimer = 0;
            }

            // Periodically drop a shield power-up (only one on screen at a time).
            this.shieldSpawnTimer += dt;
            if (this.shieldPickups.length === 0 && this.shieldSpawnTimer >= this.nextShieldIn) {
                this.spawnShieldPickup();
                this.shieldSpawnTimer = 0;
                this.nextShieldIn = rand(16, 26);
            }

            this.player.update(dt);
            this.bullets.forEach(b => b.update(dt));
            this.asteroids.forEach(a => a.update(dt));
            this.particles.forEach(p => p.update(dt));
            this.shieldPickups.forEach(s => s.update(dt));

            this.handleCollisions();
            this.handleShieldPickups();

            this.bullets = this.bullets.filter(b => b.isAlive);
            this.asteroids = this.asteroids.filter(a => a.isAlive);
            this.particles = this.particles.filter(p => p.isAlive);
            this.shieldPickups = this.shieldPickups.filter(s => s.isAlive);
            
            if (this.asteroids.filter(a => a.size === 3).length === 0 && this.isRunning) {
                this.wave++;
                this.waveBanner = { text: 'WAVE ' + this.wave, timer: 2 };
                this.setupAsteroids(this.asteroids.length > 10 ? 4 : 8);
            }

            if (this.waveBanner.timer > 0) this.waveBanner.timer -= dt;

            if (this.player.lives <= 0) {
                this.gameOver();
            }

            this.updateUI();
        }

        handleCollisions() {
            this.bullets.forEach(bullet => {
                if (!bullet.isAlive) return;
                this.asteroids.forEach(asteroid => {
                    if (!asteroid.isAlive) return;
                    if (bullet.isColliding(asteroid)) {
                        bullet.isAlive = false;
                        asteroid.isAlive = false;
                        this.breakAsteroid(asteroid);
                        this.score += 10 * (4 - asteroid.size) * (asteroid.type === 'monkey' ? 2 : 1);
                    }
                });
            });

            this.asteroids.forEach(asteroid => {
                if (!asteroid.isAlive) return;
                if (!this.player.isColliding(asteroid)) return;
                if (this.player.shielded) {
                    // A raised shield smashes the rock/monkey instead of dying.
                    asteroid.isAlive = false;
                    this.breakAsteroid(asteroid);
                    this.score += 10 * (4 - asteroid.size) * (asteroid.type === 'monkey' ? 2 : 1);
                } else if (this.player.invulnerabilityTimer <= 0) {
                    this.playerHit();
                }
            });
        }

        spawnShieldPickup() {
            let x, y, tries = 0;
            do {
                x = rand(40, VIEW_W - 40); y = rand(40, VIEW_H - 40); tries++;
            } while (tries < 30 && Math.hypot(x - this.player.x, y - this.player.y) < 150);
            this.shieldPickups.push(new ShieldPickup(x, y));
        }

        handleShieldPickups() {
            const p = this.player;
            for (const s of this.shieldPickups) {
                if (!s.isAlive) continue;
                if (Math.hypot(p.x - s.x, p.y - s.y) < p.radius + s.radius) {
                    s.isAlive = false;
                    const dur = rand(5, 10);
                    // Stack onto any remaining shield time rather than shrinking it.
                    p.shieldTimer = Math.max(p.shieldTimer, dur);
                    for (let i = 0; i < 18; i++) {
                        const a = rand(0, PI * 2), sp = rand(60, 220);
                        this.particles.push(new Particle(s.x, s.y, Math.cos(a) * sp, Math.sin(a) * sp, '#7dd3fc', rand(3, 6), rand(0.4, 1)));
                    }
                    this.waveBanner = { text: 'SHIELD UP! ' + Math.round(dur) + 's', timer: 1.6, color: '125, 211, 252' };
                }
            }
        }
        
        breakAsteroid(asteroid) {
            // Create banana particle explosion if it's a monkey asteroid
            if (asteroid.type === 'monkey') {
                const numParticles = asteroid.size * 15;
                const particleColor = '#ffaa00'; // Neon Yellow/Orange
                for (let i = 0; i < numParticles; i++) {
                    const angle = rand(0, PI * 2);
                    const speed = rand(50, 250);
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const lifetime = rand(0.5, 1.5);
                    const particleSize = rand(4, 8);
                    game.particles.push(new Particle(asteroid.x, asteroid.y, vx, vy, particleColor, particleSize, lifetime));
                }
            }

            // Existing logic to split into smaller asteroids (if size > 1)
            if (asteroid.size > 1) {
                const newSize = asteroid.size - 1;
                const newSpeed = 150 * (4 - newSize) / 3;
                for (let i = 0; i < 2; i++) {
                    const newAsteroid = new Asteroid(asteroid.x, asteroid.y, newSize);
                    
                    const angleOffset = rand(-PI/4, PI/4);
                    const newAngle = rand(0, PI * 2); 
                    newAsteroid.vx = Math.cos(newAngle) * newSpeed * rand(0.8, 1.2);
                    newAsteroid.vy = Math.sin(newAngle) * newSpeed * rand(0.8, 1.2);
                    this.asteroids.push(newAsteroid);
                }
            }
        }

        spawnRandomSmallAsteroid() {
            const edge = Math.floor(rand(0, 4));
            let x, y, angle;
            if (edge === 0) { x = rand(0, VIEW_W); y = -100; angle = rand(PI * 0.25, PI * 0.75);
            } else if (edge === 1) { x = VIEW_W + 100; y = rand(0, VIEW_H); angle = rand(PI * 0.75, PI * 1.25);
            } else if (edge === 2) { x = rand(0, VIEW_W); y = VIEW_H + 100; angle = rand(PI * 1.25, PI * 1.75);
            } else { x = -100; y = rand(0, VIEW_H); angle = rand(-PI * 0.25, PI * 0.25); }
            
            const newAsteroid = new Asteroid(x, y, 1);
            newAsteroid.vx = Math.cos(angle) * newAsteroid.speed;
            newAsteroid.vy = Math.sin(angle) * newAsteroid.speed;
            this.asteroids.push(newAsteroid);
        }
        
        playerHit() {
            this.player.lives--;
            this.player.resetPosition();
            this.bullets = [];
        }
        
        draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);

            // Twinkling starfield (fixed positions, animated alpha)
            const t = performance.now() / 1000;
            stars.forEach(s => {
                const alpha = s.baseAlpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.phase));
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha.toFixed(2)})`;
                ctx.fillRect(s.xf * VIEW_W, s.yf * VIEW_H, s.size, s.size);
            });

            this.particles.forEach(p => p.draw());
            this.asteroids.forEach(a => a.draw());
            this.bullets.forEach(b => b.draw());
            this.shieldPickups.forEach(s => s.draw());
            this.player.draw();

            // Active-shield readout, bottom-left.
            if (this.player.shielded) {
                ctx.save();
                ctx.font = 'bold 14px "Space Mono", monospace';
                ctx.fillStyle = '#7dd3fc'; ctx.textAlign = 'left';
                ctx.fillText('◇ SHIELD ' + Math.ceil(this.player.shieldTimer) + 's', 12, VIEW_H - 14);
                ctx.restore();
            }

            if (this.waveBanner.timer > 0) {
                const alpha = Math.min(1, this.waveBanner.timer);
                ctx.save();
                ctx.textAlign = 'center';
                ctx.font = 'bold 28px "Space Mono", monospace';
                ctx.fillStyle = `rgba(${this.waveBanner.color || '255, 170, 0'}, ${alpha.toFixed(2)})`;
                ctx.fillText(this.waveBanner.text, VIEW_W / 2, VIEW_H * 0.3);
                ctx.restore();
            }

            // Drag-to-move indicator: rendered on the canvas itself (not a DOM
            // element) so it's always correctly placed regardless of mobile
            // browser chrome covering fixed/absolute page elements.
            if (this.touchIndicator) {
                const { anchorX, anchorY, x, y } = this.touchIndicator;
                ctx.save();
                ctx.strokeStyle = 'rgba(0, 255, 170, 0.55)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(anchorX, anchorY, 30, 0, PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(anchorX, anchorY);
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.fillStyle = 'rgba(0, 255, 170, 0.3)';
                ctx.beginPath();
                ctx.arc(x, y, 16, 0, PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // Function to handle the score submission sequence (Unchanged)
        showSubmissionForm(score) {
            this.finalScore = score; // Store score temporarily
            
            modalContentContainer.innerHTML = `
                <h1>GAME OVER</h1>
                <p>Score: <span style="color: #ffaa00; font-weight: 700;">${score}</span></p>
                <form id="name-form">
                    <label for="player-name-input" style="color: #00ffaa;">Enter your name/initials (max 8):</label>
                    <input type="text" id="player-name-input" maxlength="8" placeholder="PLAYER" value="${localStorage.getItem('lastUserName') || ''}">
                    <button type="submit" id="submit-score-button">SUBMIT SCORE</button>
                </form>
            `;
            messageBox.style.display = 'block';
            document.getElementById('restart-button').style.display = 'none'; // Hide restart initially
            
            document.getElementById('name-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const nameInput = document.getElementById('player-name-input');
                const userName = nameInput.value.trim().substring(0, 8) || 'PLAYER';
                
                localStorage.setItem('lastUserName', userName); // Save name locally for next time

                this.displayFinalScores(this.finalScore, userName);
            });
        }
        
        async displayFinalScores(score, userName) {
            modalContentContainer.innerHTML = `<h1>SAVING SCORE...</h1><p>Fetching Top 10...</p>`;
            
            // Only try to save score if Firebase is available
            if (isFirebaseAvailable) {
                await saveScore(score, userName);
            }
            
            const scoreListHtml = await loadHighScores();

            modalContentContainer.innerHTML = `
                <h1>GAME OVER</h1>
                <p>Score Saved: <span style="color: #ffaa00; font-weight: 700;">${score}</span></p>
                <div id="game-over-scores-container">
                    <h2>TOP 10 SCORES (Jungle Aces)</h2>
                    <ul id="game-over-scores-list">
                        ${scoreListHtml}
                    </ul>
                </div>
            `;
            document.getElementById('restart-button').style.display = 'block'; // Show restart after submission
        }

        gameOver() {
            this.isRunning = false;
            if (this.score > highScore) {
                highScore = this.score;
                localStorage.setItem('asteroidsHighScore', String(highScore));
            }
            this.showSubmissionForm(this.score);
        }

        gameLoop(currentTime) {
            if (!this.isRunning) return;

            if (this.isPaused) {
                this.lastTime = currentTime;
                requestAnimationFrame(this.gameLoop.bind(this));
                return;
            }

            // Clamp dt so a backgrounded tab / phone lock screen doesn't cause
            // a huge simulation jump (teleporting objects, instant collisions).
            const dt = Math.min((currentTime - this.lastTime) / 1000, 0.05);
            this.lastTime = currentTime;

            this.update(dt);
            this.draw();

            requestAnimationFrame(this.gameLoop.bind(this));
        }

        updateUI() {
            scoreDisplay.textContent = 'SCORE: ' + this.score;
            highscoreDisplay.textContent = 'BEST: ' + Math.max(highScore, this.score);
            livesDisplay.textContent = 'LIVES: ' + Math.max(0, this.player.lives);
        }
    }

    // --- Input Handling ---

    function handleKeyDown(event) {
        if (!game || !game.isRunning) return;
        const player = game.player;

        switch (event.key) {
            case 'ArrowLeft': case 'a':
                player.isTurningLeft = true; event.preventDefault(); break;
            case 'ArrowRight': case 'd':
                player.isTurningRight = true; event.preventDefault(); break;
            case 'ArrowUp': case 'w':
                player.isAccelerating = true; event.preventDefault(); break;
            case ' ': // Spacebar
                if (!player.isShooting) { player.shoot(game); }
                player.isShooting = true; event.preventDefault(); break;
        }
    }

    function handleKeyUp(event) {
        if (!game || !game.isRunning) return;
        const player = game.player;

        switch (event.key) {
            case 'ArrowLeft': case 'a': player.isTurningLeft = false; break;
            case 'ArrowRight': case 'd': player.isTurningRight = false; break;
            case 'ArrowUp': case 'w': player.isAccelerating = false; break;
            case ' ': player.isShooting = false; break;
        }
    }

    // --- Touch Gesture Controls ---
    // One finger: press-and-drag anywhere on the canvas "pulls" the ship in
    // that direction (a dynamic, anchor-at-first-touch virtual stick). A
    // second finger tapping down fires a shot. This replaces on-screen
    // buttons entirely, so there's nothing for mobile browser chrome (e.g.
    // Safari's bottom bar) to cover up.
    const TOUCH_DEADZONE = 10;   // px of drag before the ship starts moving
    const TOUCH_MAX_PULL = 90;   // px of drag for full thrust

    let moveTouchId = null;
    let touchAnchor = null; // { x, y } in canvas CSS-pixel coordinates

    function canvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function setupTouchGestureControls() {
        canvas.addEventListener('pointerdown', (e) => {
            if (!game || !game.isRunning || game.isPaused) return;
            e.preventDefault();
            if (moveTouchId === null) {
                // First finger down: becomes the steering anchor.
                moveTouchId = e.pointerId;
                touchAnchor = canvasPos(e);
                try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
            } else if (e.pointerId !== moveTouchId) {
                // Any additional finger fires a shot.
                game.player.shoot(game);
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (e.pointerId !== moveTouchId || !touchAnchor || !game || !game.player) return;
            e.preventDefault();
            const pos = canvasPos(e);
            const dx = pos.x - touchAnchor.x;
            const dy = pos.y - touchAnchor.y;
            const dist = Math.hypot(dx, dy);
            const player = game.player;

            if (dist > TOUCH_DEADZONE) {
                player.angle = Math.atan2(dy, dx);
                player.isAccelerating = true;
                player.thrustScale = Math.min(1, dist / TOUCH_MAX_PULL);
            } else {
                player.isAccelerating = false;
            }
            game.touchIndicator = { anchorX: touchAnchor.x, anchorY: touchAnchor.y, x: pos.x, y: pos.y };
        });

        const endMove = (e) => {
            if (e.pointerId !== moveTouchId) return;
            moveTouchId = null;
            touchAnchor = null;
            if (game && game.player) {
                game.player.isAccelerating = false;
                game.player.thrustScale = 1;
            }
            if (game) game.touchIndicator = null;
        };
        canvas.addEventListener('pointerup', endMove);
        canvas.addEventListener('pointercancel', endMove);
    }

    // --- Game Initialization & Firebase Setup ---

    async function initFirebase() {
        try {
            // Check if config seems valid before attempting init
            if (Object.keys(firebaseConfig).length > 0 && typeof firebaseConfig.apiKey === 'string') {
                const [appMod, authMod, firestoreMod] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")
                ]);
                ({ initializeApp } = appMod);
                ({ getAuth, signInAnonymously, signInWithCustomToken } = authMod);
                ({ getFirestore, collection, addDoc, query, orderBy, limit, getDocs, Timestamp } = firestoreMod);

                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                isFirebaseAvailable = true;
                console.log("Firebase initialized successfully. Attempting authentication...");
                await ensureAuth(); // Authenticate immediately
            } else {
                console.warn("Firebase configuration incomplete. Running game without high score support.");
                isFirebaseAvailable = false;
            }
        } catch (e) {
            // Catches errors during initializeApp or getAuth/getFirestore
            console.error("Critical error during Firebase setup. Running game without high score support.", e);
            isFirebaseAvailable = false;
        }
    }

    function resizeCanvas() {
        // Fill whatever space the flex layout gives canvas-wrap (fills the
        // screen on mobile in either orientation; capped on desktop by
        // #game-container's max-width/max-height).
        const rect = canvasWrap.getBoundingClientRect();
        VIEW_W = Math.max(280, Math.floor(rect.width));
        VIEW_H = Math.max(200, Math.floor(rect.height));

        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(VIEW_W * dpr);
        canvas.height = Math.floor(VIEW_H * dpr);
        canvas.style.width = VIEW_W + 'px';
        canvas.style.height = VIEW_H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function startGame() {
        // Hide modal, set up controls, and start game loop
        messageBox.style.display = 'none';
        // Defensive reset in case a previous session ended without a clean
        // pointerup/cancel for the steering finger (shouldn't normally happen).
        moveTouchId = null;
        touchAnchor = null;
        game = new Game();
        game.init();
        game.lastTime = performance.now();
        // Request animation frame starts the game loop
        requestAnimationFrame(game.gameLoop.bind(game));
    }

    document.getElementById('restart-button').addEventListener('click', startGame);

    // Auto-pause when the tab/app is backgrounded so mobile users don't come
    // back to an instant death from a huge accumulated dt or pile of asteroids.
    document.addEventListener('visibilitychange', () => {
        if (!game) return;
        if (document.hidden) {
            game.isPaused = true;
        } else {
            game.isPaused = false;
            game.lastTime = performance.now();
        }
    });

    window.onload = async function() {
        // 1. Initial size setup and event listeners (debounced resize + orientation change)
        highscoreDisplay.textContent = 'BEST: ' + highScore;
        generateStars();
        resizeCanvas();
        let resizeRAF;
        window.addEventListener('resize', () => {
            cancelAnimationFrame(resizeRAF);
            resizeRAF = requestAnimationFrame(resizeCanvas);
        });
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

        // 2. Setup Input Handlers
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        setupTouchGestureControls();

        // Escape always returns to the arcade landing page, regardless of
        // whether a game is actively running, paused, or on a modal screen.
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'index.html';
            }
        });

        // 3. Initialize Firebase (asynchronously)
        await initFirebase();

        // 4. Set up the initial instruction screen
        modalContentContainer.innerHTML = `
            <h1>ARCADE ASTEROIDS</h1>
            <p>Destroy the cosmic monkeys and bananas!</p>
            <p style="font-size: 0.9rem; color: #ffaa00;">
                PC: WASD/Arrows to move/rotate, SPACE to shoot.<br>
                Mobile: Drag anywhere to steer, tap with a 2nd finger to fire.
            </p>
            <p style="font-size: 0.85rem; color: #7dd3fc;">
                Grab a &#9671; SHIELD for a few seconds of invincibility &mdash; fly straight through rocks and monkeys to smash them!
            </p>
        `;
        messageBox.style.display = 'block';
        document.getElementById('restart-button').textContent = 'START GAME';
        document.getElementById('restart-button').style.display = 'block';

        // The game officially starts when the user clicks 'START GAME'
    }

            .aui-key.on{border-color:var(--aui-a);color:#000;background:var(--aui-a);box-shadow:0 0 6px var(--aui-a);}
            .aui-arrows{display:flex;flex-direction:column;gap:4px;align-items:center;margin-left:10px;}
            .aui-legend{text-align:left;font-size:0.5rem;line-height:1.9;color:#9fb3c8;margin:8px auto 0;max-width:420px;}
            .aui-legend b{color:var(--aui-a);}
            .aui-mob{font-size:0.5rem;color:#7a8ca0;margin-top:10px;line-height:1.7;}
            .aui-close{margin-top:14px;background:var(--aui-a);color:#000;border:none;border-radius:6px;padding:10px 18px;font-family:inherit;font-size:0.6rem;cursor:pointer;touch-action:manipulation;}
            #aui-paused .p-box{text-align:center;font-family:'Press Start 2P','Courier New',monospace;color:var(--aui-a);text-shadow:0 0 12px var(--aui-a);}
            #aui-paused h1{font-size:1.4rem;margin:0 0 12px;}
            #aui-paused p{font-size:0.55rem;color:#9fb3c8;}
            `;
            document.head.appendChild(st);
        }
        document.documentElement.style.setProperty('--aui-a', accent);
        const used = new Set();
        (opts.keys || []).forEach(e => e.k.forEach(k => used.add(String(k).toUpperCase())));
        const btns = document.createElement('div');
        btns.id = 'aui-btns';
        const cBtn = document.createElement('button');
        cBtn.className = 'aui-b'; cBtn.title = 'Controls'; cBtn.textContent = '⌨';
        btns.appendChild(cBtn);
        let pBtn = null;
        if (pause) { pBtn = document.createElement('button'); pBtn.className = 'aui-b'; pBtn.title = 'Pause'; pBtn.textContent = '⏸'; btns.appendChild(pBtn); }
        document.body.appendChild(btns);
        const co = document.createElement('div');
        co.id = 'aui-controls';
        const rows = [['1','2','3','4','5','6','7','8','9','0'],['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];
        const key = (label, tok, cls) => `<div class="aui-key ${cls || ''} ${used.has(tok) ? 'on' : ''}">${label}</div>`;
        let kb = '<div class="aui-kb">';
        for (const r of rows) kb += '<div class="aui-row">' + r.map(k => key(k, k)).join('') + '</div>';
        kb += '<div class="aui-row" style="align-items:flex-end">' + key('SPACE', 'SPACE', 'wide') +
            '<div class="aui-arrows"><div class="aui-row">' + key('↑', '↑') + '</div><div class="aui-row">' + key('←', '←') + key('↓', '↓') + key('→', '→') + '</div></div></div></div>';
        const legend = (opts.keys || []).map(e => `<div><b>${e.k.join(' / ')}</b> — ${e.a}</div>`).join('');
        co.innerHTML = `<div id="aui-panel"><h2>CONTROLS</h2>${kb}<div class="aui-legend">${legend}</div>` +
            (opts.mobile ? `<div class="aui-mob">\u{1F4F1} ${opts.mobile}</div>` : '') + `<button class="aui-close">CLOSE</button></div>`;
        document.body.appendChild(co);
        const po = document.createElement('div');
        po.id = 'aui-paused';
        po.innerHTML = `<div class="p-box"><h1>⏸ PAUSED</h1><p>press P or ⏸ to resume</p></div>`;
        document.body.appendChild(po);
        let autoPaused = false;
        function refreshPaused() { const on = pause && pause.isPaused(); po.classList.toggle('on', !!on); if (pBtn) pBtn.textContent = on ? '▶' : '⏸'; }
        function togglePause() { if (!pause || !pause.canPause()) return; pause.setPaused(!pause.isPaused()); refreshPaused(); }
        function openControls() { if (pause && pause.canPause() && !pause.isPaused()) { pause.setPaused(true); autoPaused = true; } po.classList.remove('on'); co.classList.add('on'); }
        function closeControls() { co.classList.remove('on'); if (autoPaused && pause) { pause.setPaused(false); autoPaused = false; } refreshPaused(); }
        cBtn.addEventListener('click', () => co.classList.contains('on') ? closeControls() : openControls());
        co.querySelector('.aui-close').addEventListener('click', closeControls);
        co.addEventListener('click', (e) => { if (e.target === co) closeControls(); });
        if (pBtn) pBtn.addEventListener('click', togglePause);
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && co.classList.contains('on')) { e.preventDefault(); e.stopPropagation(); closeControls(); return; }
            if ((e.key === 'p' || e.key === 'P') && pause) { togglePause(); }
        }, true);
        return { togglePause };
    }

    installArcadeUI({
        accent: '#00ffaa',
        keys: [
            { k: ['W', '↑'], a: 'Thrust' },
            { k: ['A', '←'], a: 'Rotate left' },
            { k: ['D', '→'], a: 'Rotate right' },
            { k: ['SPACE'], a: 'Shoot' },
            { k: ['P'], a: 'Pause' },
            { k: ['ESC'], a: 'Back to arcade' }
        ],
        mobile: 'Drag anywhere to steer · tap with a 2nd finger to fire',
        pause: {
            canPause: () => !!(game && game.isRunning),
            isPaused: () => !!(game && game.isPaused),
            setPaused: (v) => { if (game) { game.isPaused = v; if (!v) game.lastTime = performance.now(); } }
        }
    });
</script>
</body>
</html>
