<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tank Wars</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
          media="print" onload="this.media='all'">
    <style>
        html, body { height: 100%; }

        :root {
            --g-bright: #66ff66;
            --g-mid: #22cc22;
            --g-dim: #114411;
            --g-bg: #020a02;
            --g-panel: #041604;
            --orange: #ffa500;
        }

        body {
            background: var(--g-bg);
            color: var(--g-bright);
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 8px;
            box-sizing: border-box;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: min(900px, 96vw);
            height: 100%;
            max-height: min(760px, 96vh);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid var(--g-mid);
            border-radius: 10px;
            box-shadow: 0 0 18px var(--g-mid), inset 0 0 18px rgba(34, 204, 34, 0.25);
            background: #010401;
            padding: 6px;
            box-sizing: border-box;
        }

        #hud-top {
            width: 100%;
            flex-shrink: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            box-sizing: border-box;
            border: 2px solid var(--g-dim);
            border-radius: 6px;
            font-size: 0.6rem;
            margin-bottom: 6px;
        }

        #hud-top span { white-space: nowrap; }
        #hud-player { color: var(--g-bright); text-shadow: 0 0 6px var(--g-bright); }
        #hud-wind, #hud-angle, #hud-score { color: var(--g-mid); }

        #hud-health {
            width: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            padding: 2px 10px;
            box-sizing: border-box;
            font-size: 0.55rem;
            margin-bottom: 6px;
        }
        #hud-health span { white-space: nowrap; }

        .pill-btn {
            background: transparent;
            color: var(--g-bright);
            border: 2px solid var(--g-mid);
            border-radius: 999px;
            padding: 5px 10px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 0.5rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .pill-btn:active { background: var(--g-mid); color: #001500; }

        #canvas-wrap {
            position: relative;
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #gameCanvas { display: block; background: var(--g-bg); touch-action: none; }

        #scanlines {
            position: absolute;
            pointer-events: none;
            background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 1px, transparent 3px);
            mix-blend-mode: multiply;
        }

        #power-meter {
            position: absolute;
            left: 6px; top: 8%;
            width: 14px; height: 84%;
            border: 2px solid var(--g-mid);
            border-radius: 4px;
            display: none;
            overflow: hidden;
            background: rgba(0,20,0,0.6);
        }
        #power-meter.show { display: block; }
        #power-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 0%; background: var(--g-bright);
        }
        /* horizontal marker showing the strength of this player's last shot */
        #power-last {
            position: absolute; left: -2px; right: -2px; height: 0;
            border-top: 2px dashed var(--orange);
            bottom: 0%; display: none;
        }
        #power-meter.show #power-last.show { display: block; }

        /* Move/energy meter — mirrors the power meter on the opposite edge,
           showing how much of the per-round drive budget is left. */
        #move-meter {
            position: absolute;
            right: 6px; top: 8%;
            width: 14px; height: 84%;
            border: 2px solid var(--orange);
            border-radius: 4px;
            display: none;
            overflow: hidden;
            background: rgba(0,20,0,0.6);
        }
        #move-meter.show { display: block; }
        #move-fill {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 0%; background: var(--orange);
        }

        #inventory-row {
            position: absolute;
            bottom: 6px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4px; z-index: 30;
        }
        .inv-chip {
            background: rgba(0,20,0,0.75);
            color: var(--g-mid);
            border: 2px solid var(--g-dim);
            border-radius: 4px;
            padding: 4px 6px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 0.45rem;
            cursor: pointer;
            touch-action: manipulation;
        }
        .inv-chip.sel { color: var(--g-bright); border-color: var(--g-bright); box-shadow: 0 0 6px var(--g-bright); }
        .inv-chip.trade-chip { border-color: var(--orange); color: var(--orange); }

        /* --- Weapon illustration modal (double-click a weapon chip) --- */
        #weapon-illo {
            position: fixed; inset: 0; z-index: 900;
            display: none; align-items: center; justify-content: center;
            background: rgba(1, 6, 1, 0.88);
            padding: 16px; box-sizing: border-box;
        }
        #weapon-illo.open { display: flex; }
        #weapon-illo-box {
            width: 100%; max-width: 300px;
            border: 2px solid var(--g-bright);
            border-radius: 10px;
            padding: 14px;
            box-sizing: border-box;
            text-align: center;
            background: rgba(0, 12, 0, 0.97);
            box-shadow: 0 0 20px rgba(102,255,102,0.35);
        }
        #weapon-illo-title {
            font-size: 0.65rem; color: var(--g-bright); text-shadow: 0 0 8px var(--g-bright);
            margin: 0 0 10px;
        }
        #weapon-illo-canvas { background: var(--g-bg); border: 1px solid var(--g-dim); border-radius: 4px; max-width: 100%; }
        #weapon-illo-desc { font-size: 0.5rem; line-height: 1.7; color: var(--g-mid); margin: 10px 0 4px; }

        #banner {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            padding: 8px 16px;
            border: 2px solid var(--g-bright);
            border-radius: 6px;
            background: rgba(0,20,0,0.85);
            color: var(--g-bright);
            font-size: 0.7rem;
            text-align: center;
            box-shadow: 0 0 14px var(--g-bright);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
            z-index: 40;
            white-space: nowrap;
        }
        #banner.show { opacity: 1; }

        #back-to-arcade {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            left: max(10px, env(safe-area-inset-left));
            z-index: 500;
            padding: 6px 12px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 0.55rem;
            color: var(--g-bright);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--g-bright);
            border-radius: 6px;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        #back-to-arcade:active { background: rgba(102, 255, 102, 0.25); }

        #kb-hint {
            display: none;
            width: 100%;
            text-align: center;
            font-size: 0.42rem;
            color: var(--g-dim);
            padding: 6px 4px 0;
            box-sizing: border-box;
            letter-spacing: 0.5px;
        }
        @media (pointer: fine) { #kb-hint { display: block; } }

        #mobile-controls {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 6px;
            padding: 6px 4px 0;
            box-sizing: border-box;
        }
        @media (pointer: coarse) {
            #mobile-controls { display: flex; }
        }
        .mc-row { display: flex; gap: 6px; width: 100%; }
        #mobile-controls button {
            flex: 1;
            min-height: 46px;
            background: rgba(0,20,0,0.8);
            color: var(--g-bright);
            border: 2px solid var(--g-mid);
            border-radius: 8px;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 0.5rem;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        #mobile-controls button:active { background: rgba(102,255,102,0.25); }
        .mc-drive { border-color: var(--orange); color: var(--orange); }
        #btn-shield { border-color: var(--g-bright); }
        #btn-shield.used { opacity: 0.35; }
        #btn-shield.on { background: var(--g-bright); color: #001500; }
        #btn-fire { flex: 2; }

        /* --- Match end modal --- */
        #match-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 12, 0, 0.97);
            border: 3px solid var(--g-bright);
            padding: 20px 26px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 28px var(--g-bright);
            z-index: 100;
            display: none;
            max-width: 88vw; width: 340px;
            box-sizing: border-box;
        }
        #match-content h1 { font-size: 0.95rem; line-height: 1.6; margin: 0 0 12px; color: var(--g-bright); text-shadow: 0 0 8px var(--g-bright); }
        #match-content p { font-size: 0.55rem; line-height: 1.8; margin: 0 0 10px; color: var(--g-mid); }
        .tw-btn {
            background: var(--g-mid); color: #001500; border: none;
            padding: 10px 18px; border-radius: 6px; margin: 6px 4px 0;
            cursor: pointer; font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 0.6rem; box-shadow: 0 4px #0a5a0a; touch-action: manipulation;
        }
        .tw-btn.alt { background: transparent; color: var(--g-bright); border: 2px solid var(--g-bright); box-shadow: none; }
        .tw-btn:active { transform: translateY(3px); box-shadow: none; }

        /* --- Setup overlay --- */
        #setup {
            position: fixed; inset: 0; z-index: 800;
            display: none; flex-direction: column; align-items: center;
            background: rgba(1, 6, 1, 0.96);
            overflow-y: auto;
            padding: 16px 10px 30px;
            box-sizing: border-box;
        }
        #setup.open { display: flex; }
        #setup-box {
            width: 100%; max-width: 480px;
            border: 2px solid var(--g-mid);
            border-radius: 10px;
            padding: 14px;
            box-sizing: border-box;
            box-shadow: 0 0 16px rgba(34,204,34,0.4);
        }
        #setup-box h1 {
            font-size: 1rem; text-align: center; color: var(--g-bright);
            text-shadow: 0 0 10px var(--g-bright); margin: 0 0 14px;
        }
        .setup-row { margin-bottom: 12px; }
        .setup-label { display: block; font-size: 0.55rem; color: var(--g-mid); margin-bottom: 6px; }
        .setup-inline { display: flex; align-items: center; gap: 10px; justify-content: center; }
        .stepper-btn {
            background: transparent; color: var(--g-bright); border: 2px solid var(--g-mid);
            border-radius: 4px; width: 30px; height: 30px; font-size: 0.9rem; cursor: pointer;
            touch-action: manipulation;
        }
        #players-val { font-size: 0.9rem; min-width: 20px; text-align: center; }

        .slot-row {
            display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--g-dim); border-radius: 6px;
            padding: 6px 8px; margin-bottom: 6px;
        }
        .slot-swatch { width: 18px; height: 18px; border: 1px solid var(--g-mid); flex-shrink: 0; cursor: pointer; }
        .slot-label { font-size: 0.5rem; width: 30px; flex-shrink: 0; }
        .slot-type-btn {
            flex: 1; background: transparent; color: var(--g-bright); border: 1px solid var(--g-mid);
            border-radius: 4px; padding: 6px 4px; font-family: inherit; font-size: 0.5rem; cursor: pointer;
            touch-action: manipulation;
        }

        .opt-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .opt-btn {
            background: transparent; color: var(--g-mid); border: 2px solid var(--g-dim);
            border-radius: 4px; padding: 7px 8px; font-family: inherit; font-size: 0.5rem; cursor: pointer;
            touch-action: manipulation;
        }
        .opt-btn.sel { color: var(--g-bright); border-color: var(--g-bright); box-shadow: 0 0 6px var(--g-bright); }

        #start-battle {
            display: block; width: 100%; margin-top: 14px;
            background: var(--g-mid); color: #001500; border: none;
            padding: 14px; border-radius: 8px; font-family: inherit; font-size: 0.75rem;
            cursor: pointer; box-shadow: 0 5px #0a5a0a; touch-action: manipulation;
        }
        #start-battle:active { transform: translateY(4px); box-shadow: none; }

        @media (max-width: 480px) {
            #hud-top { font-size: 0.5rem; gap: 6px; }
            .pill-btn { font-size: 0.45rem; padding: 4px 7px; }
        }
    </style>
</head>
<body>

<a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>

<div id="game-container">
    <div id="hud-top">
        <span id="hud-player">P1</span>
        <span id="hud-wind">WIND -</span>
        <span id="hud-angle">55&deg;</span>
        <span id="hud-score">0-0</span>
        <button class="pill-btn" id="mute-btn">&#128266;</button>
        <button class="pill-btn" id="setup-btn">SETUP</button>
    </div>
    <div id="hud-health"></div>
    <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div id="scanlines"></div>
        <div id="power-meter"><div id="power-fill"></div><div id="power-last"></div></div>
        <div id="move-meter"><div id="move-fill"></div></div>
        <div id="inventory-row"></div>
        <div id="banner"></div>
        <div id="match-modal">
            <div id="match-content"></div>
            <button class="tw-btn" id="rematch-btn">REMATCH</button>
            <button class="tw-btn alt" id="match-setup-btn">SETUP</button>
        </div>
    </div>
    <div id="kb-hint">&#9668;&#9658; AIM &middot; &#9650;&#9660; FINE &middot; A/D DRIVE &middot; SPACE HOLD=FIRE &middot; S SHIELD &middot; 1-9 WEAPON &middot; DBL-CLICK WEAPON: INFO</div>
    <div id="mobile-controls">
        <div class="mc-row">
            <button id="btn-aim-left" class="mc-aim">AIM &#9668;</button>
            <button id="btn-aim-right" class="mc-aim">AIM &#9658;</button>
            <button id="btn-drive-left" class="mc-drive">&#9668; DRIVE</button>
            <button id="btn-drive-right" class="mc-drive">DRIVE &#9658;</button>
        </div>
        <div class="mc-row">
            <button id="btn-shield">SHIELD</button>
            <button id="btn-fire">HOLD TO FIRE</button>
        </div>
    </div>
</div>

<div id="weapon-illo">
    <div id="weapon-illo-box">
        <h1 id="weapon-illo-title"></h1>
        <canvas id="weapon-illo-canvas" width="240" height="160"></canvas>
        <p id="weapon-illo-desc"></p>
        <button class="tw-btn alt" id="weapon-illo-close">CLOSE</button>
    </div>
</div>

<div id="setup">
    <div id="setup-box">
        <h1>TANK WARS</h1>
        <div class="setup-row">
            <span class="setup-label">PLAYERS</span>
            <div class="setup-inline">
                <button class="stepper-btn" id="players-minus">-</button>
                <span id="players-val">2</span>
                <button class="stepper-btn" id="players-plus">+</button>
            </div>
        </div>
        <div class="setup-row">
            <span class="setup-label">SLOTS (tap to cycle HUMAN / CPU)</span>
            <div id="slots"></div>
        </div>
        <div class="setup-row">
            <span class="setup-label">BATTLEFIELD</span>
            <div class="opt-group" id="terrain-options"></div>
        </div>
        <div class="setup-row">
            <span class="setup-label">MATCH LENGTH</span>
            <div class="opt-group" id="rounds-options"></div>
        </div>
        <div class="setup-row">
            <span class="setup-label">SPECIAL WEAPONS (starting count per player)</span>
            <div id="weapon-options"></div>
        </div>
        <button id="start-battle">START BATTLE</button>
    </div>
</div>

<script>
    'use strict';

    // =====================================================================
    // Tank Wars — turn-based artillery duel, 2-4 players (human/CPU),
    // green-phosphor CRT retro look. Destructible terrain, wind, hold-to-
    // charge power, power-ups earned by perfect shots or found in crates,
    // best-of-N rounds.
    // =====================================================================

    const W = 800, H = 500;
    const GRAVITY = 220;
    const TANK_W = 24, TANK_H = 14;
    const CHARGE_DURATION = 1.4;
    const FLIGHT_SUBSTEP_DT = 1 / 240;
    const BOUNDS_MARGIN = 120;
    const ANGLE_SPEED = 45, FINE_SPEED = 12;
    const WEAPON_ORDER = ['standard', 'twin', 'triple', 'big', 'shrapnel', 'rapidfire', 'spray', 'mega', 'heatseeker'];
    const PATTERN_NAMES = ['SOLID', 'STRIPES', 'CHECKER', 'DOTS'];
    // Phosphor-style tank color options (hull tint); pattern still carries the
    // solid/stripes/checker/dots distinction per slot.
    const TANK_COLORS = [
        { name: 'GREEN',   bright: '#66ff66', mid: '#22cc22' },
        { name: 'AMBER',   bright: '#ffcc66', mid: '#cc8a22' },
        { name: 'CYAN',    bright: '#7af0ff', mid: '#22a4cc' },
        { name: 'MAGENTA', bright: '#ff7ae0', mid: '#cc22a0' },
        { name: 'RED',     bright: '#ff6666', mid: '#cc2222' },
        { name: 'BLUE',    bright: '#7a9aff', mid: '#2244cc' }
    ];
    const VOID_Y = H + 300;

    // Damage model: an explosion has an inner core (carves terrain + full
    // damage) and a wider outer ring (no terrain damage, a lighter health
    // hit). OUTER_MULT is how much wider the light ring is; OUTER_FACTOR is
    // its fraction of full damage.
    const OUTER_MULT = 1.7, OUTER_FACTOR = 0.35;

    // Tank movement: each tank gets a per-round energy budget worth about one
    // full screen width of driving on flat ground; steep climbs cost more.
    const ENERGY_MAX = 100;
    const ENERGY_PER_PX = ENERGY_MAX / W;        // flat: a full screen = empty tank
    const STEEP_SURCHARGE = 2.2;                 // extra cost per px of uphill climb
    const MOVE_SPEED = 72;                        // px/s while driving

    // Shields raised per round; trading a Mega Cannon Bomb for one (see the
    // inventory row) adds to this on top of the free per-round allotment.
    const SHIELD_START = 1;

    // Falling into a bottomless void (Sky Island today; future themes like
    // Clouds and Tree Canopy will reuse the same terrain[] >= H+100 void
    // convention) doesn't kill outright — it costs a flat health penalty and
    // resets the tank to where it started the round.
    const VOID_FALL_DAMAGE = 50;

    const GREEN_BRIGHT = '#66ff66', GREEN_MID = '#22cc22', GREEN_DIM = '#114411', ORANGE = '#ffa500';
    const CANNON_GRAY = '#d8d8d8';
    const BARREL_LEN = 20;   // rendered barrel length; shells also spawn from this tip

    const WEAPONS = {
        standard: { name: 'SHELL', short: '1 SHL', shots: [0], carveR: 26, dmgR: 26, dmg: 40, infinite: true },
        twin:     { name: 'TWIN TURRET', short: '2 TWN', shots: [-5, 5], carveR: 22, dmgR: 22, dmg: 30 },
        triple:   { name: 'TRIPLE SHOT', short: '3 TRI', shots: [-9, 0, 9], carveR: 18, dmgR: 18, dmg: 24 },
        big:      { name: 'BIG BLAST', short: '4 BIG', shots: [0], carveR: 44, dmgR: 44, dmg: 60 },
        shrapnel: { name: 'SHRAPNEL', short: '5 SHR', shots: [0], carveR: 16, dmgR: 15, dmg: 20, shrapnel: 7 },
        // Fires the first shot immediately, then auto-fires the rest of the
        // burst (see RAPID_FIRE_SHOTS/RAPID_FIRE_SECONDS) at the angle/power
        // this first shot was released with — no further input from the
        // player. Individual shots are weak; the burst's power comes from
        // landing several in a row.
        rapidfire: { name: 'RAPID FIRE', short: '6 RPD', shots: [0], carveR: 11, dmgR: 11, dmg: 10, burst: true },
        spray:    { name: 'SPRAY SHOT', short: '7 SPR', shots: [-16, -8, 0, 8, 16], carveR: 12, dmgR: 12, dmg: 12 },
        mega:     { name: 'MEGA CANNON BOMB', short: '8 MEG', shots: [0], carveR: 88, dmgR: 88, dmg: 120 },
        // Once within HEATSEEKER_RADIUS of an enemy tank, curves in and
        // guarantees a hit — see the homing check in updateFlight().
        heatseeker: { name: 'HEAT SEEKER', short: '9 HSK', shots: [0], carveR: 22, dmgR: 22, dmg: 35, homing: true },
        // internal: secondary fragments thrown by a SHRAPNEL burst (never in inventory)
        shrapnelFrag: { name: 'FRAG', shots: [0], carveR: 9, dmgR: 10, dmg: 14 }
    };
    const TANKBLAST = { carveR: 35, dmgR: 35, dmg: 30 };

    const RAPID_FIRE_SHOTS = 10;
    const RAPID_FIRE_SECONDS = 5;
    const RAPID_FIRE_INTERVAL = RAPID_FIRE_SECONDS / (RAPID_FIRE_SHOTS - 1);
    const RAPID_FIRE_ANGLE_JITTER = 6;    // degrees, spreads the auto-fired shots' landing spot
    const RAPID_FIRE_CHARGE_JITTER = 0.06;
    const HEATSEEKER_RADIUS = 70;   // lock-on distance to the nearest enemy tank
    const POWERUP_KEYS = ['twin', 'triple', 'big', 'shrapnel', 'rapidfire', 'spray', 'mega', 'heatseeker'];
    // Most special weapons can be stocked up to WEAPON_COUNT_MAX per player;
    // a few (like the Mega Cannon Bomb) are capped lower on the setup screen.
    const WEAPON_MAX_OVERRIDE = { mega: 1 };
    const weaponMax = key => WEAPON_MAX_OVERRIDE[key] || WEAPON_COUNT_MAX;

    // The setup screen lets players set how many of each special weapon
    // everyone starts a round with; crates/perfect-shot awards are drawn from
    // whichever of those have a count > 0 (falls back to the full roster if
    // they somehow zero out every weapon).
    function activePowerupKeys() {
        const enabled = POWERUP_KEYS.filter(k => (state.config.weaponCounts || {})[k] > 0);
        return enabled.length ? enabled : POWERUP_KEYS;
    }

    // Easy battlefields get slightly bigger, more forgiving blasts; expert
    // terrain gets tighter ones.
    function blastScale() {
        const t = state.config ? state.config.terrain : 'hills';
        return t === 'hills' ? 1.2 : t === 'mountains' ? 1.05 : t === 'canyon' ? 0.98 : t === 'skyisland' ? 0.9
            : t === 'moonscape' ? 1.1 : t === 'city' ? 0.95 : t === 'volcano' ? 1.0 : t === 'beach' ? 1.15
            : t === 'cloud' ? 0.95 : t === 'canopy' ? 0.9 : 1.0;
    }

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvas-wrap');
    const scanlines = document.getElementById('scanlines');
    const hudPlayer = document.getElementById('hud-player');
    const hudWind = document.getElementById('hud-wind');
    const hudAngle = document.getElementById('hud-angle');
    const hudScore = document.getElementById('hud-score');
    const hudHealthEl = document.getElementById('hud-health');
    const powerMeter = document.getElementById('power-meter');
    const powerFill = document.getElementById('power-fill');
    const powerLast = document.getElementById('power-last');
    const moveMeter = document.getElementById('move-meter');
    const moveFill = document.getElementById('move-fill');
    const shieldBtn = document.getElementById('btn-shield');
    const invRow = document.getElementById('inventory-row');
    const bannerEl = document.getElementById('banner');
    const matchModal = document.getElementById('match-modal');
    const matchContent = document.getElementById('match-content');
    const weaponIlloEl = document.getElementById('weapon-illo');
    const weaponIlloTitle = document.getElementById('weapon-illo-title');
    const weaponIlloDesc = document.getElementById('weapon-illo-desc');
    const weaponIlloCanvas = document.getElementById('weapon-illo-canvas');
    const weaponIlloCtx = weaponIlloCanvas.getContext('2d');

    // --- Persisted preferences ---------------------------------------------
    const LS = { muted: 'tw_muted', config: 'tw_config' };
    let muted = localStorage.getItem(LS.muted) === '1';

    // --- Game state ---------------------------------------------------------
    const state = {
        phase: 'setup',           // setup|aiming|charging|flight|resolving|awarding|turnEnd|roundEnd|matchEnd
        config: null,
        players: [],
        currentIdx: 0,
        wind: 0,
        shells: [],
        particles: [],
        crates: [],
        charge: 0, charging: false, chargeDir: 1,
        pendingAwards: [],
        round: 1, scores: [],
        banner: null,
        cpu: null,
        matchStarted: false
    };

    let terrain = new Float32Array(W);
    let bgStars = [];   // populated once per round for the Moonscape theme
    let bgWisps = [];   // soft background cloud wisps, Clouds theme only
    const terrainCanvas = document.createElement('canvas');
    terrainCanvas.width = W; terrainCanvas.height = H;

    function terrainAt(x) { return terrain[clamp(Math.round(x), 0, W - 1)]; }

    function defaultConfig() {
        return {
            playerCount: 2,
            roundsToWin: 3,
            terrain: 'hills',
            slots: [
                { type: 'human', cpuLevel: 1, color: 0 },
                { type: 'cpu', cpuLevel: 2, color: 1 },
                { type: 'cpu', cpuLevel: 2, color: 2 },
                { type: 'cpu', cpuLevel: 2, color: 3 }
            ],
            weaponCounts: { twin: 1, triple: 1, big: 1, shrapnel: 1, rapidfire: 1, spray: 1, mega: 1, heatseeker: 1 }
        };
    }

    const WEAPON_COUNT_MAX = 2;

    function loadConfig() {
        try {
            const raw = localStorage.getItem(LS.config);
            if (!raw) return defaultConfig();
            const parsed = JSON.parse(raw);
            const cfg = defaultConfig();
            if (parsed.playerCount >= 2 && parsed.playerCount <= 4) cfg.playerCount = parsed.playerCount;
            if (parsed.roundsToWin >= 1 && parsed.roundsToWin <= 5) cfg.roundsToWin = parsed.roundsToWin;
            if (typeof parsed.terrain === 'string') cfg.terrain = parsed.terrain;
            if (parsed.weaponCounts && typeof parsed.weaponCounts === 'object') {
                let any = false;
                for (const key of POWERUP_KEYS) {
                    const n = Math.round(parsed.weaponCounts[key]);
                    if (Number.isFinite(n) && n >= 0 && n <= weaponMax(key)) { cfg.weaponCounts[key] = n; if (n > 0) any = true; }
                }
                if (!any) cfg.weaponCounts = defaultConfig().weaponCounts;
            }
            if (Array.isArray(parsed.slots)) {
                for (let i = 0; i < 4; i++) {
                    if (parsed.slots[i]) Object.assign(cfg.slots[i], parsed.slots[i]);
                    if (!(cfg.slots[i].color >= 0 && cfg.slots[i].color < TANK_COLORS.length)) cfg.slots[i].color = i % TANK_COLORS.length;
                }
            }
            return cfg;
        } catch (e) { return defaultConfig(); }
    }

    state.config = loadConfig();

    // --- Terrain generation --------------------------------------------------

    function midpointDisplace(arr, roughness, amplitude, baseline) {
        const n = arr.length;
        arr[0] = baseline + (Math.random() * 2 - 1) * amplitude * 0.4;
        arr[n - 1] = baseline + (Math.random() * 2 - 1) * amplitude * 0.4;
        let step = n - 1, amp = amplitude;
        while (step > 1) {
            const half = step / 2;
            for (let i = half; i < n - 1; i += step) {
                const avg = (arr[i - half] + arr[i + half]) / 2;
                arr[i] = avg + (Math.random() * 2 - 1) * amp;
            }
            amp *= roughness;
            step = half;
        }
    }

    function smoothHeights(arr) {
        const copy = arr.slice();
        for (let i = 1; i < arr.length - 1; i++) arr[i] = (copy[i - 1] + copy[i] + copy[i + 1]) / 3;
    }

    function applyCanyon() {
        const a = W * 0.28, b = W * 0.38, c = W * 0.62, d = W * 0.72, floor = H - 50;
        for (let x = 0; x < W; x++) {
            if (x >= b && x <= c) terrain[x] = Math.max(terrain[x], floor);
            else if (x > a && x < b) terrain[x] = Math.max(terrain[x], lerp(terrain[x], floor, (x - a) / (b - a)));
            else if (x > c && x < d) terrain[x] = Math.max(terrain[x], lerp(floor, terrain[x], (x - c) / (d - c)));
        }
    }

    // Shared by any theme built from floating platforms over a bottomless
    // void (Sky Island, Clouds, Tree Canopy) — every gap becomes void
    // terrain, which the fall-physics/drive code treats identically no
    // matter which theme it came from. Leftover space is spread into the
    // gaps (which may stretch a little past their authored max) and the
    // cluster is centered, so one side of the map never ends up all void.
    function applyVoidBands(minBands, maxBands, minWidth, maxWidth, minGap, maxGap) {
        const margin = 50, usable = W - margin * 2;
        const count = minBands + Math.floor(Math.random() * (maxBands - minBands + 1));
        const widths = [], gaps = [];
        for (let i = 0; i < count; i++) widths.push(minWidth + Math.random() * (maxWidth - minWidth));
        for (let i = 0; i < count - 1; i++) gaps.push(minGap + Math.random() * (maxGap - minGap));
        let total = widths.reduce((a, b) => a + b, 0) + gaps.reduce((a, b) => a + b, 0);
        while (widths.length > 1 && total > usable) { total -= widths.pop(); total -= gaps.pop(); }
        let extra = Math.max(0, usable - total);
        if (gaps.length) {
            const share = extra / gaps.length;
            for (let i = 0; i < gaps.length; i++) {
                const boost = Math.max(0, Math.min(share, maxGap * 1.6 - gaps[i]));
                gaps[i] += boost; extra -= boost;
            }
        }
        const bands = [];
        let cursor = margin + extra / 2;
        for (let i = 0; i < widths.length; i++) {
            bands.push([cursor, cursor + widths[i]]);
            cursor += widths[i] + (gaps[i] || 0);
        }
        for (let x = 0; x < W; x++) {
            if (!bands.some(([s, e]) => x >= s && x <= e)) terrain[x] = VOID_Y;
        }
    }

    function applySkyIsland() { applyVoidBands(2, 3, 110, 180, 40, 90); }

    // Wider, more forgiving platforms than Sky Island, sculpted to read as
    // puffy cumulus: scalloped rounded tops, tapered ends instead of sheer
    // cliffs, and soft background wisps drifting behind them.
    function applyCloud() {
        applyVoidBands(2, 4, 150, 260, 50, 110);
        let bs = -1;
        for (let x = 0; x <= W; x++) {
            const solid = x < W && terrain[x] < H;
            if (solid) { if (bs < 0) bs = x; }
            else if (bs >= 0) { sculptCloudBand(bs, x - 1); bs = -1; }
        }
        bgWisps = [];
        for (let i = 0; i < 10; i++) {
            bgWisps.push({
                x: Math.random() * W, y: 20 + Math.random() * H * 0.5,
                rx: 30 + Math.random() * 60, ry: 4 + Math.random() * 7,
                a: 0.05 + Math.random() * 0.08
            });
        }
    }

    // Reshapes one cloud platform: gentle smoothing keeps a little drift,
    // a run of semicircular puffs scallops the top, and both ends sink
    // into a rounded shoulder.
    function sculptCloudBand(s, e) {
        const len = e - s + 1;
        if (len < 30) return;
        for (let pass = 0; pass < 6; pass++) {
            for (let x = s + 1; x < e; x++) terrain[x] = (terrain[x - 1] + terrain[x] + terrain[x + 1]) / 3;
        }
        const nPuffs = Math.max(2, Math.round(len / (36 + Math.random() * 14)));
        for (let i = 0; i < nPuffs; i++) {
            const px0 = s + (len * i) / nPuffs, px1 = s + (len * (i + 1)) / nPuffs;
            const cx = (px0 + px1) / 2, hw = (px1 - px0) / 2;
            const amp = 10 + Math.random() * 10;
            for (let x = Math.ceil(px0); x <= Math.min(e, Math.floor(px1)); x++) {
                const t = (x - cx) / hw;
                terrain[x] -= amp * Math.sqrt(Math.max(0, 1 - t * t));
            }
        }
        const T = Math.min(18, Math.floor(len / 4));
        for (let i = 0; i < T; i++) {
            const drop = 30 * Math.pow(1 - i / T, 2);
            terrain[s + i] += drop;
            terrain[e - i] += drop;
        }
        for (let x = s; x <= e; x++) terrain[x] = clamp(terrain[x], 40, H - 30);
    }

    // Narrow, densely-packed treetops with tight gaps — the least forgiving
    // of the void themes. Same solid look as the other battlefields: each
    // platform is sculpted into a rounded leafy crown, drawn as a complete
    // filled shape with no shading tricks.
    function applyCanopy() {
        applyVoidBands(3, 5, 70, 130, 30, 70);
        let bs = -1;
        for (let x = 0; x <= W; x++) {
            const solid = x < W && terrain[x] < H;
            if (solid) { if (bs < 0) bs = x; }
            else if (bs >= 0) { sculptCanopyBand(bs, x - 1); bs = -1; }
        }
    }

    // Reshapes one canopy platform into a treetop: a broad dome silhouette
    // (keeping a touch of the underlying noise so crowns stay irregular)
    // topped with a run of small leafy scallops.
    function sculptCanopyBand(s, e) {
        const len = e - s + 1;
        if (len < 20) return;
        let avg = 0;
        for (let x = s; x <= e; x++) avg += terrain[x];
        avg /= len;
        const cx = (s + e) / 2, hw = len / 2;
        const crown = 30 + Math.random() * 30;
        for (let x = s; x <= e; x++) {
            const t = (x - cx) / hw;
            const domeY = avg + crown * 0.5 - crown * Math.sqrt(Math.max(0, 1 - t * t));
            terrain[x] = domeY + (terrain[x] - avg) * 0.25;
        }
        const nLumps = Math.max(3, Math.round(len / (12 + Math.random() * 8)));
        for (let i = 0; i < nLumps; i++) {
            const px0 = s + (len * i) / nLumps, px1 = s + (len * (i + 1)) / nLumps;
            const lcx = (px0 + px1) / 2, lhw = (px1 - px0) / 2;
            const amp = 5 + Math.random() * 8;
            for (let x = Math.ceil(px0); x <= Math.min(e, Math.floor(px1)); x++) {
                const t = (x - lcx) / lhw;
                terrain[x] -= amp * Math.sqrt(Math.max(0, 1 - t * t));
            }
        }
        for (let x = s; x <= e; x++) terrain[x] = clamp(terrain[x], 40, H - 30);
    }

    // One wide, dominant cone rising out of the rolling base terrain, with an
    // actual carved bowl (not just a decoration) at the summit.
    function applyVolcano() {
        const peakX = W * 0.5 + (Math.random() * 2 - 1) * W * 0.06;
        const peakHeight = 230, peakRadius = 260;
        for (let x = 0; x < W; x++) {
            const d = Math.abs(x - peakX) / peakRadius;
            if (d >= 1) continue;
            const cone = peakHeight * Math.pow(Math.cos(d * Math.PI * 0.5), 1.6);
            terrain[x] = clamp(terrain[x] - cone, 30, H - 30);
        }
        const craterRadius = 46, craterDepth = 70;
        const cx = clamp(Math.round(peakX), 0, W - 1);
        for (let x = Math.max(0, cx - craterRadius); x <= Math.min(W - 1, cx + craterRadius); x++) {
            const d = (x - cx) / craterRadius;
            if (Math.abs(d) > 1) continue;
            terrain[x] += Math.cos(d * Math.PI / 2) * craterDepth;
        }
        state._volcanoPeak = { x: cx, y: terrain[cx] };
    }

    // A handful of round craters pitted into otherwise low, quiet ground.
    function applyMoonscape() {
        const count = 4 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
            const cx = 50 + Math.random() * (W - 100);
            const r = 18 + Math.random() * 26;
            for (let x = Math.max(0, Math.round(cx - r)); x <= Math.min(W - 1, Math.round(cx + r)); x++) {
                const d = (x - cx) / r;
                if (Math.abs(d) > 1) continue;
                terrain[x] += Math.cos(d * Math.PI / 2) * r * 0.55;
            }
        }
        bgStars = [];
        for (let i = 0; i < 40; i++) bgStars.push({ x: Math.random() * W, y: Math.random() * H * 0.6 });
    }

    // Blocky stepped skyline in place of a smooth heightmap.
    function generateCityTerrain() {
        let x = 0;
        while (x < W) {
            const bw = 40 + Math.floor(Math.random() * 55);
            const roofY = clamp(140 + Math.random() * 260, 40, H - 30);
            for (let i = 0; i < bw && x < W; i++, x++) terrain[x] = roofY;
        }
    }

    const THEMES = ['hills', 'beach', 'mountains', 'canyon', 'skyisland', 'cloud', 'canopy', 'volcano', 'moonscape', 'city'];

    function generateTerrain(theme) {
        state._terrainTheme = theme;   // resolved theme (config may say 'random')
        state._volcanoPeak = null;
        bgStars = [];
        bgWisps = [];
        if (theme === 'city') { generateCityTerrain(); return; }

        const size = 1025;
        const heights = new Float32Array(size);
        let roughness, amplitude, baseline, smoothPasses;
        if (theme === 'mountains') { roughness = 0.62; amplitude = 150; baseline = H * 0.5; smoothPasses = 1; }
        else if (theme === 'canyon') { roughness = 0.5; amplitude = 90; baseline = H * 0.45; smoothPasses = 2; }
        else if (theme === 'skyisland') { roughness = 0.6; amplitude = 140; baseline = H * 0.45; smoothPasses = 1; }
        else if (theme === 'cloud') { roughness = 0.55; amplitude = 90; baseline = H * 0.38; smoothPasses = 2; }
        else if (theme === 'canopy') { roughness = 0.68; amplitude = 110; baseline = H * 0.42; smoothPasses = 0; }
        else if (theme === 'volcano') { roughness = 0.5; amplitude = 20; baseline = H * 0.68; smoothPasses = 2; }
        else if (theme === 'moonscape') { roughness = 0.4; amplitude = 16; baseline = H * 0.68; smoothPasses = 3; }
        else if (theme === 'beach') { roughness = 0.4; amplitude = 40; baseline = H * 0.72; smoothPasses = 4; }
        else { roughness = 0.45; amplitude = 70; baseline = H * 0.55; smoothPasses = 3; }
        midpointDisplace(heights, roughness, amplitude, baseline);
        for (let s = 0; s < smoothPasses; s++) smoothHeights(heights);
        for (let x = 0; x < W; x++) {
            const idx = Math.min(size - 1, Math.floor((x / (W - 1)) * (size - 1)));
            terrain[x] = clamp(heights[idx], 40, H - 30);
        }
        if (theme === 'canyon') applyCanyon();
        if (theme === 'skyisland') applySkyIsland();
        if (theme === 'cloud') applyCloud();
        if (theme === 'canopy') applyCanopy();
        if (theme === 'volcano') applyVolcano();
        if (theme === 'moonscape') applyMoonscape();
    }

    // Ground stays green-phosphor for the original four battlefields; every
    // theme added since gets its own accent so it reads as a distinct place.
    function terrainColor() {
        // Prefer the resolved per-round theme so RANDOM rounds get the right
        // accent colors instead of defaulting to green.
        const t = state._terrainTheme || (state.config ? state.config.terrain : 'hills');
        if (t === 'volcano') return { mid: '#3a1c0c', bright: '#ff8a3d' };
        if (t === 'moonscape') return { mid: '#23282e', bright: '#cfd8e2' };
        if (t === 'city') return { mid: '#141c26', bright: '#8fb3d9' };
        if (t === 'beach') return { mid: '#8a6a2e', bright: '#f2d383' };
        if (t === 'cloud') return { mid: '#3c4a63', bright: '#eef3fa' };
        if (t === 'canopy') return { mid: '#234d1a', bright: '#a6e35a' };
        return { mid: GREEN_MID, bright: GREEN_BRIGHT };
    }

    function bakeTerrain() {
        const g = terrainCanvas.getContext('2d');
        g.clearRect(0, 0, W, H);
        const tc = terrainColor();
        if (bgStars.length) {
            g.fillStyle = 'rgba(255,255,255,0.8)';
            for (const s of bgStars) g.fillRect(s.x, s.y, 1, 1);
        }
        for (const wsp of bgWisps) {
            g.fillStyle = 'rgba(238,243,250,' + wsp.a + ')';
            g.beginPath(); g.ellipse(wsp.x, wsp.y, wsp.rx, wsp.ry, 0, 0, Math.PI * 2); g.fill();
        }
        g.fillStyle = tc.mid;
        for (let x = 0; x < W; x++) {
            const y = terrain[x];
            if (y >= H) continue;
            g.fillRect(x, y, 1, H - y);
        }
        g.save();
        g.globalCompositeOperation = 'source-atop';
        g.fillStyle = 'rgba(0,0,0,0.28)';
        for (let y = 0; y < H; y += 3) g.fillRect(0, y, W, 1);
        g.restore();
        // Clouds get a consistent floating thickness: each column dissolves
        // into the sky ~45-125px below its own top edge instead of standing
        // on a pillar. Purely visual — the full column is still solid to
        // shells and tanks.
        if (state._terrainTheme === 'cloud') {
            g.save();
            g.globalCompositeOperation = 'destination-out';
            for (let x = 0; x < W; x++) {
                const top = terrain[x];
                if (top >= H) continue;
                const fadeTop = top + 45;
                const grad = g.createLinearGradient(0, fadeTop, 0, top + 125);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, 'rgba(0,0,0,1)');
                g.fillStyle = grad;
                g.fillRect(x, fadeTop, 1, H - fadeTop);
            }
            g.restore();
        }
        g.strokeStyle = tc.bright;
        g.lineWidth = 1.5;
        g.beginPath();
        let started = false;
        for (let x = 0; x < W; x++) {
            if (terrain[x] >= H) { started = false; continue; }
            if (!started) { g.moveTo(x, terrain[x]); started = true; }
            else g.lineTo(x, terrain[x]);
        }
        g.stroke();
        if (state._volcanoPeak) {
            const { x, y } = state._volcanoPeak;
            const grad = g.createRadialGradient(x, y, 1, x, y, 20);
            grad.addColorStop(0, 'rgba(255,220,120,0.9)');
            grad.addColorStop(1, 'rgba(255,80,20,0)');
            g.fillStyle = grad;
            g.beginPath(); g.arc(x, y, 20, 0, Math.PI * 2); g.fill();
        }
    }

    function carveTerrain(cx, cy, r) {
        const x0 = Math.max(0, Math.floor(cx - r)), x1 = Math.min(W - 1, Math.ceil(cx + r));
        for (let x = x0; x <= x1; x++) {
            const dx = x - cx, disc = r * r - dx * dx;
            if (disc < 0) continue;
            const bottom = cy + Math.sqrt(disc);
            if (terrain[x] < bottom) terrain[x] = bottom;
            if (terrain[x] < H + 100) terrain[x] = Math.min(terrain[x], H);
        }
        bakeTerrain();
    }

    // --- Tanks -----------------------------------------------------------------

    function buildPlayers(cfg) {
        state.players = [];
        for (let i = 0; i < cfg.playerCount; i++) {
            state.players.push({
                idx: i, x: 0, y: 0, vy: 0, airborneStartY: null, spawnX: 0,
                hp: 100, alive: true, deathProcessed: false,
                angle: 55, inventory: { twin: 0, triple: 0, big: 0, shrapnel: 0, rapidfire: 0, spray: 0, mega: 0, heatseeker: 0 },
                selected: 'standard',
                energy: ENERGY_MAX, shieldActive: false, shields: SHIELD_START, lastCharge: null
            });
        }
        state.scores = new Array(cfg.playerCount).fill(0);
        renderHealthHUD();
    }

    // Solid ground is a hard requirement (a void spawn would insta-kill the
    // tank at round start); tank-to-tank spacing relaxes progressively when
    // the map can't satisfy it — e.g. 4 players on Tree Canopy's narrow
    // crowns, where 110px apart is sometimes impossible.
    function computeSpawnXs(n) {
        const margin = 70, usable = W - 2 * margin;
        const xs = [];
        for (let i = 0; i < n; i++) {
            const target = Math.round(margin + (n === 1 ? usable / 2 : usable * i / (n - 1)));
            let x = null;
            for (const minDist of [110, 60, 30, 0]) {
                for (let tries = 0; tries <= 300 && x == null; tries++) {
                    const dir = tries % 2 === 0 ? 1 : -1;
                    const cand = clamp(target + dir * Math.ceil(tries / 2) * 3, margin, W - margin);
                    if (terrain[cand] < H - 20 && !xs.some(o => Math.abs(o - cand) < minDist)) x = cand;
                }
                if (x != null) break;
            }
            xs.push(x != null ? x : clamp(target, margin, W - margin));
        }
        return xs;
    }

    function isCPU(p) { return state.config.slots[p.idx].type === 'cpu'; }
    function cpuLevelOf(p) { return state.config.slots[p.idx].cpuLevel || 1; }
    function currentPlayer() { return state.players[state.currentIdx]; }
    function countAlive() { return state.players.filter(p => p.alive).length; }
    function nameOf(p) { return 'P' + (p.idx + 1); }

    function pointInTank(x, y, t) {
        return x >= t.x - TANK_W / 2 - 2 && x <= t.x + TANK_W / 2 + 2 &&
               y >= t.y - TANK_H - 8 && y <= t.y + 2;
    }
    function pointInCrate(x, y, c) {
        return x >= c.x - 7 && x <= c.x + 7 && y >= c.y - 7 && y <= c.y + 7;
    }

    // --- Sound (WebAudio, generated) --------------------------------------------

    let audioCtx = null, noiseBuffer = null;
    function ensureAudio() {
        if (!audioCtx) {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return;
            audioCtx = new AC();
            noiseBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.12), audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, dur, type, vol, slideTo, when) {
        if (muted || !audioCtx) return;
        const t0 = audioCtx.currentTime + (when || 0);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type || 'square';
        osc.frequency.setValueAtTime(freq, t0);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
        gain.gain.setValueAtTime(vol || 0.12, t0);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.02);
    }

    function crunch() {
        if (muted || !audioCtx || !noiseBuffer) return;
        const t0 = audioCtx.currentTime;
        const src = audioCtx.createBufferSource();
        src.buffer = noiseBuffer;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 900;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.22, t0);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);
        src.connect(bp).connect(gain).connect(audioCtx.destination);
        src.start(t0);
    }

    const sfx = {
        select: () => tone(660, 0.05, 'square', 0.04),
        deny: () => tone(110, 0.08, 'square', 0.05),
        charge: (c) => tone(150 + c * 500, 0.05, 'sawtooth', 0.04),
        fire: () => { tone(300, 0.1, 'square', 0.08, 90); crunch(); },
        boom: (r) => { crunch(); tone(70, 0.25 + r / 120, 'sine', 0.12, 35); },
        crate: () => { tone(523, 0.06, 'square', 0.05); tone(784, 0.08, 'square', 0.05, undefined, 0.06); },
        perfect: () => [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.08, 'square', 0.05, undefined, i * 0.07)),
        tankDie: () => { crunch(); tone(180, 0.4, 'sawtooth', 0.09, 30); },
        roundWin: () => [392, 523, 659, 784].forEach((f, i) => tone(f, 0.1, 'square', 0.06, undefined, i * 0.1)),
        fanfare: () => [523, 523, 659, 784, 1047, 784, 1047].forEach((f, i) => tone(f, 0.12, 'square', 0.06, undefined, i * 0.09)),
        drive: () => tone(70, 0.05, 'square', 0.02),
        shieldUp: () => { tone(400, 0.08, 'sine', 0.06, 950); tone(750, 0.1, 'sine', 0.05, 1250, 0.05); },
        shieldPop: () => { tone(950, 0.12, 'sine', 0.08, 260); crunch(); },
        voidFall: () => { tone(500, 0.35, 'sine', 0.08, 90); crunch(); }
    };

    // --- Particles ---------------------------------------------------------------

    function spawnParticles(x, y, n) {
        for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const sp = 40 + Math.random() * 140;
            state.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: 0.5, maxLife: 0.5, size: 1 + Math.random() * 1.5, type: 'dot' });
        }
        state.particles.push({ x, y, vx: 0, vy: 0, life: 0.3, maxLife: 0.3, size: 4, type: 'ring' });
    }

    function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i--) {
            const p = state.particles[i];
            p.life -= dt;
            if (p.life <= 0) { state.particles.splice(i, 1); continue; }
            if (p.type === 'dot') { p.vy += 260 * dt; p.x += p.vx * dt; p.y += p.vy * dt; }
        }
    }

    function drawParticles() {
        for (const p of state.particles) {
            const a = p.life / p.maxLife;
            ctx.globalAlpha = a;
            if (p.type === 'ring') {
                ctx.strokeStyle = GREEN_BRIGHT; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (1 + 3 * (1 - a)), 0, Math.PI * 2); ctx.stroke();
            } else {
                ctx.fillStyle = GREEN_BRIGHT;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
        }
        ctx.globalAlpha = 1;
    }

    // --- Explosions / damage ------------------------------------------------------

    // Applies damage to a tank, but a raised shield absorbs the whole hit
    // once and then pops (one shield use per round). Returns true if the
    // shield ate it.
    function applyDamage(t, dmg) {
        if (t.shieldActive) {
            t.shieldActive = false;
            spawnParticles(t.x, t.y - TANK_H / 2, 10);
            sfx.shieldPop();
            return true;
        }
        t.hp = Math.max(0, t.hp - dmg);
        return false;
    }

    function explode(x, y, weaponKeyOrSpec, ownerIdx) {
        const spec = typeof weaponKeyOrSpec === 'string' ? WEAPONS[weaponKeyOrSpec] : weaponKeyOrSpec;
        const scale = blastScale();
        const carveR = spec.carveR * scale;
        const innerR = spec.dmgR * scale;      // full-damage core (also carves terrain)
        const outerR = innerR * OUTER_MULT;    // wider, lighter-damage ring
        carveTerrain(x, y, carveR);
        for (const t of state.players) {
            if (!t.alive) continue;
            const d = dist(t.x, t.y - TANK_H / 2, x, y);
            let dmg = 0;
            if (d <= innerR) dmg = spec.dmg * (1 - 0.35 * (d / innerR));                          // big hit, mild falloff
            else if (d <= outerR) dmg = spec.dmg * OUTER_FACTOR * (1 - (d - innerR) / (outerR - innerR)); // small hit
            if (dmg > 0) applyDamage(t, dmg);
        }
        // A blast landing near a crate cracks it open, awarding the shooter —
        // a direct fly-through hit is not required (that hitbox is a thin
        // 14px box a fast shell can arc over between substeps). Skipped for
        // tank-death blasts (ownerIdx < 0), which have no shooter to credit.
        if (ownerIdx != null && ownerIdx >= 0) {
            const splash = carveR + 10;
            for (let ci = state.crates.length - 1; ci >= 0; ci--) {
                const c = state.crates[ci];
                if (dist(c.x, c.y, x, y) <= splash) {
                    state.pendingAwards.push({ type: 'crate', playerIdx: ownerIdx, weaponType: c.type });
                    spawnParticles(c.x, c.y, 6);
                    state.crates.splice(ci, 1);
                }
            }
        }
        spawnParticles(x, y, Math.min(20, Math.round(8 + carveR / 5)));
        // second faint ring shows the lighter outer damage radius
        state.particles.push({ x, y, vx: 0, vy: 0, life: 0.3, maxLife: 0.3, size: outerR * 0.6, type: 'ring' });
        sfx.boom(carveR);
        // SHRAPNEL bursts throw a fan of fragment shells (which do not recurse).
        if (spec.shrapnel) spawnShrapnel(x, y, spec.shrapnel, ownerIdx);
    }

    // Fan of secondary shells thrown upward/outward from a shrapnel burst.
    function spawnShrapnel(x, y, count, ownerIdx) {
        for (let i = 0; i < count; i++) {
            const ang = (20 + Math.random() * 140) * Math.PI / 180;   // upward hemisphere
            const speed = 130 + Math.random() * 140;
            state.shells.push({
                x, y: y - 3, vx: Math.cos(ang) * speed, vy: -Math.sin(ang) * speed,
                weapon: 'shrapnelFrag', ownerIdx, age: 0, trail: [], isFragment: true
            });
        }
    }

    // --- Shells ------------------------------------------------------------------

    function fire() {
        const p = currentPlayer();
        const spec = WEAPONS[p.selected];
        const speed = 120 + state.charge * 480;
        p.lastCharge = state.charge;    // remembered for the power-meter reference marker
        const pivotY = p.y - TANK_H;    // turret pivot sits at the top of the hull
        for (const off of spec.shots) {
            const rad = (p.angle + off) * Math.PI / 180;
            // Spawn from the muzzle tip so near-horizontal shots clear the
            // hull, and a straight-down shot detonates just under the tank —
            // letting a player deliberately dig a pit beneath themselves.
            const sx = p.x + Math.cos(rad) * BARREL_LEN;
            const sy = pivotY - Math.sin(rad) * BARREL_LEN;
            state.shells.push({ x: sx, y: sy, vx: Math.cos(rad) * speed, vy: -Math.sin(rad) * speed, weapon: p.selected, ownerIdx: p.idx, age: 0, trail: [] });
        }
        if (p.selected !== 'standard') p.inventory[p.selected] = Math.max(0, p.inventory[p.selected] - 1);
        if (spec.burst) {
            // Lock in this shot's angle/power and auto-fire the rest of the
            // burst on a timer — no further input from the player.
            state.rapidFire = { ownerIdx: p.idx, shotsLeft: RAPID_FIRE_SHOTS - 1, timer: RAPID_FIRE_INTERVAL, angle: p.angle, charge: state.charge };
        }
        p.selected = 'standard';
        state.charging = false; state.charge = 0;
        state.cpu = null;
        sfx.fire();
        setPhase('flight');
    }

    // Fires one shot of an in-progress Rapid Fire burst at the angle/power
    // the burst was activated with.
    function spawnBurstShot(rf) {
        const p = state.players[rf.ownerIdx];
        if (!p || !p.alive) return;
        // Jitter each auto-fired shot's angle/power a little so the burst
        // sprays across an area instead of stacking on one exact spot.
        const angle = rf.angle + (Math.random() * 2 - 1) * RAPID_FIRE_ANGLE_JITTER;
        const charge = clamp(rf.charge + (Math.random() * 2 - 1) * RAPID_FIRE_CHARGE_JITTER, 0.05, 1);
        const speed = 120 + charge * 480;
        const rad = angle * Math.PI / 180;
        const pivotY = p.y - TANK_H;
        const sx = p.x + Math.cos(rad) * BARREL_LEN;
        const sy = pivotY - Math.sin(rad) * BARREL_LEN;
        state.shells.push({ x: sx, y: sy, vx: Math.cos(rad) * speed, vy: -Math.sin(rad) * speed, weapon: 'rapidfire', ownerIdx: rf.ownerIdx, age: 0, trail: [] });
        sfx.fire();
    }

    function handleShellImpact(shell, x, y, hitTank) {
        state._lastImpact = { x, y, weapon: shell.weapon, ownerIdx: shell.ownerIdx, hitTankIdx: hitTank ? hitTank.idx : null };
        explode(x, y, shell.weapon, shell.ownerIdx);
        if (hitTank && shell.weapon === 'standard' && hitTank.idx !== shell.ownerIdx) {
            state.pendingAwards.push({ type: 'perfect', playerIdx: shell.ownerIdx });
        }
    }

    function updateFlight(dt) {
        if (state.rapidFire) {
            const rf = state.rapidFire;
            rf.timer -= dt;
            while (rf.timer <= 0 && rf.shotsLeft > 0) {
                spawnBurstShot(rf);
                rf.shotsLeft--;
                rf.timer += RAPID_FIRE_INTERVAL;
            }
            if (rf.shotsLeft <= 0) state.rapidFire = null;
        }
        const sdt = FLIGHT_SUBSTEP_DT;
        const steps = Math.max(1, Math.round(dt / sdt));
        for (let i = state.shells.length - 1; i >= 0; i--) {
            const s = state.shells[i];
            let removed = false;
            for (let k = 0; k < steps && !removed; k++) {
                s.vx += state.wind * sdt;
                s.vy += GRAVITY * sdt;

                if (WEAPONS[s.weapon].homing) {
                    let target = null, bestD = HEATSEEKER_RADIUS;
                    for (const t of state.players) {
                        if (!t.alive || t.idx === s.ownerIdx) continue;
                        const d = dist(s.x, s.y, t.x, t.y - TANK_H / 2);
                        if (d < bestD) { bestD = d; target = t; }
                    }
                    if (target) {
                        const speed = Math.hypot(s.vx, s.vy);
                        const dx = target.x - s.x, dy = (target.y - TANK_H / 2) - s.y;
                        const len = Math.hypot(dx, dy) || 1;
                        s.vx = (dx / len) * speed;
                        s.vy = (dy / len) * speed;
                    }
                }

                s.x += s.vx * sdt;
                s.y += s.vy * sdt;
                s.age += sdt;
                s.trail.push({ x: s.x, y: s.y });
                if (s.trail.length > 12) s.trail.shift();

                for (const t of state.players) {
                    if (!t.alive) continue;
                    if (t.idx === s.ownerIdx && s.age < 0.15) continue;
                    if (pointInTank(s.x, s.y, t)) { handleShellImpact(s, s.x, s.y, t); removed = true; break; }
                }
                if (removed) break;

                for (let ci = state.crates.length - 1; ci >= 0; ci--) {
                    const c = state.crates[ci];
                    if (pointInCrate(s.x, s.y, c)) {
                        state.pendingAwards.push({ type: 'crate', playerIdx: s.ownerIdx, weaponType: c.type });
                        state.crates.splice(ci, 1);
                        // A direct hit still detonates the shell — terrain
                        // carve, tank damage, and effects — it doesn't just
                        // vanish into the crate.
                        handleShellImpact(s, s.x, s.y, null);
                        removed = true; break;
                    }
                }
                if (removed) break;

                if (s.y >= terrainAt(s.x)) { handleShellImpact(s, s.x, s.y, null); removed = true; break; }
                if (s.x < -BOUNDS_MARGIN || s.x > W + BOUNDS_MARGIN || s.y > H + 50) { removed = true; break; }
            }
            if (removed) state.shells.splice(i, 1);
        }
        if (state.shells.length === 0 && !state.rapidFire) setPhase('resolving');
    }

    function simulateShell(x0, y0, angleDeg, charge, wind, ownerIdx) {
        // Uses the same step size as the real flight substep (updateFlight)
        // so a "solved" shot actually reproduces its predicted landing when
        // fired for real — a coarser dry-run step would drift from the real
        // trajectory over a couple seconds of flight and miss by more than
        // a tank's width. Must also skip the owner's own tank for the same
        // ~0.15s grace period as the real flight: without it, every dry-run
        // shot "hits" the shooter's own hitbox at the muzzle on step one,
        // making every candidate angle/charge score identically (garbage).
        const speed = 120 + charge * 480, rad = angleDeg * Math.PI / 180;
        let vx = Math.cos(rad) * speed, vy = -Math.sin(rad) * speed, x = x0, y = y0, t = 0;
        const sdt = FLIGHT_SUBSTEP_DT;
        while (t < 8) {
            vx += wind * sdt; vy += GRAVITY * sdt; x += vx * sdt; y += vy * sdt; t += sdt;
            for (const tk of state.players) {
                if (!tk.alive) continue;
                if (tk.idx === ownerIdx && t < 0.15) continue;
                if (pointInTank(x, y, tk)) return { x, y, hitIdx: tk.idx };
            }
            if (y >= terrainAt(x)) return { x, y, hitIdx: null };
            if (x < -BOUNDS_MARGIN || x > W + BOUNDS_MARGIN || y > H + 50) return { x, y, hitIdx: null };
        }
        return { x, y, hitIdx: null };
    }

    // --- CPU AI --------------------------------------------------------------------

    function pickTarget(p, level) {
        const enemies = state.players.filter(t => t.alive && t.idx !== p.idx);
        if (state.crates.length && Math.random() < 0.2) {
            return state.crates[Math.floor(Math.random() * state.crates.length)];
        }
        if (level >= 3) return enemies.reduce((a, b) => (b.hp < a.hp ? b : a), enemies[0]);
        return enemies.reduce((a, b) => (Math.abs(b.x - p.x) < Math.abs(a.x - p.x) ? b : a), enemies[0]);
    }

    function pickWeapon(p, level, target, missDist) {
        if (level <= 1) return 'standard';
        const has = k => p.inventory[k] > 0;
        const targetHp = target.hp != null ? target.hp : 999;
        if (has('heatseeker') && Math.random() < 0.5) return 'heatseeker';
        if (has('mega') && targetHp <= 90) return 'mega';
        if (has('rapidfire') && Math.random() < 0.6) return 'rapidfire';
        if (has('big') && targetHp <= 50) return 'big';
        if (has('shrapnel') && missDist > 30 && Math.random() < 0.4) return 'shrapnel';
        if (has('spray') && missDist > 30 && Math.random() < 0.4) return 'spray';
        if ((has('twin') || has('triple')) && missDist > 40) return has('triple') ? 'triple' : 'twin';
        return 'standard';
    }

    function solveShot(p, level) {
        const target = pickTarget(p, level);
        const dir = target.x >= p.x ? 1 : -1;
        const angleRange = dir > 0 ? [15, 85] : [95, 165];
        let best = null;
        for (let a = angleRange[0]; a <= angleRange[1]; a += 5) {
            for (let c = 0.25; c <= 1; c += 0.1) {
                const res = simulateShell(p.x, p.y - TANK_H * 0.7, a, c, state.wind, p.idx);
                const d = dist(res.x, res.y, target.x, target.y);
                if (!best || d < best.d) best = { a, c, d };
            }
        }
        const refinements = level === 1 ? 0 : level === 2 ? 2 : 5;
        for (let r = 0; r < refinements; r++) {
            const span = 6 / (r + 1);
            for (let da = -span; da <= span; da += span / 2 || 1) {
                for (let dc = -0.05; dc <= 0.05; dc += 0.025) {
                    // Clamped to angleRange (not the full [5,175]) so refinement
                    // can't wander into the opposite-direction hemisphere and
                    // "solve" a degenerate near-flat shot that only looks good
                    // by raw landing-distance, not by being a sane trajectory.
                    const a = clamp(best.a + da, angleRange[0], angleRange[1]), c = clamp(best.c + dc, 0.05, 1);
                    const res = simulateShell(p.x, p.y - TANK_H * 0.7, a, c, state.wind, p.idx);
                    const d = dist(res.x, res.y, target.x, target.y);
                    if (d < best.d) best = { a, c, d };
                }
            }
        }
        const noiseAngle = level === 1 ? 12 : level === 2 ? 4 : 1.5;
        const noiseCharge = level === 1 ? 0.16 : level === 2 ? 0.06 : 0.02;
        const angle = clamp(best.a + (Math.random() * 2 - 1) * noiseAngle, angleRange[0], angleRange[1]);
        const charge = clamp(best.c + (Math.random() * 2 - 1) * noiseCharge, 0.05, 1);
        const weapon = pickWeapon(p, level, target, best.d);
        return { angle, power: charge, weapon };
    }

    function updateCPUAiming(dt) {
        let c = state.cpu;
        const p = currentPlayer();
        if (!c) { c = state.cpu = { stage: 'pause', t: 0, sol: null, startAngle: p.angle }; }
        c.t += dt;
        if (c.stage === 'pause') {
            if (c.t >= 0.5) {
                c.sol = solveShot(p, cpuLevelOf(p));
                c.startAngle = p.angle; c.stage = 'sweep'; c.t = 0;
                p.selected = c.sol.weapon;
            }
        } else if (c.stage === 'sweep') {
            const f = Math.min(1, c.t / 0.6);
            p.angle = lerp(c.startAngle, c.sol.angle, f);
            if (f >= 1) {
                p.angle = c.sol.angle;
                c.stage = 'charge'; c.t = 0;
                state.charging = true; state.charge = 0; state.chargeDir = 1;
                setPhase('charging');
            }
        }
    }

    function checkCPURelease() {
        const c = state.cpu;
        if (!c || c.stage !== 'charge') return;
        if ((state.chargeDir === 1 && state.charge >= c.sol.power) || (state.chargeDir === -1 && state.charge <= c.sol.power)) {
            fire();
        }
    }

    // --- Turn state machine -------------------------------------------------------

    function setPhase(p) {
        state.phase = p;
        if (p === 'resolving') { /* per-frame handling */ }
        else if (p === 'awarding') { processAwards(); }
        else if (p === 'turnEnd') { processTurnEnd(); }
        else if (p === 'roundEnd') { processRoundEnd(); }
    }

    function processAwards() {
        for (const a of state.pendingAwards) {
            const player = state.players[a.playerIdx];
            if (!player) continue;
            if (a.type === 'perfect') {
                const pool = activePowerupKeys();
                const key = pool[Math.floor(Math.random() * pool.length)];
                player.inventory[key]++;
                showBanner('PERFECT SHOT! ' + nameOf(player) + ' +' + WEAPONS[key].name, 1.6);
                sfx.perfect();
            } else if (a.type === 'crate') {
                player.inventory[a.weaponType]++;
                showBanner(nameOf(player) + ' FOUND ' + WEAPONS[a.weaponType].name, 1.4);
                sfx.crate();
            }
        }
        state.pendingAwards = [];
        setPhase('turnEnd');
    }

    function processTurnEnd() {
        if (countAlive() <= 1) { setPhase('roundEnd'); return; }
        advanceTurn();
        rollWind();
        maybeSpawnCrate();
        state.cpu = null;
        state.phase = 'aiming';
        renderInventory();
        const p = currentPlayer();
        showBanner((isCPU(p) ? nameOf(p) + ' (CPU)' : nameOf(p)) + ' — YOUR TURN', 1.0);
    }

    function advanceTurn() {
        let i = state.currentIdx;
        for (let k = 0; k < state.players.length; k++) {
            i = (i + 1) % state.players.length;
            if (state.players[i].alive) { state.currentIdx = i; return; }
        }
    }

    const WIND_MAX = 25;
    function rollWind() { state.wind = (Math.random() * 2 - 1) * WIND_MAX; }

    function randomPowerupKey() { const pool = activePowerupKeys(); return pool[Math.floor(Math.random() * pool.length)]; }

    function maybeSpawnCrate() {
        if (state.crates.length >= 2 || Math.random() >= 0.35) return;
        for (let tries = 0; tries < 40; tries++) {
            const x = 40 + Math.random() * (W - 80);
            if (terrainAt(x) >= H - 10) continue;
            const tooCloseToTank = state.players.some(t => t.alive && Math.abs(t.x - x) < 90);
            const tooCloseToCrate = state.crates.some(c => Math.abs(c.x - x) < 40);
            if (tooCloseToTank || tooCloseToCrate) continue;
            state.crates.push({ x, y: terrainAt(x) - 7, type: randomPowerupKey() });
            return;
        }
    }

    function grantRoundStart() {
        // Each player starts a round with the setup screen's configured
        // quantity of each special weapon.
        for (const p of state.players) {
            for (const key of POWERUP_KEYS) p.inventory[key] = state.config.weaponCounts[key] || 0;
        }
    }

    function processRoundEnd() {
        const winner = state.players.find(p => p.alive);
        const winnerIdx = winner ? winner.idx : state.currentIdx;
        state.scores[winnerIdx]++;
        showBanner(nameOf({ idx: winnerIdx }) + ' WINS ROUND ' + state.round + '!', 2.0);
        sfx.roundWin();
        if (state.scores[winnerIdx] >= state.config.roundsToWin) {
            state._matchTimer = 1.6;
        } else {
            state.round++;
            state._roundEndTimer = 2.2;
        }
    }

    function pickTerrainTheme() {
        return state.config.terrain === 'random' ? THEMES[Math.floor(Math.random() * THEMES.length)] : state.config.terrain;
    }

    function startRound() {
        generateTerrain(pickTerrainTheme());
        bakeTerrain();
        const xs = computeSpawnXs(state.players.length);
        state.players.forEach((p, i) => {
            p.hp = 100; p.alive = true; p.deathProcessed = false;
            p.x = xs[i]; p.y = terrainAt(xs[i]); p.vy = 0; p.airborneStartY = null; p.spawnX = xs[i];
            p.inventory = { twin: 0, triple: 0, big: 0, shrapnel: 0, rapidfire: 0, spray: 0, mega: 0, heatseeker: 0 };
            p.selected = 'standard';
            p.angle = xs[i] < W / 2 ? 55 : 125;
            p.energy = ENERGY_MAX; p.shieldActive = false; p.shields = SHIELD_START; p.lastCharge = null;
        });
        grantRoundStart();
        state.shells = []; state.particles = []; state.crates = []; state.rapidFire = null;
        rollWind();
        state.currentIdx = state.players.findIndex(p => p.alive);
        state.cpu = null;
        state.matchStarted = true;
        setPhase('aiming');
        renderInventory();
        showBanner('ROUND ' + state.round, 1.2);
    }

    // Applies tank gravity/fall-damage/void-death for every tank whose ground
    // may have shifted. Called unconditionally every frame (see update()) so
    // a tank starts dropping the instant a shot craters the earth beneath it
    // — even mid-burst, before the rest of a volley resolves — or the instant
    // it drives off a ledge into a void.
    function updateTankPhysics(dt) {
        let anyAirborne = false, anyPendingDeath = false;
        for (const t of state.players) {
            if (!t.alive) continue;
            const groundY = terrainAt(t.x);
            if (t.y < groundY - 0.5) {
                if (t.airborneStartY == null) t.airborneStartY = t.y;
                t.vy = (t.vy || 0) + GRAVITY * dt;
                t.y += t.vy * dt;
                if (t.y >= groundY) {
                    const fallDist = groundY - t.airborneStartY;
                    t.y = groundY; t.vy = 0;
                    const dmg = Math.max(0, (fallDist - 40) * 0.5);
                    if (dmg > 0) t.hp = Math.max(0, t.hp - dmg);
                    t.airborneStartY = null;
                } else anyAirborne = true;
            } else if (t.y > groundY + 0.5) {
                t.y = groundY; t.vy = 0; t.airborneStartY = null;
            } else { t.vy = 0; t.airborneStartY = null; }
            if (t.y > H + 20) {
                // Bottomless void: reset to the round-start spot instead of an
                // instant kill, with a flat health penalty. A tank already low
                // on health can still die from this — that plays out below.
                t.x = t.spawnX;
                t.y = terrainAt(t.spawnX);
                t.vy = 0; t.airborneStartY = null;
                t.hp = Math.max(0, t.hp - VOID_FALL_DAMAGE);
                showBanner(nameOf(t) + ' FELL INTO THE ABYSS! -' + VOID_FALL_DAMAGE, 1.2);
                sfx.voidFall();
            }
        }
        for (const t of state.players) {
            if (t.alive && t.hp <= 0 && !t.deathProcessed) {
                t.deathProcessed = true; t.alive = false;
                explode(t.x, Math.min(t.y, H + 20) - TANK_H * 0.5, TANKBLAST, -1);
                sfx.tankDie();
                anyPendingDeath = true;
            }
        }
        return { anyAirborne, anyPendingDeath };
    }

    // --- Input -----------------------------------------------------------------

    const input = { left: false, right: false, fineUp: false, fineDown: false, driveLeft: false, driveRight: false };

    function updateHumanAiming(dt) {
        const p = currentPlayer();
        if (input.left) p.angle += ANGLE_SPEED * dt;
        if (input.right) p.angle -= ANGLE_SPEED * dt;
        if (input.fineUp) p.angle += FINE_SPEED * dt;
        if (input.fineDown) p.angle -= FINE_SPEED * dt;
        // Full 360° aiming (wrap, no clamp) so a tank can point straight down
        // and dig a pit under itself.
        p.angle = ((p.angle % 360) + 360) % 360;
        if (input.driveLeft) driveTank(p, -1, dt);
        if (input.driveRight) driveTank(p, 1, dt);
    }

    // Drive a tank along the terrain, spending its per-round energy budget.
    // Uphill costs more (never impossible); driving into another tank is
    // blocked; when energy runs out the treads give up. Driving onto a void
    // column (Sky Island's gaps) is allowed — the tank steps off the ledge
    // and gravity (updateTankPhysics, run every phase) carries it into a real
    // fall rather than snapping it straight down.
    function driveTank(p, dir, dt) {
        if (p.energy <= 0) return;
        const nx = clamp(p.x + dir * MOVE_SPEED * dt, 20, W - 20);
        if (Math.abs(nx - p.x) < 0.01) return;
        for (const o of state.players) if (o !== p && o.alive && Math.abs(o.x - nx) < TANK_W) return;
        const overVoid = terrainAt(nx) >= H - 6;
        const climb = overVoid ? 0 : Math.max(0, terrainAt(p.x) - terrainAt(nx)); // uphill = ground rises (smaller y)
        const cost = (Math.abs(nx - p.x) + climb * STEEP_SURCHARGE) * ENERGY_PER_PX;
        p.energy = Math.max(0, p.energy - cost);
        p.x = nx;
        if (!overVoid) p.y = terrainAt(nx);
        state._driveSndAcc = (state._driveSndAcc || 0) + dt;
        if (state._driveSndAcc > 0.09) { state._driveSndAcc = 0; sfx.drive(); }
    }

    function activateShield() {
        if (state.phase !== 'aiming') return;
        const p = currentPlayer();
        if (isCPU(p) || p.shields <= 0 || p.shieldActive) { sfx.deny(); return; }
        p.shieldActive = true; p.shields--;
        showBanner(nameOf(p) + ' SHIELD UP', 1.0);
        sfx.shieldUp();
    }

    function startCharge() {
        if (state.phase !== 'aiming' || isCPU(currentPlayer())) return;
        state.charging = true; state.charge = 0; state.chargeDir = 1;
        setPhase('charging');
    }
    function releaseCharge() {
        if (state.phase !== 'charging' || isCPU(currentPlayer())) return;
        fire();
    }

    function selectWeaponByKey(k) {
        const map = { '1': 'standard', '2': 'twin', '3': 'triple', '4': 'big', '5': 'shrapnel', '6': 'rapidfire', '7': 'spray', '8': 'mega', '9': 'heatseeker' };
        const key = map[k];
        if (!key || state.phase !== 'aiming') return;
        const p = currentPlayer();
        if (isCPU(p)) return;
        if (key !== 'standard' && !(p.inventory[key] > 0)) return;
        p.selected = key;
        sfx.select();
        renderInventory();
    }

    function handleEscape() {
        if (weaponIlloEl.classList.contains('open')) { closeWeaponIllo(); return; }
        // The setup panel is this game's start screen. ESC from it → arcade;
        // ESC during a match → back to the setup screen.
        if (document.getElementById('setup').classList.contains('open')) { window.location.href = 'index.html'; return; }
        openSetup();
    }

    document.addEventListener('keydown', (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (e.key === 'ArrowLeft') { input.left = true; ensureAudio(); }
        else if (e.key === 'ArrowRight') { input.right = true; ensureAudio(); }
        else if (e.key === 'ArrowUp') { input.fineUp = true; ensureAudio(); e.preventDefault(); }
        else if (e.key === 'ArrowDown') { input.fineDown = true; ensureAudio(); e.preventDefault(); }
        else if (k === 'a') { input.driveLeft = true; ensureAudio(); }
        else if (k === 'd') { input.driveRight = true; ensureAudio(); }
        else if (k === 's') { ensureAudio(); activateShield(); }
        else if (e.key === ' ') { e.preventDefault(); ensureAudio(); if (!state.charging) startCharge(); }
        else if (e.key >= '1' && e.key <= '9') { ensureAudio(); selectWeaponByKey(e.key); }
        else if (e.key === 'Escape') { handleEscape(); }
    });
    document.addEventListener('keyup', (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (e.key === 'ArrowLeft') input.left = false;
        else if (e.key === 'ArrowRight') input.right = false;
        else if (e.key === 'ArrowUp') input.fineUp = false;
        else if (e.key === 'ArrowDown') input.fineDown = false;
        else if (k === 'a') input.driveLeft = false;
        else if (k === 'd') input.driveRight = false;
        else if (e.key === ' ') releaseCharge();
    });

    function bindHold(el, onDown, onUp) {
        el.addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); onDown(); });
        el.addEventListener('pointerup', onUp);
        el.addEventListener('pointercancel', onUp);
        el.addEventListener('pointerleave', onUp);
    }
    bindHold(document.getElementById('btn-aim-left'), () => { input.left = true; }, () => { input.left = false; });
    bindHold(document.getElementById('btn-aim-right'), () => { input.right = true; }, () => { input.right = false; });
    bindHold(document.getElementById('btn-drive-left'), () => { input.driveLeft = true; }, () => { input.driveLeft = false; });
    bindHold(document.getElementById('btn-drive-right'), () => { input.driveRight = true; }, () => { input.driveRight = false; });
