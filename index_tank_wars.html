    bindHold(document.getElementById('btn-fire'), () => { if (!state.charging) startCharge(); }, () => releaseCharge());
    document.getElementById('btn-shield').addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); activateShield(); });

    // --- Layout / resize (fixed logical 800x500 world, letterboxed) -------------

    function resizeCanvas() {
        const rect = canvasWrap.getBoundingClientRect();
        const scale = Math.max(0.1, Math.min(rect.width / W, rect.height / H));
        const dpr = window.devicePixelRatio || 1;
        canvas.style.width = (W * scale) + 'px';
        canvas.style.height = (H * scale) + 'px';
        canvas.width = Math.floor(W * scale * dpr);
        canvas.height = Math.floor(H * scale * dpr);
        ctx.setTransform(scale * dpr, 0, 0, scale * dpr, 0, 0);
        scanlines.style.width = (W * scale) + 'px';
        scanlines.style.height = (H * scale) + 'px';
    }

    // --- Rendering ----------------------------------------------------------------

    function fillPatternRect(g, x, y, w, h, idx, color) {
        color = color || TANK_COLORS[idx % TANK_COLORS.length];
        g.save();
        g.beginPath(); g.rect(x, y, w, h); g.clip();
        g.fillStyle = color.mid; g.fillRect(x, y, w, h);
        g.fillStyle = color.bright;
        if (idx === 0) { g.fillRect(x, y, w, h); }
        else if (idx === 1) { for (let yy = y; yy < y + h; yy += 3) g.fillRect(x, yy, w, 1.5); }
        else if (idx === 2) {
            const cell = 3;
            for (let yy = y; yy < y + h; yy += cell)
                for (let xx = x; xx < x + w; xx += cell)
                    if ((Math.round((xx - x) / cell) + Math.round((yy - y) / cell)) % 2 === 0) g.fillRect(xx, yy, cell, cell);
        } else {
            for (let yy = y + 1; yy < y + h; yy += 3)
                for (let xx = x + 1; xx < x + w; xx += 3) g.fillRect(xx, yy, 1, 1);
        }
        g.restore();
    }

    function tankColor(t) {
        const slot = state.config.slots[t.idx];
        return TANK_COLORS[(slot && slot.color) || 0] || TANK_COLORS[0];
    }

    function drawTank(t) {
        if (!t.alive) return;
        const x = t.x, yBase = t.y, bodyTop = yBase - TANK_H;
        const color = tankColor(t);
        // Shield bubble (pulsing) when raised.
        if (t.shieldActive) {
            const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 150);
            ctx.strokeStyle = color.bright; ctx.globalAlpha = pulse; ctx.lineWidth = 2;
            ctx.setLineDash([4, 3]);
            ctx.beginPath(); ctx.arc(x, bodyTop - 1, TANK_W * 0.85, 0, Math.PI * 2); ctx.stroke();
            ctx.setLineDash([]); ctx.globalAlpha = 1;
        }
        fillPatternRect(ctx, x - TANK_W / 2, bodyTop, TANK_W, TANK_H, t.idx, color);
        ctx.strokeStyle = color.bright; ctx.lineWidth = 1;
        ctx.strokeRect(x - TANK_W / 2, bodyTop, TANK_W, TANK_H);
        ctx.fillStyle = GREEN_DIM;
        ctx.fillRect(x - TANK_W / 2 - 2, yBase - 3, TANK_W + 4, 3);
        ctx.strokeRect(x - TANK_W / 2 - 2, yBase - 3, TANK_W + 4, 3);
        ctx.strokeStyle = CANNON_GRAY;
        ctx.beginPath(); ctx.arc(x, bodyTop, 6, Math.PI, 0);
        ctx.fillStyle = CANNON_GRAY; ctx.fill(); ctx.stroke();
        const rad = t.angle * Math.PI / 180;
        ctx.strokeStyle = CANNON_GRAY; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x, bodyTop); ctx.lineTo(x + Math.cos(rad) * BARREL_LEN, bodyTop - Math.sin(rad) * BARREL_LEN); ctx.stroke();

        const barW = 22, barX = x - barW / 2, barY = bodyTop - 12;
        ctx.fillStyle = GREEN_DIM; ctx.fillRect(barX, barY, barW, 3);
        ctx.fillStyle = t.hp <= 25 ? (Math.floor(performance.now() / 200) % 2 ? GREEN_DIM : GREEN_BRIGHT) : GREEN_BRIGHT;
        ctx.fillRect(barX, barY, barW * clamp(t.hp / 100, 0, 1), 3);
        ctx.strokeStyle = GREEN_MID; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, barW, 3);

        // Fuel/energy bar (orange) for the active human tank while it's their turn.
        if (state.currentIdx === t.idx && !isCPU(t) && (state.phase === 'aiming' || state.phase === 'charging')) {
            const fY = barY - 4;
            ctx.fillStyle = GREEN_DIM; ctx.fillRect(barX, fY, barW, 2);
            ctx.fillStyle = ORANGE; ctx.fillRect(barX, fY, barW * clamp(t.energy / ENERGY_MAX, 0, 1), 2);
        }

        ctx.fillStyle = state.currentIdx === t.idx && state.phase !== 'flight' ? GREEN_BRIGHT : GREEN_MID;
        ctx.font = '8px monospace'; ctx.textAlign = 'center';
        ctx.fillText('P' + (t.idx + 1), x, barY - 8);
    }

    function drawCrate(c) {
        ctx.fillStyle = GREEN_DIM;
        ctx.fillRect(c.x - 7, c.y - 7, 14, 14);
        ctx.strokeStyle = GREEN_BRIGHT; ctx.lineWidth = 1.5;
        ctx.strokeRect(c.x - 7, c.y - 7, 14, 14);
        ctx.beginPath(); ctx.moveTo(c.x - 7, c.y - 7); ctx.lineTo(c.x + 7, c.y + 7);
        ctx.moveTo(c.x + 7, c.y - 7); ctx.lineTo(c.x - 7, c.y + 7); ctx.stroke();
    }

    function drawShells() {
        for (const s of state.shells) {
            for (let i = 0; i < s.trail.length; i++) {
                const p = s.trail[i];
                ctx.globalAlpha = (i / s.trail.length) * 0.5;
                ctx.fillStyle = GREEN_MID;
                ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
            }
            ctx.globalAlpha = 1;
            ctx.fillStyle = GREEN_BRIGHT;
            ctx.beginPath(); ctx.arc(s.x, s.y, 2.2, 0, Math.PI * 2); ctx.fill();
        }
    }

    // While a human player has Heat Seeker selected and is aiming/charging,
    // show the lock-on radius around every enemy tank.
    function drawHeatseekerZones() {
        if (state.phase !== 'aiming' && state.phase !== 'charging') return;
        const p = currentPlayer();
        if (!p || isCPU(p) || p.selected !== 'heatseeker') return;
        ctx.strokeStyle = CANNON_GRAY; ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        for (const t of state.players) {
            if (!t.alive || t.idx === p.idx) continue;
            ctx.beginPath(); ctx.arc(t.x, t.y - TANK_H / 2, HEATSEEKER_RADIUS, 0, Math.PI * 2); ctx.stroke();
        }
        ctx.setLineDash([]);
    }

    // Shows how big the selected weapon's explosion will be, right on the
    // shooter's own tank, so kids can compare weapons by eye instead of by
    // reading damage numbers.
    function drawBlastPreview() {
        if (state.phase !== 'aiming' && state.phase !== 'charging') return;
        const p = currentPlayer();
        if (!p || isCPU(p)) return;
        const spec = WEAPONS[p.selected];
        if (!spec) return;
        const r = spec.dmgR * blastScale();
        ctx.save();
        for (const t of state.players) {
            if (!t.alive || t.idx === p.idx) continue;
            const cx = t.x, cy = t.y - TANK_H / 2;
            ctx.globalAlpha = 0.16;
            ctx.fillStyle = ORANGE;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 0.55;
            ctx.strokeStyle = ORANGE; ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.stroke();
        }
        ctx.restore();
    }

    function render(t) {
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(terrainCanvas, 0, 0);
        for (const c of state.crates) drawCrate(c);
        drawBlastPreview();
        drawHeatseekerZones();
        for (const p of state.players) drawTank(p);
        drawShells();
        drawParticles();
    }

    // One chip per player, in player order — CSS space-between pins the
    // first to the left edge and the last to the right (P1/P2 in the
    // default 2-player game), with any 3rd/4th player filling the middle.
    function renderHealthHUD() {
        hudHealthEl.innerHTML = '';
        state.players.forEach((p, i) => {
            const span = document.createElement('span');
            span.id = 'hp-' + i;
            hudHealthEl.appendChild(span);
        });
        updateHealthHUD();
    }

    function updateHealthHUD() {
        for (const p of state.players) {
            const el = document.getElementById('hp-' + p.idx);
            if (!el) continue;
            el.textContent = nameOf(p) + ' ' + Math.max(0, Math.round(p.hp)) + '%' + (p.alive ? ' 🛡×' + p.shields : '');
            el.style.color = p.alive ? tankColor(p).bright : GREEN_DIM;
        }
    }

    function updateHUD() {
        const p = state.players[state.currentIdx];
        if (p) {
            const burstLeft = (state.rapidFire && state.rapidFire.ownerIdx === p.idx) ? state.rapidFire.shotsLeft + 1 : 0;
            hudPlayer.textContent = nameOf(p) + (isCPU(p) ? ' (CPU)' : '') + (burstLeft > 0 ? ' ⚡ RAPID FIRE x' + burstLeft : '');
            hudAngle.textContent = Math.round(p.angle) + '°';
        }
        hudWind.textContent = 'WIND ' + (state.wind >= 0 ? '▶' : '◀') + ' ' + Math.round(Math.abs(state.wind));
        hudScore.textContent = state.scores.join('-');
        updateHealthHUD();
        if (state.charging) {
            powerMeter.classList.add('show');
            powerFill.style.height = (state.charge * 100) + '%';
            powerFill.style.background = state.charge > 0.85 ? ORANGE : GREEN_BRIGHT;
            // reference marker: strength of this player's previous shot
            if (p && p.lastCharge != null) {
                powerLast.classList.add('show');
                powerLast.style.bottom = (p.lastCharge * 100) + '%';
            } else {
                powerLast.classList.remove('show');
            }
        } else {
            powerMeter.classList.remove('show');
        }
        // Mobile shield button reflects the current player's shield state.
        if (p) {
            shieldBtn.classList.toggle('used', p.shields <= 0 && !p.shieldActive);
            shieldBtn.classList.toggle('on', p.shieldActive);
            shieldBtn.textContent = p.shieldActive ? 'SHIELD ON' : ('SHIELD ×' + p.shields);
        }
        // Move meter: how much of the current human tank's drive budget is left.
        if (p && !isCPU(p) && (state.phase === 'aiming' || state.phase === 'charging')) {
            moveMeter.classList.add('show');
            moveFill.style.height = (clamp(p.energy / ENERGY_MAX, 0, 1) * 100) + '%';
        } else {
            moveMeter.classList.remove('show');
        }
    }

    function showBanner(text, duration) {
        state.banner = { timer: duration };
        bannerEl.textContent = text;
        bannerEl.classList.add('show');
    }
    function updateBanner(dt) {
        if (!state.banner) return;
        state.banner.timer -= dt;
        if (state.banner.timer <= 0) { bannerEl.classList.remove('show'); state.banner = null; }
    }

    // --- Inventory UI --------------------------------------------------------------

    function renderInventory() {
        const p = currentPlayer();
        invRow.innerHTML = '';
        if (!p || isCPU(p) || state.phase === 'setup') { invRow.style.display = 'none'; return; }
        invRow.style.display = 'flex';
        for (const key of WEAPON_ORDER) {
            const spec = WEAPONS[key];
            const count = key === 'standard' ? null : p.inventory[key];
            if (key !== 'standard' && !(count > 0)) continue;
            const btn = document.createElement('button');
            btn.className = 'inv-chip' + (p.selected === key ? ' sel' : '');
            btn.textContent = spec.short + (count ? (' x' + count) : '');
            btn.addEventListener('click', () => {
                ensureAudio();
                if (state.phase !== 'aiming') return;
                p.selected = key; sfx.select(); renderInventory();
            });
            // Double-click/double-tap a weapon chip to see a basic illustration
            // of its blast pattern instead of guessing from the name/count.
            btn.addEventListener('dblclick', (e) => { e.stopPropagation(); showWeaponIllo(key); });
            invRow.appendChild(btn);
            if (key === 'mega' && count > 0) {
                const tradeBtn = document.createElement('button');
                tradeBtn.className = 'inv-chip trade-chip';
                tradeBtn.textContent = '⇄ 🛡';
                tradeBtn.title = 'Trade 1 Mega for 1 Shield';
                tradeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    ensureAudio();
                    if (state.phase !== 'aiming' || p.inventory.mega <= 0) return;
                    p.inventory.mega--;
                    p.shields++;
                    if (p.selected === 'mega' && p.inventory.mega <= 0) p.selected = 'standard';
                    sfx.shieldUp();
                    showBanner(nameOf(p) + ' TRADED MEGA FOR SHIELD', 1.0);
                    renderInventory();
                });
                invRow.appendChild(tradeBtn);
            }
        }
    }

    // --- Weapon illustration modal ----------------------------------------------
    // A basic static diagram of a weapon's shot spread and blast size, shown on
    // double-click/double-tap of its inventory chip. Purely illustrative — the
    // reference aim angle and trail length are fixed, not tied to live physics.
    const ILLO_SCALE = 0.5;   // canvas px per game-world blast-radius unit
    const ILLO_ANGLE = 55;    // degrees; matches a tank's default aim angle
    const ILLO_TRAIL = 78;    // px each illustrated shot travels from the turret

    function closeWeaponIllo() { weaponIlloEl.classList.remove('open'); }

    function showWeaponIllo(key) {
        const spec = WEAPONS[key];
        if (!spec) return;
        weaponIlloTitle.textContent = spec.name;
        weaponIlloDesc.textContent = weaponIlloDescription(key, spec);
        drawWeaponIllo(spec);
        weaponIlloEl.classList.add('open');
    }

    function weaponIlloDescription(key, spec) {
        const bits = ['DMG ' + spec.dmg + ' · BLAST R' + spec.dmgR];
        if (spec.shots.length > 1) bits.push(spec.shots.length + ' shells per shot');
        if (spec.infinite) bits.push('Unlimited ammo — a direct hit also scores a PERFECT SHOT bonus');
        if (spec.burst) bits.push('Auto-fires ' + RAPID_FIRE_SHOTS + ' shots over ~' + RAPID_FIRE_SECONDS + 's at the angle/power of the first shot');
        if (spec.shrapnel) bits.push('Bursts into ' + spec.shrapnel + ' fragment shells on impact');
        if (spec.homing) bits.push('Curves to lock onto the nearest enemy tank once close');
        if (WEAPON_MAX_OVERRIDE[key]) bits.push('Limited to ' + WEAPON_MAX_OVERRIDE[key] + ' per player');
        return bits.join('. ') + '.';
    }

    function drawWeaponIllo(spec) {
        const c = weaponIlloCtx, w = weaponIlloCanvas.width, h = weaponIlloCanvas.height;
        c.clearRect(0, 0, w, h);
        c.fillStyle = '#020a02'; c.fillRect(0, 0, w, h);

        const groundY = h - 26, turretX = 54, turretY = groundY - 14;
        c.strokeStyle = GREEN_DIM; c.lineWidth = 2;
        c.beginPath(); c.moveTo(0, groundY); c.lineTo(w, groundY); c.stroke();
        c.fillStyle = GREEN_MID; c.fillRect(turretX - 10, turretY, 20, 8);

        const endpoints = spec.shots.map(off => {
            const rad = (ILLO_ANGLE + off) * Math.PI / 180;
            return { x: turretX + Math.cos(rad) * ILLO_TRAIL, y: turretY - Math.sin(rad) * ILLO_TRAIL };
        });
        c.strokeStyle = GREEN_BRIGHT; c.lineWidth = 1.5; c.setLineDash([3, 3]);
        for (const pt of endpoints) { c.beginPath(); c.moveTo(turretX, turretY); c.lineTo(pt.x, pt.y); c.stroke(); }
        c.setLineDash([]);

        for (const pt of endpoints) {
            const innerR = spec.dmgR * ILLO_SCALE, outerR = innerR * OUTER_MULT;
            c.globalAlpha = 0.5; c.strokeStyle = ORANGE; c.lineWidth = 1; c.setLineDash([3, 3]);
            c.beginPath(); c.arc(pt.x, pt.y, outerR, 0, Math.PI * 2); c.stroke(); c.setLineDash([]);
            c.globalAlpha = 0.3; c.fillStyle = ORANGE;
            c.beginPath(); c.arc(pt.x, pt.y, Math.max(spec.carveR * ILLO_SCALE, innerR), 0, Math.PI * 2); c.fill();
            c.globalAlpha = 1;
        }

        // Shrapnel bursts throw fragments in a fan from the single blast center.
        if (spec.shrapnel) {
            const ctr = endpoints[0];
            c.strokeStyle = GREEN_MID; c.lineWidth = 1;
            for (let i = 0; i < spec.shrapnel; i++) {
                const ang = (20 + i * (140 / (spec.shrapnel - 1))) * Math.PI / 180;
                c.beginPath(); c.moveTo(ctr.x, ctr.y);
                c.lineTo(ctr.x + Math.cos(ang) * 26, ctr.y - Math.sin(ang) * 26);
                c.stroke();
            }
        }

        // Rapid Fire auto-fires several more shots near the first landing spot.
        if (spec.burst) {
            const ctr = endpoints[0];
            c.globalAlpha = 0.5; c.fillStyle = GREEN_MID;
            [-22, -11, 11, 22].forEach(dx => {
                c.beginPath(); c.arc(ctr.x + dx, ctr.y + Math.abs(dx) / 3, spec.dmgR * ILLO_SCALE * 0.6, 0, Math.PI * 2); c.fill();
            });
            c.globalAlpha = 1;
        }

        // Heat Seeker locks onto anything inside its dashed radius.
        if (spec.homing) {
            const ex = turretX + 140, ey = groundY - 8;
            c.fillStyle = GREEN_DIM; c.fillRect(ex - 9, ey, 18, 7);
            c.strokeStyle = CANNON_GRAY; c.lineWidth = 1.5; c.setLineDash([4, 4]);
            c.beginPath(); c.arc(ex, ey, HEATSEEKER_RADIUS * ILLO_SCALE, 0, Math.PI * 2); c.stroke();
            c.setLineDash([]);
        }
    }

    document.getElementById('weapon-illo-close').addEventListener('click', closeWeaponIllo);
    weaponIlloEl.addEventListener('click', (e) => { if (e.target === weaponIlloEl) closeWeaponIllo(); });

    // --- Main update loop ------------------------------------------------------------

    function update(dt) {
        updateParticles(dt);
        updateBanner(dt);
        // Tank gravity/fall-into-void runs every phase (not just flight/
        // resolving) so driving off a ledge during aiming falls for real
        // instead of waiting for a shell to be in the air.
        const physics = updateTankPhysics(dt);
        switch (state.phase) {
            case 'aiming':
                if (isCPU(currentPlayer())) updateCPUAiming(dt); else updateHumanAiming(dt);
                break;
            case 'charging':
                updateCharging(dt);
                if (isCPU(currentPlayer())) checkCPURelease();
                break;
            case 'flight': updateFlight(dt); break;
            case 'resolving':
                if (!physics.anyAirborne && !physics.anyPendingDeath) setPhase('awarding');
                break;
            case 'roundEnd':
                if (state._matchTimer != null) {
                    state._matchTimer -= dt;
                    if (state._matchTimer <= 0) { state._matchTimer = null; showMatchEnd(); }
                } else if (state._roundEndTimer != null) {
                    state._roundEndTimer -= dt;
                    if (state._roundEndTimer <= 0) { state._roundEndTimer = null; startRound(); }
                }
                break;
            default: break;
        }
        updateHUD();
    }

    function updateCharging(dt) {
        state.charge += state.chargeDir * (1 / CHARGE_DURATION) * dt;
        if (state.charge >= 1) { state.charge = 1; state.chargeDir = -1; }
        if (state.charge <= 0) { state.charge = 0; state.chargeDir = 1; }
        state._chargeSoundAcc = (state._chargeSoundAcc || 0) + dt;
        if (state._chargeSoundAcc > 0.08) { state._chargeSoundAcc = 0; sfx.charge(state.charge); }
    }

    let lastT = 0;
    function loop(ts) {
        const t = ts / 1000;
        const dt = Math.min(0.05, t - lastT || 0.016);
        lastT = t;
        update(dt);
        render(t);
        requestAnimationFrame(loop);
    }

    // --- Match end / rematch -------------------------------------------------------

    function showMatchEnd() {
        const winIdx = state.scores.indexOf(Math.max(...state.scores));
        matchContent.innerHTML = '<h1>P' + (winIdx + 1) + ' WINS THE MATCH!</h1><p>' + state.scores.join(' - ') + '</p>';
        matchModal.style.display = 'block';
        sfx.fanfare();
    }

    document.getElementById('rematch-btn').addEventListener('click', () => {
        ensureAudio(); sfx.select();
        matchModal.style.display = 'none';
        state.round = 1; state.scores = new Array(state.players.length).fill(0);
        startRound();
    });
    document.getElementById('match-setup-btn').addEventListener('click', () => {
        ensureAudio(); sfx.select();
        matchModal.style.display = 'none';
        openSetup();
    });

    // --- Setup screen ----------------------------------------------------------------

    const setupEl = document.getElementById('setup');
    const slotsEl = document.getElementById('slots');
    const playersVal = document.getElementById('players-val');
    const terrainOptsEl = document.getElementById('terrain-options');
    const roundsOptsEl = document.getElementById('rounds-options');
    const weaponOptsEl = document.getElementById('weapon-options');

    const TERRAIN_LABELS = [['hills', 'HILLS · EASY'], ['beach', 'BEACH · EASY'], ['mountains', 'MOUNTAINS · MED'], ['canyon', 'CANYON · HARD'], ['skyisland', 'SKY ISLAND · EXPERT'], ['cloud', 'CLOUDS · MED'], ['canopy', 'TREE CANOPY · EXPERT'], ['volcano', 'VOLCANO · HARD'], ['moonscape', 'MOONSCAPE · MED'], ['city', 'CITY · HARD'], ['random', 'RANDOM']];
    const ROUNDS_LABELS = [1, 2, 3, 5];
    const CPU_CYCLE = [{ type: 'human', cpuLevel: 1 }, { type: 'cpu', cpuLevel: 1 }, { type: 'cpu', cpuLevel: 2 }, { type: 'cpu', cpuLevel: 3 }];
    const CPU_LABELS = ['HUMAN', 'CPU · EASY', 'CPU · MED', 'CPU · HARD'];

    function slotLabel(slot) {
        const i = CPU_CYCLE.findIndex(c => c.type === slot.type && c.cpuLevel === slot.cpuLevel);
        return CPU_LABELS[i >= 0 ? i : 0];
    }

    function renderSetup() {
        playersVal.textContent = state.config.playerCount;
        slotsEl.innerHTML = '';
        for (let i = 0; i < state.config.playerCount; i++) {
            const row = document.createElement('div');
            row.className = 'slot-row';
            const swatch = document.createElement('canvas');
            swatch.width = 18; swatch.height = 18; swatch.className = 'slot-swatch';
            swatch.title = 'Tap to change color';
            fillPatternRect(swatch.getContext('2d'), 0, 0, 18, 18, i, TANK_COLORS[state.config.slots[i].color]);
            swatch.addEventListener('click', () => {
                ensureAudio(); sfx.select();
                state.config.slots[i].color = (state.config.slots[i].color + 1) % TANK_COLORS.length;
                renderSetup();
            });
            const label = document.createElement('span');
            label.className = 'slot-label'; label.textContent = 'P' + (i + 1);
            const btn = document.createElement('button');
            btn.className = 'slot-type-btn';
            btn.textContent = slotLabel(state.config.slots[i]);
            btn.addEventListener('click', () => {
                ensureAudio(); sfx.select();
                const cur = CPU_CYCLE.findIndex(c => c.type === state.config.slots[i].type && c.cpuLevel === state.config.slots[i].cpuLevel);
                const next = CPU_CYCLE[(Math.max(0, cur) + 1) % CPU_CYCLE.length];
                state.config.slots[i] = { type: next.type, cpuLevel: next.cpuLevel, color: state.config.slots[i].color };
                renderSetup();
            });
            row.appendChild(swatch); row.appendChild(label); row.appendChild(btn);
            slotsEl.appendChild(row);
        }

        terrainOptsEl.innerHTML = '';
        for (const [key, label] of TERRAIN_LABELS) {
            const b = document.createElement('button');
            b.className = 'opt-btn' + (state.config.terrain === key ? ' sel' : '');
            b.textContent = label;
            b.addEventListener('click', () => { ensureAudio(); sfx.select(); state.config.terrain = key; renderSetup(); });
            terrainOptsEl.appendChild(b);
        }

        roundsOptsEl.innerHTML = '';
        for (const n of ROUNDS_LABELS) {
            const b = document.createElement('button');
            b.className = 'opt-btn' + (state.config.roundsToWin === n ? ' sel' : '');
            b.textContent = 'BEST OF ' + (n * 2 - 1);
            b.addEventListener('click', () => { ensureAudio(); sfx.select(); state.config.roundsToWin = n; renderSetup(); });
            roundsOptsEl.appendChild(b);
        }

        weaponOptsEl.innerHTML = '';
        for (const key of POWERUP_KEYS) {
            const count = state.config.weaponCounts[key] || 0;
            const row = document.createElement('div');
            row.className = 'slot-row';
            const label = document.createElement('span');
            label.className = 'slot-label'; label.style.width = 'auto'; label.style.flex = '1';
            label.textContent = WEAPONS[key].name;
            const minus = document.createElement('button');
            minus.className = 'stepper-btn'; minus.textContent = '-';
            minus.addEventListener('click', () => {
                ensureAudio(); sfx.select();
                const totalOthers = POWERUP_KEYS.filter(k => k !== key).reduce((sum, k) => sum + (state.config.weaponCounts[k] || 0), 0);
                if (count <= 0 || (count === 1 && totalOthers === 0)) return;   // keep at least one weapon in the pool
                state.config.weaponCounts[key] = count - 1;
                renderSetup();
            });
            const val = document.createElement('span');
            val.textContent = count; val.style.minWidth = '18px'; val.style.textAlign = 'center';
            const plus = document.createElement('button');
            plus.className = 'stepper-btn'; plus.textContent = '+';
            plus.addEventListener('click', () => {
                ensureAudio(); sfx.select();
                state.config.weaponCounts[key] = Math.min(weaponMax(key), count + 1);
                renderSetup();
            });
            row.appendChild(label); row.appendChild(minus); row.appendChild(val); row.appendChild(plus);
            weaponOptsEl.appendChild(row);
        }
    }

    document.getElementById('players-minus').addEventListener('click', () => {
        ensureAudio(); sfx.select();
        state.config.playerCount = clamp(state.config.playerCount - 1, 2, 4);
        renderSetup();
    });
    document.getElementById('players-plus').addEventListener('click', () => {
        ensureAudio(); sfx.select();
        state.config.playerCount = clamp(state.config.playerCount + 1, 2, 4);
        renderSetup();
    });

    function openSetup() { renderSetup(); setupEl.classList.add('open'); }
    function closeSetup() { setupEl.classList.remove('open'); }

    document.getElementById('start-battle').addEventListener('click', () => {
        ensureAudio(); sfx.select();
        localStorage.setItem(LS.config, JSON.stringify(state.config));
        buildPlayers(state.config);
        state.round = 1;
        closeSetup();
        startRound();
    });
    document.getElementById('setup-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); openSetup(); });

    // --- Mute -------------------------------------------------------------------------

    const muteBtn = document.getElementById('mute-btn');
    function updateMuteBtn() { muteBtn.textContent = muted ? '\u{1F507}' : '\u{1F50A}'; }
    muteBtn.addEventListener('click', () => {
        ensureAudio();
        muted = !muted;
        localStorage.setItem(LS.muted, muted ? '1' : '0');
        sfx.select();
        updateMuteBtn();
    });
    updateMuteBtn();

    // --- Boot ---------------------------------------------------------------------------

    generateTerrain('hills');
    bakeTerrain();

    resizeCanvas();
    let resizeRAF;
    window.addEventListener('resize', () => { cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(resizeCanvas); });
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

    openSetup();
    requestAnimationFrame(loop);

    // Exposed for console/Playwright testing.
    window.state = state;
    window.terrain = terrain;
    window.WEAPONS = WEAPONS;
    window.terrainAt = terrainAt;
    window.skipSetup = function (cfgOverrides) {
        Object.assign(state.config, cfgOverrides || {});
        buildPlayers(state.config);
        state.round = 1;
        closeSetup();
        startRound();
    };
    window.fireAt = function (angleDeg, charge) {
        const p = currentPlayer();
        p.angle = ((angleDeg % 360) + 360) % 360;
        state.charge = clamp(charge, 0, 1);
        fire();
    };
    window.solveShot = solveShot;
    window.activateShield = activateShield;
    window.driveCurrent = function (dir, dt) { driveTank(currentPlayer(), dir, dt || 0.1); };
    window.stepFrame = function (dt) { update(dt || 0.1); render(); };
</script>
</body>
</html>
