<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake Duel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
          media="print" onload="this.media='all'">
    <style>
        :root {
            --p1: #33ff66;
            --p2: #ff3caa;
            --food: #ffd166;
            --g-mid: #22cc22;
            --g-dim: #114411;
            --bg: #020a02;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg);
            color: #d8ffd8;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100dvh; min-height: 100vh; margin: 0; overflow: hidden;
            padding: 8px; box-sizing: border-box;
            touch-action: none; overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
        }
        #game-container {
            position: relative;
            width: 100%; max-width: min(900px, 96vw);
            height: 100%; max-height: min(760px, 96vh);
            display: flex; flex-direction: column; align-items: center;
            border: 3px solid var(--g-mid); border-radius: 10px;
            box-shadow: 0 0 18px var(--g-mid), inset 0 0 18px rgba(34,204,34,0.22);
            background: #010401; padding: 6px; box-sizing: border-box;
        }
        #hud {
            width: 100%; flex-shrink: 0; display: flex; flex-wrap: wrap;
            justify-content: center; align-items: center; gap: 10px;
            padding: 6px 8px; box-sizing: border-box;
            border: 2px solid var(--g-dim); border-radius: 6px;
            font-size: 0.62rem; margin-bottom: 6px;
        }
        #hud .p1 { color: var(--p1); text-shadow: 0 0 6px var(--p1); }
        #hud .p2 { color: var(--p2); text-shadow: 0 0 6px var(--p2); }
        #hud .best { color: var(--food); text-shadow: 0 0 6px var(--food); }
        #hud-mid { color: var(--g-mid); }
        .pill-btn {
            background: transparent; color: #d8ffd8; border: 2px solid var(--g-mid);
            border-radius: 999px; padding: 5px 10px;
            font-family: inherit; font-size: 0.5rem; cursor: pointer;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        .pill-btn:active { background: var(--g-mid); color: #001500; }
        #canvas-wrap { position: relative; width: 100%; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
        #gameCanvas { display: block; background: var(--bg); touch-action: none; }
        #scanlines { position: absolute; pointer-events: none;
            background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 1px, transparent 3px);
            mix-blend-mode: multiply; }
        #banner {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            padding: 8px 16px; border: 2px solid #d8ffd8; border-radius: 6px;
            background: rgba(0,20,0,0.85); color: #eaffea; font-size: 0.7rem;
            text-align: center; box-shadow: 0 0 14px rgba(160,255,160,0.6);
            opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 40; white-space: nowrap;
        }
        #banner.show { opacity: 1; }
        #back-to-arcade {
            position: fixed; top: max(10px, env(safe-area-inset-top)); left: max(10px, env(safe-area-inset-left));
            z-index: 500; padding: 6px 12px; font-family: inherit; font-size: 0.55rem;
            color: #d8ffd8; background: rgba(0,0,0,0.7); border: 1px solid #d8ffd8; border-radius: 6px;
            text-decoration: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        #back-to-arcade:active { background: rgba(120,255,120,0.2); }
        #touch-hint {
            display: none; width: 100%; text-align: center; font-size: 0.45rem;
            color: var(--g-dim); padding: 6px 4px 0; box-sizing: border-box;
        }
        @media (pointer: coarse) { #touch-hint { display: block; } }
        #kb-hint { display: none; width: 100%; text-align: center; font-size: 0.45rem; color: var(--g-dim); padding: 6px 4px 0; box-sizing: border-box; }
        @media (pointer: fine) { #kb-hint { display: block; } }

        /* Modal (match end) */
        #modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(0,12,0,0.97); border: 3px solid #d8ffd8; padding: 20px 26px;
            border-radius: 10px; text-align: center; box-shadow: 0 0 26px rgba(160,255,160,0.6);
            z-index: 100; display: none; max-width: 88vw; width: 320px; box-sizing: border-box;
        }
        #modal h1 { font-size: 0.95rem; line-height: 1.6; margin: 0 0 12px; }
        #modal p { font-size: 0.55rem; line-height: 1.8; margin: 0 0 10px; color: var(--g-mid); }
        .sd-btn {
            background: var(--g-mid); color: #001500; border: none; padding: 10px 18px; border-radius: 6px;
            margin: 6px 4px 0; cursor: pointer; font-family: inherit; font-size: 0.6rem; box-shadow: 0 4px #0a5a0a; touch-action: manipulation;
        }
        .sd-btn.alt { background: transparent; color: #d8ffd8; border: 2px solid #d8ffd8; box-shadow: none; }
        .sd-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Setup overlay */
        #setup {
            position: fixed; inset: 0; z-index: 800; display: none; flex-direction: column; align-items: center;
            background: rgba(1,6,1,0.96); overflow-y: auto; padding: 16px 10px 30px; box-sizing: border-box;
        }
        #setup.open { display: flex; }
        #setup-box { width: 100%; max-width: 440px; border: 2px solid var(--g-mid); border-radius: 10px; padding: 14px; box-sizing: border-box; box-shadow: 0 0 16px rgba(34,204,34,0.4); }
        #setup-box h1 { font-size: 1rem; text-align: center; color: #eaffea; text-shadow: 0 0 10px var(--p1); margin: 0 0 4px; }
        .setup-sub { text-align: center; font-size: 0.5rem; color: var(--g-mid); margin: 0 0 14px; }
        .setup-row { margin-bottom: 12px; }
        .setup-label { display: block; font-size: 0.52rem; color: var(--g-mid); margin-bottom: 6px; }
        .opt-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .opt-btn { background: transparent; color: var(--g-mid); border: 2px solid var(--g-dim); border-radius: 4px; padding: 8px 9px; font-family: inherit; font-size: 0.5rem; cursor: pointer; touch-action: manipulation; }
        .opt-btn.sel { color: #eaffea; border-color: #d8ffd8; box-shadow: 0 0 6px var(--p1); }
        #start-btn { display: block; width: 100%; margin-top: 14px; background: var(--g-mid); color: #001500; border: none; padding: 14px; border-radius: 8px; font-family: inherit; font-size: 0.75rem; cursor: pointer; box-shadow: 0 5px #0a5a0a; touch-action: manipulation; }
        #start-btn:active { transform: translateY(4px); box-shadow: none; }

        @media (max-width: 480px) { #hud { font-size: 0.5rem; gap: 6px; } .pill-btn { font-size: 0.45rem; padding: 4px 7px; } }
    </style>
</head>
<body>
<a id="back-to-arcade" href="index.html" aria-label="Back to arcade">&#8249; ARCADE</a>

<div id="game-container">
    <div id="hud">
        <span class="p1" id="hud-p1">P1 0</span>
        <span id="hud-mid">ROUND 1</span>
        <span class="p2" id="hud-p2">0 P2</span>
        <button class="pill-btn" id="mute-btn">&#128266;</button>
        <button class="pill-btn" id="setup-btn">SETUP</button>
    </div>
    <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>
        <div id="scanlines"></div>
        <div id="banner"></div>
        <div id="modal">
            <div id="modal-content"></div>
            <button class="sd-btn" id="rematch-btn">REMATCH</button>
            <button class="sd-btn alt" id="modal-setup-btn">SETUP</button>
        </div>
    </div>
    <div id="kb-hint">P1: W A S D &middot; P2: ARROW KEYS &middot; SPACE = READY/PAUSE</div>
    <div id="touch-hint">SWIPE YOUR HALF TO STEER &middot; TAP = READY</div>
</div>

<div id="setup">
    <div id="setup-box">
        <h1>SNAKE DUEL</h1>
        <p class="setup-sub">Grow by eating. Box in your rival, or go solo and see how long you last.</p>
        <div class="setup-row">
            <span class="setup-label">MODE</span>
            <div class="opt-group" id="mode-options"></div>
        </div>
        <div class="setup-row" id="row-opp">
            <span class="setup-label">PLAYER 2</span>
            <div class="opt-group" id="opp-options"></div>
        </div>
        <div class="setup-row">
            <span class="setup-label">SPEED</span>
            <div class="opt-group" id="speed-options"></div>
        </div>
        <div class="setup-row">
            <span class="setup-label">WALLS</span>
            <div class="opt-group" id="walls-options"></div>
        </div>
        <div class="setup-row" id="row-rounds">
            <span class="setup-label">MATCH</span>
            <div class="opt-group" id="rounds-options"></div>
        </div>
        <button id="start-btn">START DUEL</button>
    </div>
</div>

<script src="highscores.js"></script>
<script>
    'use strict';
    // =====================================================================
    // Snake Duel — two snakes share one arena. Grow by eating, die on any
    // wall/self/rival collision (walls optional). Last snake alive wins the
    // round; best-of-N match. 2-player hotseat or vs CPU. Green-CRT look.
    // =====================================================================

    const COLS = 30, ROWS = 20;
    const P1 = '#33ff66', P2 = '#ff3caa', FOOD = '#ffd166';
    const GRID = 'rgba(40,120,40,0.18)', BRIGHT = '#d8ffd8';
    const START_LEN = 4;
    // Solo survival: level up every N pellets; each level adds obstacle blocks.
    const LEVEL_UP_EVERY = 4;
    const OBSTACLE_PER_LEVEL = 3;
    const OBSTACLE_CAP = 34;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvas-wrap');
    const scanlines = document.getElementById('scanlines');
    const bannerEl = document.getElementById('banner');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const hudP1 = document.getElementById('hud-p1');
    const hudP2 = document.getElementById('hud-p2');
    const hudMid = document.getElementById('hud-mid');

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    // --- Persisted prefs / config -------------------------------------------
    const LS = { muted: 'sd_muted', config: 'sd_config' };
    let muted = localStorage.getItem(LS.muted) === '1';

    const SPEED_LEVELS = { chill: 6.5, normal: 9, fast: 12 };

    function defaultConfig() { return { mode: 'duel', opponent: 'cpu2', speed: 'normal', walls: 'solid', roundsToWin: 3 }; }
    function loadConfig() {
        try {
            const c = Object.assign(defaultConfig(), JSON.parse(localStorage.getItem(LS.config) || '{}'));
            if (c.mode !== 'duel' && c.mode !== 'solo') c.mode = 'duel';
            if (!SPEED_LEVELS[c.speed]) c.speed = 'normal';
            if (c.walls !== 'solid' && c.walls !== 'wrap') c.walls = 'solid';
            if (!(c.roundsToWin >= 1 && c.roundsToWin <= 5)) c.roundsToWin = 3;
            return c;
        } catch (e) { return defaultConfig(); }
    }

    // opponent: 'human' | 'cpu1' | 'cpu2' | 'cpu3'
    function isSolo() { return state.config.mode === 'solo'; }
    function p2IsCPU() { return !isSolo() && state.config.opponent.startsWith('cpu'); }
    function cpuLevel() { return parseInt(state.config.opponent.slice(3)) || 2; }

    // --- Game state ----------------------------------------------------------
    const state = {
        phase: 'setup',   // setup | ready | playing | roundOver | matchOver
        config: null,
        snakes: [],
        food: [],
        obstacles: [],
        scores: [0, 0],
        round: 1,
        level: 1,
        soloScore: 0,
        highScore: HS.getBoard('snake-duel', 'sd_highscore').personalBest.score,
        tickAcc: 0,
        banner: null,
        roundWinner: null
    };
    state.config = loadConfig();

    const DIRS = { up: { c: 0, r: -1 }, down: { c: 0, r: 1 }, left: { c: -1, r: 0 }, right: { c: 1, r: 0 } };
    function opposite(a, b) { return a.c === -b.c && a.r === -b.r; }

    function makeSnake(idx, headC, headR, dir, color) {
        const cells = [];
        for (let i = 0; i < START_LEN; i++) cells.push({ c: headC - dir.c * i, r: headR - dir.r * i });
        return { idx, cells, dir, pendingDir: dir, color, alive: true, grow: 0 };
    }

    function newRound() {
        if (isSolo()) return newSolo();
        state.obstacles = []; state.level = 1;
        state.snakes = [
            makeSnake(0, 6, Math.floor(ROWS / 2), DIRS.right, P1),
            makeSnake(1, COLS - 7, Math.floor(ROWS / 2), DIRS.left, P2)
        ];
        state.food = [];
        for (let i = 0; i < 3; i++) spawnFood();
        state.tickAcc = 0;
        state.roundWinner = null;
        state.phase = 'ready';
        showBanner('ROUND ' + state.round + ' — GET READY', 0);   // sticky until start
        updateHUD();
    }

    // Single-player survival: one snake, endless, level up to add obstacles.
    function newSolo() {
        state.level = 1; state.soloScore = 0;
        state.snakes = [makeSnake(0, Math.floor(COLS / 2), Math.floor(ROWS / 2), DIRS.right, P1)];
        state.obstacles = [];
        placeObstacles(obstacleCountForLevel(1));
        state.food = []; spawnFood();
        state.tickAcc = 0; state.roundWinner = null;
        state.phase = 'ready';
        showBanner('SOLO — GET READY', 0);
        updateHUD();
    }

    function obstacleCountForLevel(l) { return Math.min(OBSTACLE_CAP, (l - 1) * OBSTACLE_PER_LEVEL); }
    function isObstacle(c, r) { return state.obstacles.some(o => o.c === c && o.r === r); }

    // Scatter single-cell obstacle blocks on free cells, keeping clear of the
    // snake's head so a fresh level never spawns an instant trap.
    function placeObstacles(count) {
        state.obstacles = [];
        const head = state.snakes[0] ? state.snakes[0].cells[0] : { c: COLS / 2, r: ROWS / 2 };
        let tries = 0;
        while (state.obstacles.length < count && tries < 3000) {
            tries++;
            const c = Math.floor(Math.random() * COLS), r = Math.floor(Math.random() * ROWS);
            if (occupied(c, r)) continue;
            if (Math.abs(c - head.c) + Math.abs(r - head.r) < 4) continue;
            state.obstacles.push({ c, r });
        }
    }

    function maybeLevelUp() {
        const target = Math.floor(state.soloScore / LEVEL_UP_EVERY) + 1;
        if (target > state.level) {
            state.level = target;
            placeObstacles(obstacleCountForLevel(target));
            state.food = state.food.filter(f => !isObstacle(f.c, f.r));
            while (state.food.length < 1) spawnFood();
            showBanner('LEVEL ' + state.level, 1.4);
            sfx.levelUp();
        }
    }

    function gameOverSolo() {
        state.phase = 'matchOver';
        const isBest = state.soloScore > state.highScore;
        const qualifies = HS.checkQualifies('snake-duel', state.soloScore, 'sd_highscore');
        hideBanner();

        function finish() {
            if (isBest) state.highScore = state.soloScore;
            modalContent.innerHTML = '<h1 style="color:' + P1 + '">GAME OVER</h1>' +
                '<p>LENGTH ' + (state.soloScore + START_LEN) + ' &middot; LEVEL ' + state.level + '</p>' +
                '<p>' + (isBest ? 'NEW BEST!' : 'BEST ' + (state.highScore + START_LEN)) + '</p>';
            modal.style.display = 'block';
            updateHUD();
        }

        sfx.crash();
        if (isBest) sfx.fanfare();
        if (qualifies) {
            HS.showInitialsOverlay({ onSubmit: (name) => { HS.recordScore('snake-duel', name, state.soloScore); finish(); } });
        } else {
            finish();
        }
    }

    function startMatch() {
        state.scores = [0, 0];
        state.round = 1;
        modal.style.display = 'none';
        newRound();
    }

    function occupied(c, r) {
        for (const s of state.snakes) for (const cell of s.cells) if (cell.c === c && cell.r === r) return true;
        for (const f of state.food) if (f.c === c && f.r === r) return true;
        for (const o of state.obstacles) if (o.c === c && o.r === r) return true;
        return false;
    }

    function spawnFood() {
        // Keep pellets one cell off every edge so they never sit flush against
        // the wall (which reads badly and is awkward to grab).
        const m = 1;
        for (let tries = 0; tries < 400; tries++) {
            const c = m + Math.floor(Math.random() * (COLS - 2 * m));
            const r = m + Math.floor(Math.random() * (ROWS - 2 * m));
            if (!occupied(c, r)) { state.food.push({ c, r }); return; }
        }
    }

    // --- Tick: advance all snakes one cell, resolve collisions ---------------
    function tick() {
        const walls = state.config.walls;
        // 1. commit buffered turns
        for (const s of state.snakes) {
            if (!s.alive) continue;
            if (!opposite(s.pendingDir, s.dir)) s.dir = s.pendingDir;
        }
        // 2. propose new heads + new bodies
        for (const s of state.snakes) {
            if (!s.alive) continue;
            let nc = s.cells[0].c + s.dir.c, nr = s.cells[0].r + s.dir.r;
            s.wallDead = false;
            if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) {
                if (walls === 'wrap') { nc = (nc + COLS) % COLS; nr = (nr + ROWS) % ROWS; }
                else { s.wallDead = true; }
            }
            if (!s.wallDead && isObstacle(nc, nr)) s.wallDead = true;   // crashing an obstacle kills
            s.newHead = { c: nc, r: nr };
            s.ate = state.food.some(f => f.c === nc && f.r === nr);
            const body = s.cells.slice(0, s.ate ? s.cells.length : s.cells.length - 1);
            s.newCells = [s.newHead, ...body];
        }
        // 3. resolve deaths (head vs any snake's new body / head-to-head / self)
        for (const s of state.snakes) {
            if (!s.alive || s.wallDead) continue;
            let dead = false;
            for (const o of state.snakes) {
                if (!o.alive || o.wallDead) continue;
                if (o === s) {
                    if (s.newCells.slice(1).some(cell => cell.c === s.newHead.c && cell.r === s.newHead.r)) dead = true;
                } else if (o.newCells.some(cell => cell.c === s.newHead.c && cell.r === s.newHead.r)) {
                    dead = true;
                }
            }
            s.pendingDead = dead;
        }
        // 4. apply
        let anyoneAte = false;
        for (const s of state.snakes) {
            if (!s.alive) continue;
            if (s.wallDead || s.pendingDead) { s.alive = false; sfx.crash(); continue; }
            s.cells = s.newCells;
            if (s.ate) {
                state.food = state.food.filter(f => !(f.c === s.newHead.c && f.r === s.newHead.r));
                spawnFood();
                anyoneAte = true;
                if (isSolo()) { state.soloScore++; maybeLevelUp(); }
            }
        }
        if (anyoneAte) sfx.eat();
        // 5. round / game end?
        if (isSolo()) {
            if (!state.snakes[0].alive) gameOverSolo();
        } else {
            const alive = state.snakes.filter(s => s.alive);
            if (alive.length <= 1) endRound(alive.length === 1 ? alive[0].idx : -1);
        }
        updateHUD();
    }

    function scoreOf(s) { return s.cells.length - START_LEN; }

    function endRound(winnerIdx) {
        state.phase = 'roundOver';
        state.roundWinner = winnerIdx;
        state._roundTimer = 2.0;
        if (winnerIdx >= 0) {
            state.scores[winnerIdx]++;
            showBanner('P' + (winnerIdx + 1) + ' WINS ROUND ' + state.round, 0);
            sfx.roundWin();
        } else {
            showBanner('DRAW!', 0);
            sfx.crash();
        }
        updateHUD();
    }

    // --- CPU ----------------------------------------------------------------
    function cellFree(c, r, snakes) {
        if (state.config.walls === 'wrap') { c = (c + COLS) % COLS; r = (r + ROWS) % ROWS; }
        else if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
        for (const s of snakes) {
            const body = s.cells;
            for (let i = 0; i < body.length; i++) {
                // the very tail will move next tick, so it's (usually) enterable
                if (i === body.length - 1 && s.grow === 0) continue;
                if (body[i].c === c && body[i].r === r) return false;
            }
        }
        return true;
    }
    // flood-fill open space from a cell (capped) — used by hard AI to avoid traps
    function openSpace(c, r, limit) {
        const seen = new Set(); const stack = [[c, r]]; let n = 0;
        while (stack.length && n < limit) {
            let [cc, rr] = stack.pop();
            if (state.config.walls === 'wrap') { cc = (cc + COLS) % COLS; rr = (rr + ROWS) % ROWS; }
            const key = cc + ',' + rr;
            if (seen.has(key)) continue;
            if (!cellFree(cc, rr, state.snakes)) continue;
            seen.add(key); n++;
            stack.push([cc + 1, rr], [cc - 1, rr], [cc, rr + 1], [cc, rr - 1]);
        }
        return n;
    }
    function decideCPU(s) {
        const level = cpuLevel();
        const head = s.cells[0];
        const nearest = state.food.reduce((a, f) => {
            const d = Math.abs(f.c - head.c) + Math.abs(f.r - head.r);
            return (!a || d < a.d) ? { f, d } : a;
        }, null);
        const options = [];
        for (const key in DIRS) {
            const d = DIRS[key];
            if (opposite(d, s.dir)) continue;
            const nc = head.c + d.c, nr = head.r + d.r;
            if (!cellFree(nc, nr, state.snakes)) continue;
            let score = 0;
            if (nearest) score -= Math.abs(nearest.f.c - (state.config.walls === 'wrap' ? (nc + COLS) % COLS : nc)) + Math.abs(nearest.f.r - (state.config.walls === 'wrap' ? (nr + ROWS) % ROWS : nr));
            if (level >= 3) score += openSpace(nc, nr, 60) * 0.4;   // prefer open room
            if (level >= 2) score += Math.random() * 0.5;          // tiny jitter
            else score += Math.random() * 6;                       // easy: sloppy
            options.push({ d, score });
        }
        if (!options.length) return;   // no safe move; keep going and die
        options.sort((a, b) => b.score - a.score);
        s.pendingDir = options[0].d;
    }

    // --- Input --------------------------------------------------------------
    function setDir(snakeIdx, dirKey) {
        const s = state.snakes[snakeIdx];
        if (!s || !s.alive) return;
        const d = DIRS[dirKey];
        if (opposite(d, s.dir)) return;
        s.pendingDir = d;
    }
    function beginPlayIfReady() {
        if (state.phase === 'ready') { state.phase = 'playing'; hideBanner(); ensureAudio(); }
    }

    document.addEventListener('keydown', (e) => {
        const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        if (k === 'w') setDir(0, 'up');
        else if (k === 's') setDir(0, 'down');
        else if (k === 'a') setDir(0, 'left');
        else if (k === 'd') setDir(0, 'right');
        else if (e.key === 'ArrowUp') { setDir(isSolo() ? 0 : 1, 'up'); e.preventDefault(); }
        else if (e.key === 'ArrowDown') { setDir(isSolo() ? 0 : 1, 'down'); e.preventDefault(); }
        else if (e.key === 'ArrowLeft') { setDir(isSolo() ? 0 : 1, 'left'); }
        else if (e.key === 'ArrowRight') { setDir(isSolo() ? 0 : 1, 'right'); }
        else if (e.key === ' ') { e.preventDefault(); ensureAudio(); if (state.phase === 'ready') beginPlayIfReady(); else if (state.phase === 'playing') state.phase = 'paused'; else if (state.phase === 'paused') state.phase = 'playing'; }
        else if (e.key === 'Escape') { handleEscape(); }
        if (['w','a','s','d'].includes(k) || e.key.startsWith('Arrow')) beginPlayIfReady();
    });

    // Touch: each active pointer belongs to a player based on which half of the
    // canvas it started in (left/right in landscape, bottom/top in portrait).
    const pointers = new Map();
    function playerForPoint(x, y, rect) {
        const landscape = rect.width >= rect.height;
        if (isSolo() || p2IsCPU()) return 0;   // one snake: any swipe drives P1
        if (landscape) return x < rect.left + rect.width / 2 ? 0 : 1;
        return y >= rect.top + rect.height / 2 ? 0 : 1;   // bottom = P1
    }
    canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault(); ensureAudio();
        const rect = canvas.getBoundingClientRect();
        pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, player: playerForPoint(e.clientX, e.clientY, rect) });
    });
    canvas.addEventListener('pointerup', (e) => {
        const p = pointers.get(e.pointerId);
        pointers.delete(e.pointerId);
        if (!p) return;
        const dx = e.clientX - p.x, dy = e.clientY - p.y;
        if (Math.hypot(dx, dy) < 14) { beginPlayIfReady(); return; }   // a tap = ready
        const dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
        setDir(p.player, dir);
        beginPlayIfReady();
    });
    canvas.addEventListener('pointercancel', (e) => pointers.delete(e.pointerId));

    function handleEscape() {
        if (document.getElementById('setup').classList.contains('open') && state.phase !== 'setup') { closeSetup(); return; }
        window.location.href = 'index.html';
    }

    // --- Audio --------------------------------------------------------------
    let audioCtx = null;
    function ensureAudio() {
        if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return; audioCtx = new AC(); }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function tone(freq, dur, type, vol, slideTo, when) {
        if (muted || !audioCtx) return;
        const t0 = audioCtx.currentTime + (when || 0);
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = type || 'square'; osc.frequency.setValueAtTime(freq, t0);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
        gain.gain.setValueAtTime(vol || 0.08, t0); gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(gain).connect(audioCtx.destination); osc.start(t0); osc.stop(t0 + dur + 0.02);
    }
    const sfx = {
        eat: () => tone(660, 0.06, 'square', 0.06, 990),
        crash: () => { tone(200, 0.25, 'sawtooth', 0.09, 40); },
        roundWin: () => [392, 523, 659, 784].forEach((f, i) => tone(f, 0.1, 'square', 0.06, undefined, i * 0.09)),
        fanfare: () => [523, 523, 659, 784, 1047, 784, 1047].forEach((f, i) => tone(f, 0.12, 'square', 0.06, undefined, i * 0.09)),
        levelUp: () => [523, 784, 1047].forEach((f, i) => tone(f, 0.09, 'square', 0.06, undefined, i * 0.06)),
        select: () => tone(660, 0.05, 'square', 0.04)
    };

    // --- Layout / render ----------------------------------------------------
    let VIEW_W = 300, VIEW_H = 200, cell = 10, boardX = 0, boardY = 0;
    function resizeCanvas() {
        const rect = canvasWrap.getBoundingClientRect();
        VIEW_W = Math.max(200, Math.floor(rect.width));
        VIEW_H = Math.max(160, Math.floor(rect.height));
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(VIEW_W * dpr); canvas.height = Math.floor(VIEW_H * dpr);
        canvas.style.width = VIEW_W + 'px'; canvas.style.height = VIEW_H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cell = Math.floor(Math.min(VIEW_W / COLS, VIEW_H / ROWS));
        boardX = Math.floor((VIEW_W - cell * COLS) / 2);
        boardY = Math.floor((VIEW_H - cell * ROWS) / 2);
        scanlines.style.width = VIEW_W + 'px'; scanlines.style.height = VIEW_H + 'px';
    }
    function cx(c) { return boardX + c * cell; }
    function cy(r) { return boardY + r * cell; }

    function rr(x, y, w, h, rad) {
        ctx.beginPath(); ctx.moveTo(x + rad, y);
        ctx.arcTo(x + w, y, x + w, y + h, rad); ctx.arcTo(x + w, y + h, x, y + h, rad);
        ctx.arcTo(x, y + h, x, y, rad); ctx.arcTo(x, y, x + w, y, rad); ctx.closePath();
    }

    function render(t) {
        ctx.clearRect(0, 0, VIEW_W, VIEW_H);
        // board border
        ctx.strokeStyle = '#22cc22'; ctx.lineWidth = 2;
        ctx.strokeRect(boardX - 1, boardY - 1, cell * COLS + 2, cell * ROWS + 2);
        // grid
        ctx.strokeStyle = GRID; ctx.lineWidth = 1;
        for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(cx(c), boardY); ctx.lineTo(cx(c), boardY + cell * ROWS); ctx.stroke(); }
        for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(boardX, cy(r)); ctx.lineTo(boardX + cell * COLS, cy(r)); ctx.stroke(); }
        // obstacles (solo levels)
        for (const o of state.obstacles) {
            ctx.fillStyle = '#20351f';
            rr(cx(o.c) + 1, cy(o.r) + 1, cell - 2, cell - 2, 3); ctx.fill();
            ctx.strokeStyle = '#5a8a5a'; ctx.lineWidth = 1; ctx.stroke();
            ctx.strokeStyle = 'rgba(130,190,130,0.4)';
            ctx.beginPath(); ctx.moveTo(cx(o.c) + 3, cy(o.r) + cell / 2); ctx.lineTo(cx(o.c) + cell - 3, cy(o.r) + cell / 2); ctx.stroke();
        }
        // food
        const pulse = 0.7 + 0.3 * Math.sin(t * 6);
        ctx.save(); ctx.shadowColor = FOOD; ctx.shadowBlur = 8 * pulse; ctx.fillStyle = FOOD;
        for (const f of state.food) { ctx.beginPath(); ctx.arc(cx(f.c) + cell / 2, cy(f.r) + cell / 2, cell * 0.32, 0, 7); ctx.fill(); }
        ctx.restore();
        // snakes
        for (const s of state.snakes) {
            ctx.save(); ctx.shadowColor = s.color; ctx.shadowBlur = 6;
            for (let i = 0; i < s.cells.length; i++) {
                const cellc = s.cells[i];
                ctx.fillStyle = s.color;
                ctx.globalAlpha = s.alive ? 1 : 0.3;
                const inset = i === 0 ? 1 : 2;
                rr(cx(cellc.c) + inset, cy(cellc.r) + inset, cell - inset * 2, cell - inset * 2, Math.max(2, cell * 0.22));
                ctx.fill();
                if (i === 0) {   // eyes on the head
                    ctx.shadowBlur = 0; ctx.fillStyle = '#04120a';
                    const ex = cx(cellc.c) + cell / 2, ey = cy(cellc.r) + cell / 2;
                    const off = cell * 0.18;
                    ctx.beginPath(); ctx.arc(ex - off + s.dir.c * off, ey - off + s.dir.r * off, cell * 0.09, 0, 7);
                    ctx.arc(ex + off + s.dir.c * off, ey + (s.dir.r ? -off : off), cell * 0.09, 0, 7); ctx.fill();
                    ctx.shadowBlur = 6; ctx.fillStyle = s.color;
                }
            }
            ctx.restore();
        }
        ctx.globalAlpha = 1;
    }

    function updateHUD() {
        if (isSolo()) {
            const s = state.snakes[0];
            hudP1.className = 'p1'; hudP1.textContent = 'LEN ' + ((s ? scoreOf(s) : 0) + START_LEN);
            hudMid.textContent = 'LEVEL ' + state.level;
            hudP2.className = 'best'; hudP2.textContent = 'BEST ' + (state.highScore + START_LEN);
            return;
        }
        const s1 = state.snakes[0], s2 = state.snakes[1];
        hudP1.className = 'p1'; hudP2.className = 'p2';
        hudP1.textContent = 'P1 ' + state.scores[0] + (s1 ? '  ↑' + scoreOf(s1) : '');
        hudP2.textContent = (s2 ? '↑' + scoreOf(s2) + '  ' : '') + state.scores[1] + ' ' + (p2IsCPU() ? 'CPU' : 'P2');
        hudMid.textContent = 'RND ' + state.round + '/' + (state.config.roundsToWin * 2 - 1);
    }

    function showBanner(text, duration) { state.banner = { timer: duration }; bannerEl.textContent = text; bannerEl.classList.add('show'); }
    function hideBanner() { bannerEl.classList.remove('show'); state.banner = null; }
    function updateBanner(dt) {
        if (!state.banner || state.banner.timer <= 0) return;   // 0 = sticky
        state.banner.timer -= dt;
        if (state.banner.timer <= 0) hideBanner();
    }

    // --- Main loop ----------------------------------------------------------
    let lastT = 0;
    function loop(ts) {
        const t = ts / 1000;
        const dt = Math.min(0.05, t - lastT || 0.016);
        lastT = t;
        updateBanner(dt);
        if (state.phase === 'playing') {
            if (p2IsCPU() && state.snakes[1] && state.snakes[1].alive) decideCPU(state.snakes[1]);
            const base = SPEED_LEVELS[state.config.speed];
            // Solo speeds up each level (capped) for escalating pressure.
            const spd = isSolo() ? Math.min(base + 8, base + (state.level - 1) * 0.8) : base;
            const step = 1 / spd;
            state.tickAcc += dt;
            while (state.tickAcc >= step && state.phase === 'playing') { state.tickAcc -= step; tick(); }
        } else if (state.phase === 'roundOver') {
            state._roundTimer -= dt;
            if (state._roundTimer <= 0) {
                const winner = state.scores.findIndex(sc => sc >= state.config.roundsToWin);
                if (winner >= 0) showMatchOver(winner);
                else { state.round++; newRound(); }
            }
        }
        render(t);
        requestAnimationFrame(loop);
    }

    function showMatchOver(winnerIdx) {
        state.phase = 'matchOver';
        hideBanner();
        const who = winnerIdx === 1 && p2IsCPU() ? 'CPU' : 'P' + (winnerIdx + 1);
        modalContent.innerHTML = '<h1 style="color:' + (winnerIdx === 0 ? P1 : P2) + '">' + who + ' WINS!</h1><p>' + state.scores[0] + ' - ' + state.scores[1] + '</p>';
        modal.style.display = 'block';
        sfx.fanfare();
    }

    // --- Buttons / setup ----------------------------------------------------
    const muteBtn = document.getElementById('mute-btn');
    function updateMute() { muteBtn.textContent = muted ? '\u{1F507}' : '\u{1F50A}'; }
    muteBtn.addEventListener('click', () => { ensureAudio(); muted = !muted; localStorage.setItem(LS.muted, muted ? '1' : '0'); sfx.select(); updateMute(); });
    updateMute();

    document.getElementById('rematch-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); startMatch(); });
    document.getElementById('modal-setup-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); modal.style.display = 'none'; openSetup(); });
    document.getElementById('setup-btn').addEventListener('click', () => { ensureAudio(); sfx.select(); openSetup(); });

    const setupEl = document.getElementById('setup');
    const startBtn = document.getElementById('start-btn');
    const MODES = [['duel', 'DUEL'], ['solo', 'SOLO']];
    const OPP = [['human', '2 PLAYER'], ['cpu1', 'CPU EASY'], ['cpu2', 'CPU MED'], ['cpu3', 'CPU HARD']];
    const SPEEDS = [['chill', 'CHILL'], ['normal', 'NORMAL'], ['fast', 'FAST']];
    const WALLS = [['solid', 'SOLID'], ['wrap', 'WRAP']];
    const RNDS = [[1, 'BEST OF 1'], [2, 'BEST OF 3'], [3, 'BEST OF 5']];

    function optGroup(elId, opts, getVal, setVal) {
        const el = document.getElementById(elId); el.innerHTML = '';
        for (const [val, label] of opts) {
            const b = document.createElement('button');
            b.className = 'opt-btn' + (getVal() === val ? ' sel' : '');
            b.textContent = label;
            b.addEventListener('click', () => { ensureAudio(); sfx.select(); setVal(val); renderSetup(); });
            el.appendChild(b);
        }
    }
    function renderSetup() {
        optGroup('mode-options', MODES, () => state.config.mode, v => state.config.mode = v);
        optGroup('opp-options', OPP, () => state.config.opponent, v => state.config.opponent = v);
        optGroup('speed-options', SPEEDS, () => state.config.speed, v => state.config.speed = v);
        optGroup('walls-options', WALLS, () => state.config.walls, v => state.config.walls = v);
        optGroup('rounds-options', RNDS, () => state.config.roundsToWin, v => state.config.roundsToWin = v);
        // Player-2 and match-length only apply in duel mode.
        document.getElementById('row-opp').style.display = isSolo() ? 'none' : '';
        document.getElementById('row-rounds').style.display = isSolo() ? 'none' : '';
        startBtn.textContent = isSolo() ? 'START SOLO' : 'START DUEL';
    }
    function openSetup() { renderSetup(); setupEl.classList.add('open'); }
    function closeSetup() { setupEl.classList.remove('open'); }
    document.getElementById('start-btn').addEventListener('click', () => {
        ensureAudio(); sfx.select();
        localStorage.setItem(LS.config, JSON.stringify(state.config));
        closeSetup(); startMatch();
    });

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') handleEscape(); });

    // --- Boot ---------------------------------------------------------------
    resizeCanvas();
    let resizeRAF;
    window.addEventListener('resize', () => { cancelAnimationFrame(resizeRAF); resizeRAF = requestAnimationFrame(resizeCanvas); });
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
    newRound();          // set up a board behind the setup overlay
    openSetup();
    requestAnimationFrame(loop);

    // Test hooks
    window.state = state;
    window.tickOnce = tick;
    window.setDirTest = setDir;
    window.startMatchTest = function (cfg) { Object.assign(state.config, cfg || {}); closeSetup(); startMatch(); state.phase = 'playing'; };
    window.beginPlay = beginPlayIfReady;
</script>
</body>
</html>
